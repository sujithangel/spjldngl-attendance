/* ---- focus-safe list shell ---- */
function listShell(v,ph,importBtn,build){window._build=build;v.innerHTML=`<div class="wrap">${toolbar(ph)}${importBtn||''}<div id="listBody"></div></div>`;listRefresh();}
function listRefresh(){const el=$('listBody');if(el)el.innerHTML=window._build();}
function toolbar(ph){return `<div class="toolbar"><div class="searchbox">${ico('search')}<input class="search" value="${esc(ui.q)}" placeholder="${ph}" oninput="ui.q=this.value;listRefresh()"></div><button class="editbtn ${ui.edit?'on':''}" onclick="ui.edit=!ui.edit;ui.sel=new Set();render()">${ico('edit')} ${ui.edit?'Done':'Edit'}</button></div>`;}
function selbar(ids,coll,label){const all=ids.length&&ids.every(i=>ui.sel.has(i));return `<div class="selbar"><div class="chk ${all?'on':''}" onclick="toggleAll(${JSON.stringify(ids).replace(/"/g,'&quot;')})">${all?ico('check'):''}</div><div class="grow"><b>${ui.sel.size}</b> selected</div><button class="btn sm danger" ${ui.sel.size?'':'disabled'} onclick="bulkDelete('${coll}','${label}')">${ico('trash')} Delete</button></div>`;}
function toggleAll(ids){const all=ids.length&&ids.every(i=>ui.sel.has(i));if(all)ids.forEach(i=>ui.sel.delete(i));else ids.forEach(i=>ui.sel.add(i));listRefresh();}
function toggleSel(id){ui.sel.has(id)?ui.sel.delete(id):ui.sel.add(id);listRefresh();}
function chkbox(id){return `<div class="chk ${ui.sel.has(id)?'on':''}" onclick="event.stopPropagation();toggleSel('${id}')">${ui.sel.has(id)?ico('check'):''}</div>`;}
function bulkDelete(coll,label){const n=ui.sel.size;if(!n)return;if(!confirm(`Delete ${n} ${label}${n>1?'s':''}? You can undo immediately after.`))return;const removed=DB[coll].filter(x=>ui.sel.has(x.id));DB[coll]=DB[coll].filter(x=>!ui.sel.has(x.id));save();ui.sel=new Set();snack(`${n} ${label}${n>1?'s':''} deleted`,()=>{DB[coll]=DB[coll].concat(removed);save();render();toast('Restored');},6000);render();}
function matchQ(s){return !ui.q||s.toLowerCase().includes(ui.q.toLowerCase());}

function listBatches(v){listShell(v,'Search batches...',null,()=>{const items=DB.batches.filter(b=>matchQ(b.name));const ids=items.map(b=>b.id);const unN=DB.students.filter(isUnassigned).length;const unCard=(matchQ('unassigned')||!ui.q)?`<div class="card unassigned" style="padding:12px 14px"><div class="row"><div class="grow" onclick="go('more','batchview','__unassigned__')"><div class="title">Unassigned Students <span class="badge-un">SYSTEM</span></div><div class="muted">${unN} student${unN!==1?'s':''} · no batch</div></div><button class="btn sm subtle" onclick="go('more','batchview','__unassigned__')">${ico('chev')}</button></div></div>`:'';
  return (ui.edit?selbar(ids,'batches','batch'):'')+items.map(b=>`<div class="card" style="padding:12px 14px"><div class="row">${ui.edit?chkbox(b.id):''}<div class="grow" onclick="${ui.edit?`editBatch('${b.id}')`:`go('more','batchview','${b.id}')`}"><div class="title">${esc(b.name)}</div><div class="muted">${DB.students.filter(s=>s.batch===b.id).length} students enrolled</div></div><button class="btn sm subtle" onclick="${ui.edit?`editBatch('${b.id}')`:`go('more','batchview','${b.id}')`}">${ui.edit?ico('edit'):ico('chev')}</button></div></div>`).join('')+(ui.edit?'':unCard)||emptyMsg('cap','No batches found.');});}
function isUnassigned(s){return !s.batch||!DB.batches.find(b=>b.id===s.batch);}
function selbarStudents(ids){const all=ids.length&&ids.every(i=>ui.sel.has(i));return `<div class="selbar"><div class="chk ${all?'on':''}" onclick="toggleAll(${JSON.stringify(ids).replace(/"/g,'&quot;')})">${all?ico('check'):''}</div><div class="grow"><b>${ui.sel.size}</b> selected</div><button class="btn sm subtle" ${ui.sel.size?'':'disabled'} onclick="bulkAssign()">${ico('cap')} Assign</button><button class="btn sm danger" ${ui.sel.size?'':'disabled'} onclick="bulkDelete('students','student')">${ico('trash')}</button></div>`;}
function filterBatchOpts(selId,q,withUn){const sel=$(selId);if(!sel)return;const cur=sel.value;q=(q||'').toLowerCase();let list=DB.batches.filter(b=>b.name.toLowerCase().includes(q)).map(b=>({v:b.id,n:b.name}));if(withUn&&('unassigned'.includes(q)||!q))list.unshift({v:'',n:'— Unassigned —'});sel.innerHTML=list.map(o=>`<option value="${o.v}" ${o.v===cur?'selected':''}>${esc(o.n)}</option>`).join('')||'<option value="">No match</option>';}
function bulkAssign(){if(!ui.sel.size)return;const ids=[...ui.sel];sheet(`<h3>Assign ${ids.length} student${ids.length>1?'s':''} to batch</h3><label class="f">Batch</label><div class="searchbox">${ico('search')}<input class="search" id="baQ" placeholder="Search batch..." oninput="filterBatchOpts('baB',this.value,true)"></div><select class="t" id="baB"><option value="">— Unassigned —</option>${DB.batches.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('')}</select><button class="btn primary" style="margin-top:16px" onclick="doBulkAssign(${JSON.stringify(ids).replace(/"/g,'&quot;')})">Assign</button><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Cancel</button>`);}
function doBulkAssign(ids){const b=$('baB').value;ids.forEach(id=>{const s=DB.students.find(x=>x.id===id);if(s)s.batch=b;});save();ui.sel=new Set();closeSheet();render();toast(ids.length+' student'+(ids.length>1?'s':'')+' assigned');}
function listStudents(v){listShell(v,'Search students...','',()=>{const items=DB.students.filter(s=>matchQ(s.fn+' '+s.ln+' '+(s.cid||'')+' '+s.email));const ids=items.map(s=>s.id);const un=DB.students.filter(isUnassigned).length;return (un?`<div class="mini" style="margin:0 4px 10px;color:#c2410c">${un} unassigned student${un>1?'s':''} — highlighted in amber</div>`:'')+(ui.edit?selbarStudents(ids):'')+items.map(s=>{const u=isUnassigned(s);return `<div class="card ${u?'unassigned':''}" style="padding:11px 14px"><div class="row">${ui.edit?chkbox(s.id):''}<div class="avatar ${u?'':avColor(s.fn)}" ${u?'style="background:#f59e0b"':''}>${initials(s.fn,s.ln)}</div><div class="grow" onclick="editStudent('${s.id}')"><div style="font-weight:700">${esc(s.fn)} ${esc(s.ln)}${u?'<span class="badge-un">UNASSIGNED</span>':''}</div><div class="mini">${esc(s.cid||'—')} · ${u?'No batch':esc(batchName(s.batch))}</div><div class="mini">${esc(s.email)}</div></div><button class="btn sm subtle" onclick="editStudent('${s.id}')">${ico('edit')}</button></div></div>`;}).join('')||emptyMsg('users','No students found.');});}
function listStaff(v){listShell(v,'Search staff...','',()=>{const items=DB.staff.filter(s=>matchQ(s.fn+' '+s.ln+' '+s.email));const ids=items.map(s=>s.id);return (ui.edit?selbar(ids,'staff','staff member'):'')+items.map(s=>`<div class="card" style="padding:11px 14px"><div class="row">${ui.edit?chkbox(s.id):''}<div class="avatar lead">${initials(s.fn,s.ln)}</div><div class="grow" onclick="editStaff('${s.id}')"><div style="font-weight:700">${esc(s.fn)} ${esc(s.ln)}</div><div class="mini">${esc(s.email)}</div></div><button class="btn sm subtle" onclick="editStaff('${s.id}')">${ico('edit')}</button></div></div>`).join('')||emptyMsg('crown','No staff found.');});}
function searchEvent(e,q){if(!q)return true;q=q.toLowerCase();const d=new Date(e.date+'T00:00:00');const hay=(e.name+' '+d.getFullYear()+' '+MONTHS[d.getMonth()]+' '+MONTHS[d.getMonth()].slice(0,3)+' '+(e.start||'')+' '+(e.end||'')).toLowerCase();return hay.includes(q);}
function evMeta(e){return `${e.batches.map(batchName).join(', ')||'—'} · ${studentsForEvent(e).length} students · ${leadersForEvent(e).length} leaders`;}
function evChk(which,id){const sel=which==='up'?evUI.selUp:evUI.selPast;return `<div class="chk ${sel.has(id)?'on':''}" onclick="event.stopPropagation();evToggle('${which}','${id}')">${sel.has(id)?ico('check'):''}</div>`;}
function evToggle(which,id){const sel=which==='up'?evUI.selUp:evUI.selPast;sel.has(id)?sel.delete(id):sel.add(id);which==='up'?refreshUp():refreshPast();}
function evToggleAll(which,ids){const sel=which==='up'?evUI.selUp:evUI.selPast;const all=ids.length&&ids.every(i=>sel.has(i));if(all)ids.forEach(i=>sel.delete(i));else ids.forEach(i=>sel.add(i));which==='up'?refreshUp():refreshPast();}
function evSelbar(which,ids){const sel=which==='up'?evUI.selUp:evUI.selPast;const all=ids.length&&ids.every(i=>sel.has(i));const del=which==='up'?`<button class="btn sm danger" ${sel.size?'':'disabled'} onclick="evBulkDelete('${which}')">${ico('trash')}</button>`:'';return `<div class="selbar"><div class="chk ${all?'on':''}" onclick="evToggleAll('${which}',${JSON.stringify(ids).replace(/"/g,'&quot;')})">${all?ico('check'):''}</div><div class="grow"><b>${sel.size}</b> selected</div><button class="btn sm subtle" ${sel.size?'':'disabled'} onclick="evBulkArchive('${which}')">Archive</button>${del}</div>`;}
function evBulkArchive(which){const sel=which==='up'?evUI.selUp:evUI.selPast;const n=sel.size;if(!n)return;const ids=[...sel];ids.forEach(id=>{const e=DB.events.find(x=>x.id===id);if(e)e.archived=true;});save();sel.clear();snack(`${n} event${n>1?'s':''} archived`,()=>{ids.forEach(id=>{const e=DB.events.find(x=>x.id===id);if(e)e.archived=false;});save();render();toast('Restored');},6000);render();}
function evBulkDelete(which){const sel=which==='up'?evUI.selUp:evUI.selPast;if(!sel.size)return;const ids=[...sel];const blocked=ids.filter(id=>{const e=DB.events.find(x=>x.id===id);return e&&eventStatus(e).t==='In progress';});const del=ids.filter(id=>blocked.indexOf(id)<0);if(!del.length){toast("In-progress events can't be deleted");return;}const n=del.length;if(!confirm(`Permanently delete ${n} event${n>1?'s':''}? Archiving is recommended. You can undo immediately after.`))return;const rm=new Set(del);const removed=DB.events.filter(x=>rm.has(x.id));DB.events=DB.events.filter(x=>!rm.has(x.id));save();sel.clear();snack(`${n} deleted${blocked.length?' · '+blocked.length+' in-progress kept':''}`,()=>{DB.events=DB.events.concat(removed);save();render();toast('Restored');},6000);render();}
function collBtn(open,fn){return `<button class="collbtn" onclick="${fn}">${open?'−':'+'}</button>`;}
function listEvents(v){
  v.innerHTML=`<div class="wrap">
    <div class="sectlabel" style="margin-top:0"><span>${collBtn(upOpen,'upOpen=!upOpen;render()')} Upcoming events</span>${upOpen?`<button class="editbtn ${evUI.editUp?'on':''}" style="padding:6px 11px;font-size:12px" onclick="evUI.editUp=!evUI.editUp;evUI.selUp=new Set();render()">${ico('edit')} ${evUI.editUp?'Done':'Bulk edit'}</button>`:''}</div>
    ${upOpen?`<div class="searchbox">${ico('search')}<input class="search" value="${esc(qUp)}" placeholder="Search upcoming — name, year, month, time" oninput="qUp=this.value;refreshUp()"></div><div id="upBody"></div>`:''}
    <div class="sectlabel"><span>${collBtn(pastOpen,'pastOpen=!pastOpen;render()')} Past events</span>${pastOpen?`<button class="editbtn ${evUI.editPast?'on':''}" style="padding:6px 11px;font-size:12px" onclick="evUI.editPast=!evUI.editPast;evUI.selPast=new Set();render()">${ico('edit')} ${evUI.editPast?'Done':'Bulk edit'}</button>`:''}</div>
    ${pastOpen?`<div class="searchbox">${ico('search')}<input class="search" value="${esc(qPast)}" placeholder="Search past — name, year, month, time" oninput="qPast=this.value;refreshPast()"></div><div id="pastBody"></div><button class="btn ghost" style="margin-top:12px" onclick="showArchived=!showArchived;refreshPast()">${showArchived?'Hide':'Show'} archived (${DB.events.filter(e=>e.archived).length})</button>`:''}
  </div>`;
  if(upOpen)refreshUp();if(pastOpen)refreshPast();
}
function refreshUp(){const el=$('upBody');if(!el)return;const today=new Date().toISOString().slice(0,10);const list=DB.events.filter(e=>!e.archived&&e.status!=='completed'&&e.date>=today&&searchEvent(e,qUp)).sort((a,b)=>a.date.localeCompare(b.date));const ids=list.map(e=>e.id);const ed=evUI.editUp;
  el.innerHTML=(ed?evSelbar('up',ids):'')+list.map(e=>{const st=eventStatus(e);const isTod=e.date===today;const setup=needsSetup(e);return `<div class="card${setup?' setup':''}"><div class="row">${ed?evChk('up',e.id):''}<div class="grow"><div class="title">${esc(e.name)} <span class="pill ${st.c}${st.t==='In progress'?' live':''}" style="padding:2px 8px;font-size:9px">${st.t.toUpperCase()}</span>${setup?'<span class="badge-setup">NEEDS SETUP</span>':''}</div><div class="muted">${fmtDate(e.date)} · ${fmtTime(e.start)}–${fmtTime(e.end)}</div><div class="mini" style="margin-top:4px">${evMeta(e)}</div></div></div>
    ${ed?'':`<div class="row" style="margin-top:10px;gap:8px"><button class="btn sm subtle" onclick="assignEvent('${e.id}')">${ico('users')} Assign</button>${isTod?`<button class="btn sm subtle" onclick="openMark('${e.id}')">${ico('check')} ${st.t==='Draft'?'Resume':'Mark'}</button>`:''}<button class="btn sm subtle" onclick="editEvent('${e.id}')">${ico('edit')} Edit</button></div>`}</div>`;}).join('')||emptyMsg('cal','No upcoming events.');}
function refreshPast(){const el=$('pastBody');if(!el)return;const today=new Date().toISOString().slice(0,10);const list=DB.events.filter(e=>(e.status==='completed'||e.date<today)&&(showArchived||!e.archived)&&searchEvent(e,qPast)).sort((a,b)=>b.date.localeCompare(a.date));const ids=list.filter(e=>!e.archived).map(e=>e.id);const ed=evUI.editPast;
  el.innerHTML=(ed?evSelbar('past',ids):'')+list.map(e=>{const done=isCompleted(e);const st=eventStatus(e);const arch=e.archived;const c=scount(e);
    let actions;
    if(arch)actions=`<button class="btn sm subtle" onclick="restoreEvent('${e.id}')">Restore</button>`;
    else if(done)actions=`<button class="btn sm subtle" onclick="reopenMark('${e.id}')">${ico('check')} Edit attendance</button>`;
    else actions=`<button class="btn sm subtle" onclick="assignEvent('${e.id}')">${ico('users')} Assign</button><button class="btn sm subtle" onclick="go('calendar',null,'${e.id}','mark')">${ico('check')} Mark</button>`;
    return `<div class="card ${arch?'unassigned':''}"><div class="row">${ed&&!arch?evChk('past',e.id):''}<div class="grow"><div class="title">${esc(e.name)} <span class="pill ${st.c}" style="padding:2px 8px;font-size:9px">${arch?'ARCHIVED':st.t.toUpperCase()}</span></div><div class="muted">${fmtDate(e.date)} · ${fmtTime(e.start)}–${fmtTime(e.end)}</div><div class="mini" style="margin-top:4px">${done?c.present+'P · '+c.absent+'A · '+c.late+'L · ':''}${evMeta(e)}</div></div></div>
      ${ed?'':`<div class="row" style="margin-top:10px;gap:8px">${actions}</div>`}</div>`;}).join('')||emptyMsg('cal','No past events.');}
function openMark(eid){const e=DB.events.find(x=>x.id===eid);const today=new Date().toISOString().slice(0,10);if(e.date>today&&e.status!=='completed'){toast('Attendance opens on the event day');return;}if(e.status==='completed'&&!confirm('This event is completed. Edit its attendance now?'))return;go('calendar',null,eid,'mark');}
function reopenMark(eid){openMark(eid);}
function restoreEvent(id){const e=DB.events.find(x=>x.id===id);e.archived=false;save();refreshPast();toast('Event restored');}
function emptyMsg(i,t){return `<div class="empty">${ico(i)}<div>${t}</div></div>`;}
function fabAction(){if(route.sub==='batches')editBatch();else if(route.sub==='students')editStudent();else if(route.sub==='staff')editStaff();else if(route.sub==='events')editEvent();}

/* ================= BATCH DETAIL (enrolled students + picker) ================= */
function batchView(v){
  const un=route.id==='__unassigned__';
  const b=un?{name:'Unassigned Students'}:DB.batches.find(x=>x.id===route.id);if(!b){go('more','batches');return;}
  const enrolled=()=>un?DB.students.filter(isUnassigned):DB.students.filter(s=>s.batch===route.id);
  window._build=()=>{const items=enrolled().filter(s=>matchQ(s.fn+' '+s.ln+' '+(s.cid||'')));return items.map(s=>`<div class="card ${un?'unassigned':''}" style="padding:11px 14px"><div class="row"><div class="avatar ${un?'':avColor(s.fn)}" ${un?'style="background:#f59e0b"':''}>${initials(s.fn,s.ln)}</div><div class="grow" onclick="editStudent('${s.id}')"><div style="font-weight:700">${esc(s.fn)} ${esc(s.ln)}</div><div class="mini">${esc(s.cid||'—')} · ${esc(s.email)}</div></div>${un?`<button class="btn sm subtle" onclick="assignStudentBatch('${s.id}')">${ico('cap')} Assign</button>`:`<button class="btn sm danger" onclick="removeFromBatch('${s.id}')">${ico('x')}</button>`}</div></div>`).join('')||emptyMsg('users',un?'No unassigned students. 🎉':'No students enrolled yet.');};
  v.innerHTML=`<div class="wrap"><div class="card ${un?'unassigned':''}" style="display:flex;align-items:center;gap:12px"><div class="avatar" style="background:${un?'#f59e0b':'#7c5cff'}">${ico('cap')}</div><div class="grow"><div style="font-weight:800">${esc(b.name)}</div><div class="mini">${enrolled().length} student${enrolled().length!==1?'s':''} ${un?'without a batch':'enrolled'}</div></div></div>
    ${un?`<div class="banner">${ico('info')}<div>Tap <b>Assign</b> on a student to move them into a batch. Search by name or campus ID.</div></div>`:`<button class="btn primary" onclick="batchPicker('${route.id}')">${ico('plus')} Add / move students</button>`}
    <div class="searchbox" style="margin-top:12px">${ico('search')}<input class="search" value="${esc(ui.q)}" placeholder="Search by name or campus ID..." oninput="ui.q=this.value;listRefresh()"></div>
    <div id="listBody"></div></div>`;
  listRefresh();
}
function assignStudentBatch(sid){const s=DB.students.find(x=>x.id===sid);sheet(`<h3>Assign to batch</h3><div class="muted" style="margin-bottom:8px">${esc(s.fn+' '+s.ln)}</div><label class="f">Batch</label><div class="searchbox">${ico('search')}<input class="search" id="asQ" placeholder="Search batch..." oninput="filterBatchOpts('asB',this.value,false)"></div><select class="t" id="asB">${DB.batches.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('')}</select><button class="btn primary" style="margin-top:16px" onclick="doAssignStudent('${sid}')">Assign</button><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Cancel</button>`);}
function doAssignStudent(sid){const s=DB.students.find(x=>x.id===sid);s.batch=$('asB').value;save();closeSheet();render();toast('Assigned to '+batchName(s.batch));}
function removeFromBatch(sid){const s=DB.students.find(x=>x.id===sid);if(!confirm('Remove '+s.fn+' '+s.ln+' from this batch? They become unassigned.'))return;s.batch='';save();listRefresh();toast('Removed from batch');}
let _pickBatch='',_pickQ='';
function batchPicker(bid){_pickBatch=bid;_pickQ='';const b=DB.batches.find(x=>x.id===bid);sheet(`<h3>Add students</h3><div class="muted" style="margin-bottom:8px">Tap to move a student into <b>${esc(b.name)}</b>. Students already in another batch will be moved.</div><div class="searchbox">${ico('search')}<input class="search" id="pq" placeholder="Search students..." oninput="_pickQ=this.value;pickBody()"></div><div id="pickBody" style="margin-top:12px"></div><button class="btn primary" style="margin-top:14px" onclick="closeSheet();render()">Done</button>`);pickBody();}
function pickBody(){const b=$('pickBody');const q=_pickQ.toLowerCase();const items=DB.students.filter(s=>(s.fn+' '+s.ln+' '+(s.cid||'')).toLowerCase().includes(q));b.innerHTML=items.map(s=>{const inHere=s.batch===_pickBatch;return `<span class="chip ${inHere?'on':''}" onclick="pickToggle('${s.id}')">${esc(s.fn)} ${esc(s.ln)}${s.batch&&!inHere?' · '+esc(batchName(s.batch)):''}</span>`;}).join('')||'<div class="mini">No students match.</div>';}
function pickToggle(sid){const s=DB.students.find(x=>x.id===sid);if(s.batch===_pickBatch){s.batch='';toast('Removed from batch');}else{const prev=s.batch?batchName(s.batch):null;s.batch=_pickBatch;toast(prev?('Moved from '+prev):'Added');}save();pickBody();}

/* ================= USER MANAGEMENT ================= */
function usersView(v){v.innerHTML=`<div class="wrap"><div class="banner">${ico('shield')}<div>Add users, reset passwords, and set recovery questions. Passwords are never shown in plain text.</div></div>
  <button class="btn primary" style="margin-bottom:12px" onclick="editUser()">${ico('plus')} Add user</button>
  ${DB.users.map(u=>`<div class="card"><div class="row"><div class="avatar" style="background:${u.role==='super'?'var(--a1)':'#3b82f6'}">${initials(u.u,'')}</div><div class="grow"><div style="font-weight:700">${esc(u.u)} ${u.role==='super'?'<span class="pill red" style="padding:2px 8px;font-size:9px">SUPER</span>':''}</div><div class="mini">${u.sq?'Recovery questions set':'No recovery set'}</div></div></div>
    <div class="row" style="margin-top:10px;gap:8px;flex-wrap:wrap"><button class="btn sm subtle" onclick="adminSetPw('${esc(u.u)}')">${ico('lock')} Reset password</button><button class="btn sm subtle" onclick="setRecovery('${esc(u.u)}')">${ico('shield')} Recovery Q</button>${u.role!=='super'&&u.u!==SESSION.u?`<button class="btn sm danger" onclick="delUser('${esc(u.u)}')">${ico('trash')} Delete</button>`:''}</div></div>`).join('')}</div>`;}
function editUser(){sheet(`<h3>New user</h3><label class="f">Username</label><input class="t" id="uu"><label class="f">Password</label><input class="t" id="up" type="password"><label class="f">Secret Q1 — Mother's maiden name</label><input class="t" id="uq1"><label class="f">Secret Q2 — Favorite color</label><input class="t" id="uq2"><button class="btn primary" style="margin-top:16px" onclick="saveUser()">Create user</button><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Cancel</button>`);}
function saveUser(){const u=$('uu').value.trim(),pw=$('up').value,q1=$('uq1').value.trim(),q2=$('uq2').value.trim();if(!u||!pw){toast('Username and password required');return;}if(findUser(u)){toast('Username already exists');return;}if(!q1||!q2){if(!confirm('No recovery questions — user cannot self-reset. Continue?'))return;}DB.users.push({u,role:'user',ph:hpw(pw),sq:(q1&&q2)?{maiden:h(q1),color:h(q2)}:null});save();closeSheet();render();toast('User created');}
function adminSetPw(u){sheet(`<h3>Reset password · ${esc(u)}</h3><label class="f">New password</label><input class="t" id="ap1" type="password"><label class="f">Confirm</label><input class="t" id="ap2" type="password"><button class="btn primary" style="margin-top:16px" onclick="adminSavePw('${esc(u)}')">Save</button><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Cancel</button>`);}
function adminSavePw(u){const a=$('ap1').value,b=$('ap2').value;if(!a||a!==b){toast('Empty or mismatch');return;}findUser(u).ph=hpw(a);save();closeSheet();toast('Password reset');}
function setRecovery(u){const rec=findUser(u);sheet(`<h3>Recovery questions · ${esc(u)}</h3><div class="muted">Used for "Forgot password". Answers are stored hashed.</div><label class="f">Mother's maiden name</label><input class="t" id="rq1"><label class="f">Favorite color</label><input class="t" id="rq2"><button class="btn primary" style="margin-top:16px" onclick="saveRecovery('${esc(u)}')">Save</button><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Cancel</button>`);}
function saveRecovery(u){const q1=$('rq1').value.trim(),q2=$('rq2').value.trim();if(!q1||!q2){toast('Both answers required');return;}findUser(u).sq={maiden:h(q1),color:h(q2)};save();closeSheet();render();toast('Recovery questions set');}
function delUser(u){if(findUser(u).u===SESSION.u){toast('Cannot delete yourself');return;}const rec=findUser(u);if(rec.role==='super'){toast('Cannot delete Super Admin');return;}if(!confirm('Delete user '+u+'?'))return;DB.users=DB.users.filter(x=>x.u!==u);save();render();toast('User deleted');}
function changeOwnPw(){sheet(`<h3>Change my password</h3><label class="f">Current password</label><input class="t" id="c0" type="password"><label class="f">New password</label><input class="t" id="c1" type="password"><label class="f">Confirm new</label><input class="t" id="c2" type="password"><button class="btn primary" style="margin-top:16px" onclick="saveOwnPw()">Update</button><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Cancel</button>`);}
function saveOwnPw(){const rec=findUser(SESSION.u);if(rec.ph!==hpw($('c0').value)){toast('Current password wrong');return;}const a=$('c1').value,b=$('c2').value;if(!a||a!==b){toast('Empty or mismatch');return;}rec.ph=hpw(a);save();closeSheet();toast('Password changed');}

/* ================= SHEETS / CRUD ================= */
function sheet(html){const o=document.createElement('div');o.className='overlay';o.id='ov';o.innerHTML=`<div class="sheet">${html}</div>`;o.onclick=e=>{if(e.target===o)closeSheet();};document.body.appendChild(o);}
function closeSheet(){const o=$('ov');if(o)o.remove();}
function editBatch(id){const b=id?DB.batches.find(x=>x.id===id):{name:''};sheet(`<h3>${id?'Edit':'New'} batch</h3><label class="f">Batch name</label><input class="t" id="bn" value="${esc(b.name)}" placeholder="e.g. GMBA June 2026"><button class="btn primary" style="margin-top:16px" onclick="saveBatch('${id||''}')">Save</button><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Cancel</button>`);}
function saveBatch(id){const n=$('bn').value.trim();if(!n)return;if(id)DB.batches.find(x=>x.id===id).name=n;else DB.batches.push({id:uid(),name:n});save();closeSheet();render();toast('Saved');}
function editStudent(id){const s=id?DB.students.find(x=>x.id===id):{fn:'',ln:'',email:'',cid:'',batch:DB.batches[0]?.id};sheet(`<h3>${id?'Edit':'New'} student</h3><label class="f">First name</label><input class="t" id="sfn" value="${esc(s.fn)}"><label class="f">Last name</label><input class="t" id="sln" value="${esc(s.ln)}"><label class="f">Email ID</label><input class="t" id="sem" value="${esc(s.email)}"><label class="f">Campus ID</label><input class="t" id="scid" value="${esc(s.cid||'')}"><label class="f">Batch</label><select class="t" id="sb"><option value="">— Unassigned —</option>${DB.batches.map(b=>`<option value="${b.id}" ${s.batch===b.id?'selected':''}>${esc(b.name)}</option>`).join('')}</select><button class="btn primary" style="margin-top:16px" onclick="saveStudent('${id||''}')">Save</button><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Cancel</button>${id?'':`<div style="margin-top:18px;border-top:1px solid var(--line);padding-top:14px"><div style="font-weight:700;font-size:13px;margin-bottom:2px">Add many at once</div><div class="mini" style="margin-bottom:10px">Import a CSV — columns: First Name, Last Name, Campus ID, Email ID, Batch</div><div class="selrow" style="margin:0"><button class="btn subtle sm" style="flex:1" onclick="csvImport('students')">${ico('ul')} Import CSV</button><button class="btn ghost sm" style="flex:1" onclick="downloadSampleCSV('students')">${ico('dl')} Sample CSV</button></div></div>`}`);}
function saveStudent(id){const o={fn:$('sfn').value.trim(),ln:$('sln').value.trim(),email:$('sem').value.trim(),cid:$('scid').value.trim(),batch:$('sb').value};if(!o.fn)return;if(id)Object.assign(DB.students.find(x=>x.id===id),o);else DB.students.push({id:uid(),...o});save();closeSheet();render();toast('Saved');}
function editStaff(id){const s=id?DB.staff.find(x=>x.id===id):{fn:'',ln:'',email:''};sheet(`<h3>${id?'Edit':'New'} staff / leader</h3><label class="f">First name</label><input class="t" id="tfn" value="${esc(s.fn)}"><label class="f">Last name</label><input class="t" id="tln" value="${esc(s.ln)}"><label class="f">Email ID</label><input class="t" id="tem" value="${esc(s.email)}"><button class="btn primary" style="margin-top:16px" onclick="saveStaff('${id||''}')">Save</button><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Cancel</button>${id?'':`<div style="margin-top:18px;border-top:1px solid var(--line);padding-top:14px"><div style="font-weight:700;font-size:13px;margin-bottom:2px">Add many at once</div><div class="mini" style="margin-bottom:10px">Import a CSV — columns: First Name, Last Name, Email ID</div><div class="selrow" style="margin:0"><button class="btn subtle sm" style="flex:1" onclick="csvImport('staff')">${ico('ul')} Import CSV</button><button class="btn ghost sm" style="flex:1" onclick="downloadSampleCSV('staff')">${ico('dl')} Sample CSV</button></div></div>`}`);}
function saveStaff(id){const o={fn:$('tfn').value.trim(),ln:$('tln').value.trim(),email:$('tem').value.trim(),group:DB.groups[0]?.id};if(!o.fn)return;if(id)Object.assign(DB.staff.find(x=>x.id===id),o);else DB.staff.push({id:uid(),...o});save();closeSheet();render();toast('Saved');}
function editEvent(id,preset){const today=new Date().toISOString().slice(0,10);const e=id?DB.events.find(x=>x.id===id):{name:'',date:(preset&&preset>=today)?preset:today,start:'09:00',end:'17:00'};const f=DB.meta.timeFmt||'12';
  sheet(`<h3>${id?'Edit':'New'} event</h3><label class="f">Event name</label><input class="t" id="en" value="${esc(e.name)}" placeholder="e.g. Lord's Cricket Visit"><label class="f">Date</label><input class="t" type="date" id="ed" value="${e.date}" ${id?'':`min="${today}"`}>
    <div class="row" style="gap:8px;margin-top:12px"><span class="mini grow" style="font-weight:700">Time format</span><button id="tf12" class="btn sm ${f==='12'?'subtle':'ghost'}" style="width:auto" onclick="setTimeFmt('12')">12h</button><button id="tf24" class="btn sm ${f==='24'?'subtle':'ghost'}" style="width:auto" onclick="setTimeFmt('24')">24h</button></div>
    <div style="display:flex;gap:10px"><div style="flex:1"><label class="f">Start</label>${timeSel('es',e.start)}</div><div style="flex:1"><label class="f">End</label>${timeSel('ee',e.end)}</div></div>

    ${id?'':`<div style="margin-top:18px;border-top:1px solid var(--line);padding-top:14px"><div style="font-weight:700;font-size:13px;margin-bottom:2px">Add many at once</div><div class="mini" style="margin-bottom:10px">Import a CSV — columns: Event Name, Date (DD-MM-YYYY), Start Time, End Time. Times accept 12h or 24h.</div><div class="selrow" style="margin:0"><button class="btn subtle sm" style="flex:1" onclick="csvImport('events')">${ico('ul')} Import CSV</button><button class="btn ghost sm" style="flex:1" onclick="downloadSampleCSV('events')">${ico('dl')} Sample CSV</button></div></div>`}`);}

function doImport(kind){const txt=$('csvText').value.trim();if(!txt){closeSheet();return;}const lines=txt.split(/\r?\n/).filter(l=>l.trim());let n=0,un=0;const defB=kind==='students'?$('csvBatch').value:'';const today=new Date().toISOString().slice(0,10);lines.forEach((line,i)=>{const c=line.split(',').map(x=>x.trim());if(i===0&&/first\s*name|event\s*name/i.test(line))return;if(!c[0])return;if(kind==='students'){let bId=defB;if(c[4]){const bm=DB.batches.find(x=>x.name.trim().toLowerCase()===c[4].trim().toLowerCase());bId=bm?bm.id:'';}if(!bId)un++;DB.students.push({id:uid(),fn:c[0],ln:c[1]||'',cid:c[2]||'',email:c[3]||'',batch:bId});}else if(kind==='events'){const d=fromDMY(c[1]);if(!d||d<today){un++;return;}DB.events.push({id:uid(),name:c[0],date:d,start:to24(c[2]||'09:00'),end:to24(c[3]||'17:00'),batches:[],students:[],leaders:[],records:{},status:null});}else DB.staff.push({id:uid(),fn:c[0],ln:c[1]||'',email:c[2]||'',group:DB.groups[0]?.id});n++;});save();closeSheet();render();toast(n+' '+kind+' imported'+(un?' · '+un+(kind==='events'?' skipped (past/invalid)':kind==='students'?' unassigned':''):''));}

/* Saves a file. Priority on the native app: (1) your chosen SAF folder (silent, auto-
   syncs if that folder is a Drive/OneDrive folder), else (2) the native share sheet.
   On the web it falls back to a normal browser download. */
async function saveFile(name,content,mime,purpose){
  purpose=purpose||'report';
  if(isNative()){
    if(odSignedIn()&&odFolder(purpose)){
      try{await odUpload(purpose,name,content,mime);toast('Saved to OneDrive ('+odFolder(purpose).name+')');return true;}
      catch(e){toast('OneDrive save failed: '+(e&&e.message||e));}
    }
    const saf=safPlugin();
    if(saf&&safFolderName(purpose)){
      try{const data=await toBase64(content,mime);await saf.saveToFolder({key:purpose,name,data,mime:mime||'application/octet-stream'});toast('Saved to your '+purpose+' folder ('+safFolderName(purpose)+')');return true;}
      catch(e){const m=(e&&(e.message||e)+'')||'';if(m.indexOf('no-')>=0){try{localStorage.removeItem('spj_saf_'+purpose);}catch(_){}toast('Lost access to the '+purpose+' folder — please pick it again');}}
    }
    if(window.Capacitor.Plugins&&window.Capacitor.Plugins.Filesystem){
      try{const {Filesystem,Share}=window.Capacitor.Plugins;const data=await toBase64(content,mime);const w=await Filesystem.writeFile({path:name,data,directory:'CACHE'});const uri=(w&&w.uri)||'';if(Share&&Share.share&&uri){try{await Share.share({title:name,text:name,url:uri,files:[uri],dialogTitle:'Save or share '+name});}catch(e){}}toast('Saved — choose where to keep it');return true;}
      catch(e){toast('Could not save file: '+(e&&e.message||e));return false;}
    }
  }
  const blob=content instanceof Blob?content:new Blob([content],{type:mime});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(url),1500);return true;
}

const OD={authBase:'https://login.microsoftonline.com/common/oauth2/v2.0',graph:'https://graph.microsoft.com/v1.0',scope:'offline_access Files.ReadWrite User.Read',redirect:'org.spjain.attendance://oauth2redirect'};
function odCfg(){try{return JSON.parse(localStorage.getItem('spj_od')||'{}');}catch(e){return{};}}

function _b64u(a){return btoa(String.fromCharCode.apply(null,new Uint8Array(a))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
function _rand(n){const a=new Uint8Array(n);crypto.getRandomValues(a);return _b64u(a.buffer);}
async function _sha256b64(s){const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return _b64u(d);}
function odInitDeepLink(){try{const App=window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.App;if(App&&App.addListener)App.addListener('appUrlOpen',d=>{if(d&&d.url&&d.url.indexOf('oauth2redirect')>=0)odHandleRedirect(d.url);});}catch(e){}}
async function odSignIn(){if(!isNative()){toast('OneDrive works in the installed app');return;}const cid=odClientId();if(!cid){toast('Enter your Azure Client ID first');return;}const B=window.Capacitor.Plugins.Browser;if(!B){toast('Browser plugin missing — run the install steps');return;}
  const verifier=_rand(48);const challenge=await _sha256b64(verifier);const state=_rand(8);const c=odCfg();c.verifier=verifier;c.state=state;odSetCfg(c);
  const url=OD.authBase+'/authorize?client_id='+encodeURIComponent(cid)+'&response_type=code&redirect_uri='+encodeURIComponent(OD.redirect)+'&response_mode=query&scope='+encodeURIComponent(OD.scope)+'&code_challenge='+challenge+'&code_challenge_method=S256&state='+state+'&prompt=select_account';
  try{await B.open({url});}catch(e){toast('Could not open sign-in');}}
async function odHandleRedirect(urlStr){try{const u=new URL(urlStr);const code=u.searchParams.get('code');const st=u.searchParams.get('state');const err=u.searchParams.get('error_description')||u.searchParams.get('error');
  try{if(window.Capacitor.Plugins.Browser)window.Capacitor.Plugins.Browser.close();}catch(e){}
  if(!code){if(err)toast('Sign-in failed: '+err);return;}
  const c=odCfg();if(st&&c.state&&st!==c.state){toast('Sign-in state mismatch');return;}
  const body=new URLSearchParams({client_id:odClientId(),grant_type:'authorization_code',code:code,redirect_uri:OD.redirect,code_verifier:c.verifier||'',scope:OD.scope});
  const res=await fetch(OD.authBase+'/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()});
  const j=await res.json();if(!res.ok||!j.access_token){toast('Token error: '+(j.error_description||j.error||res.status));return;}
  c.access=j.access_token;c.refresh=j.refresh_token||c.refresh;c.exp=Date.now()+((j.expires_in||3600)*1000)-60000;delete c.verifier;odSetCfg(c);toast('OneDrive connected');render();
 }catch(e){toast('Sign-in error: '+(e&&e.message||e));}}
async function odToken(){const c=odCfg();if(c.access&&c.exp&&Date.now()<c.exp)return c.access;if(!c.refresh)throw new Error('Not signed in');
  const body=new URLSearchParams({client_id:odClientId(),grant_type:'refresh_token',refresh_token:c.refresh,redirect_uri:OD.redirect,scope:OD.scope});
  const res=await fetch(OD.authBase+'/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()});const j=await res.json();
  if(!res.ok||!j.access_token)throw new Error(j.error_description||'Session expired — sign in again');
  c.access=j.access_token;if(j.refresh_token)c.refresh=j.refresh_token;c.exp=Date.now()+((j.expires_in||3600)*1000)-60000;odSetCfg(c);return c.access;}
async function odFetch(path,opts){const t=await odToken();opts=opts||{};opts.headers=Object.assign({Authorization:'Bearer '+t},opts.headers||{});return fetch(path.startsWith('http')?path:OD.graph+path,opts);}

async function odBrowseRender(){const cur=_odBrowse.stack[_odBrowse.stack.length-1];const title='Choose '+(_odBrowse.key==='backup'?'backup':'report')+' folder';sheet('<h3>'+title+'</h3><div class="muted">Loading…</div>');

async function odRestore(){if(!odSignedIn()){toast('Sign in to OneDrive first');return;}const f=odFolder('backup');if(!f){toast('Set a OneDrive backup folder first');return;}

  try{const parent=f.id==='root'?'/me/drive/root':'/me/drive/items/'+f.id;const res=await odFetch(parent+'/children?$select=id,name,lastModifiedDateTime&$top=200');const j=await res.json();if(!res.ok)throw new Error('list failed');
    let files=(j.value||[]).filter(x=>/\.json$/i.test(x.name)).sort((a,b)=>(b.lastModifiedDateTime||'').localeCompare(a.lastModifiedDateTime||''));
    if(!files.length){sheet('<h3>Restore from OneDrive</h3><div class="muted">No .json backups in that folder.</div><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Close</button>');return;}
    const rows=files.slice(0,30).map(x=>`<button class="btn ghost" style="display:block;width:100%;text-align:left;margin-bottom:8px" onclick="odDoRestore('${x.id}','${esc(x.name).replace(/'/g,"\\'")}')"><b>${esc(x.name)}</b><br><span class="mini">${x.lastModifiedDateTime?new Date(x.lastModifiedDateTime).toLocaleString('en-GB'):''}</span></button>`).join('');
    sheet('<h3>Restore from OneDrive</h3><div class="muted" style="margin-bottom:10px">Newest first. This REPLACES all data on this device.</div>'+rows+'<button class="btn ghost" onclick="closeSheet()">Cancel</button>');
  }catch(e){sheet('<h3>Restore from OneDrive</h3><div class="muted">Error: '+esc(e.message||e)+'</div><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Close</button>');}}
async function odDoRestore(id,name){if(!confirm('Restore "'+name+'"? This REPLACES all current data on this device.'))return;
  try{const res=await odFetch('/me/drive/items/'+id+'/content');if(!res.ok)throw new Error('download failed');let text=await res.text();let d;try{d=JSON.parse(text);}catch(x){d=null;}
    if(d&&d.spjEnc){const pass=prompt('This backup is encrypted. Enter the passphrase:');if(!pass){toast('Cancelled');return;}try{text=await decJSON(text,pass);d=JSON.parse(text);}catch(x){alert('Wrong passphrase or corrupted file.');return;}}
    if(!d||!d.events||!d.students||!d.users)throw 0;DB=d;migrate();save(false);SESSION=null;clearTimeout(sessionTimer);closeSheet();render();toast('Restored — please sign in');
  }catch(e){alert('Could not restore this file.');}}
function odConfigSheet(){const c=odCfg();sheet(`<h3>OneDrive account</h3><div class="muted" style="margin-bottom:10px">Enter the <b>Application (client) ID</b> from your Microsoft Entra app registration, then sign in with your school account.</div><label class="f">Client ID</label><input class="t" id="odCid" value="${esc(c.clientId||'')}" placeholder="00000000-0000-0000-0000-000000000000"><button class="btn primary" style="margin-top:14px" onclick="odSaveCid()">Save Client ID</button>${odSignedIn()?`<div class="mini" style="margin-top:12px">✓ Signed in</div><button class="btn subtle" style="margin-top:8px" onclick="odSignOut()">Sign out</button>`:`<button class="btn subtle" style="margin-top:10px" onclick="odSignIn()">${ico('lock')} Sign in to OneDrive</button>`}<button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Close</button>`);}
function odSaveCid(){const v=$('odCid').value.trim();const c=odCfg();c.clientId=v;odSetCfg(c);toast('Client ID saved');render();}
function autoBackupSheet(){const cur=DB.meta.autoBackup||'off';sheet(`<h3>Auto-backup</h3><div class="muted" style="margin-bottom:12px">When the app opens and a backup is due, it saves a full JSON backup automatically. To make it a <b>cloud</b> backup, point your browser's download folder to a cloud-synced folder (iCloud Drive · OneDrive · Google Drive) — the file then syncs on its own.</div>${['off','daily','weekly'].map(o=>`<button class="btn ${cur===o?'primary':'ghost'}" style="margin-bottom:10px" onclick="setAutoBackup('${o}')">${o==='off'?'Off':o[0].toUpperCase()+o.slice(1)}</button>`).join('')}<div class="mini" style="margin-top:6px">Last backup: ${DB.meta.lastBackupAt?new Date(DB.meta.lastBackupAt).toLocaleString('en-GB'):'never'}</div>`);}
function setAutoBackup(o){DB.meta.autoBackup=o;save();closeSheet();render();toast('Auto-backup: '+o);}
function toggleSecrets(){DB.meta.includeSecrets=!DB.meta.includeSecrets;save();render();toast(DB.meta.includeSecrets?'SMTP password & token WILL be included in backups':'SMTP password & token excluded from backups');}
function serverBackupSheet(){const u=DB.meta.backupUrl||'',t=DB.meta.backupToken||'';sheet(`<h3>Server backup</h3><div class="muted" style="margin-bottom:8px">Pushes the full backup to your relay's <b>/backup</b> endpoint, which archives a timestamped copy on your server. With Auto-backup on, this happens automatically each time the app opens and a backup is due.</div><label class="f">Backup endpoint (HTTPS)</label><input class="t" id="buU" value="${esc(u)}" placeholder="https://your-relay.example.com/backup"><label class="f">Relay token (optional)</label><input class="t" id="buT" value="${esc(t)}"><button class="btn primary" style="margin-top:16px" onclick="saveServerBackup()">Save</button><button class="btn subtle" style="margin-top:10px" onclick="pushBackup(true)">${ico('share')} Back up to server now</button><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Close</button>${DB.meta.lastServerBackup?`<div class="mini" style="margin-top:8px">Last server backup: ${new Date(DB.meta.lastServerBackup).toLocaleString('en-GB')}</div>`:''}`);}
function saveServerBackup(){DB.meta.backupUrl=$('buU').value.trim();DB.meta.backupToken=$('buT').value.trim();save();closeSheet();render();toast('Server backup settings saved');}
/* ---- optional passphrase encryption (AES-256-GCM, key stays on device) ---- */
const cryptoOk=(typeof crypto!=='undefined'&&crypto.subtle);
function bkPass(){try{return localStorage.getItem('spj_bk_pass')||'';}catch(e){return '';}}
function _b64(bytes){let s='';const a=new Uint8Array(bytes);for(let i=0;i<a.length;i++)s+=String.fromCharCode(a[i]);return btoa(s);}
function _ub64(str){const s=atob(str);const a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function _deriveKey(pass,salt,use){const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:120000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,[use]);}
async function encJSON(text,pass){const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12));const key=await _deriveKey(pass,salt,'encrypt');const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(text));return JSON.stringify({spjEnc:1,alg:'AES-GCM',iter:120000,salt:_b64(salt),iv:_b64(iv),ct:_b64(ct)});}
async function decJSON(fileText,pass){let d;try{d=JSON.parse(fileText);}catch(e){return fileText;}if(!d||!d.spjEnc)return fileText;const key=await _deriveKey(pass,_ub64(d.salt),'decrypt');const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:_ub64(d.iv)},key,_ub64(d.ct));return new TextDecoder().decode(pt);}
async function maybeEncrypt(json,base){const p=bkPass();if(p&&cryptoOk){return {text:await encJSON(json,p),name:base+'.enc.json'};}return {text:json,name:base+'.json'};}
function encSheet(){const has=!!bkPass();sheet(`<h3>Backup encryption</h3><div class="muted" style="margin-bottom:10px">Encrypts every backup (download · cloud share · server) with AES-256 from your passphrase. The passphrase is kept <b>only on this device</b>, never inside the backup — you'll need it to restore.${cryptoOk?'':' <b style="color:var(--a1)">Not supported in this browser.</b>'}</div><label class="f">Passphrase</label><input class="t" id="bkP" type="password" placeholder="${has?'•••••••• (currently set)':'Enter a passphrase'}"><button class="btn primary" style="margin-top:16px" ${cryptoOk?'':'disabled'} onclick="saveBkPass()">${has?'Update passphrase':'Enable encryption'}</button>${has?`<button class="btn danger" style="margin-top:10px" onclick="clearBkPass()">Turn off encryption</button>`:''}<button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Cancel</button>`);}
function saveBkPass(){const p=$('bkP').value;if(!p){toast('Enter a passphrase');return;}try{localStorage.setItem('spj_bk_pass',p);}catch(e){}closeSheet();render();toast('Backup encryption enabled');}
function clearBkPass(){if(!confirm('Turn off encryption? New backups will be unencrypted (existing encrypted files still need the passphrase).'))return;try{localStorage.removeItem('spj_bk_pass');}catch(e){}closeSheet();render();toast('Encryption off');}

async function shareBackup(){DB.meta.backupRev=DB.meta.rev||0;DB.meta.app='SPJ Attendance';DB.meta.version=2;DB.meta.lastBackupAt=Date.now();persist();const {text,name}=await maybeEncrypt(exportJSON(),'spj-attendance-backup-'+new Date().toISOString().slice(0,10));try{const file=new File([text],name,{type:'application/json'});if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:'SPJ Attendance backup'});toast('Shared'+(bkPass()?' (encrypted)':'')+' — save to iCloud / OneDrive / Drive');render();return;}}catch(e){}dl(name,text,'application/json');toast('Backup downloaded'+(bkPass()?' (encrypted)':''));render();}
/* on-device snapshots */
function openSnapshots(){sheet(`<h3>On-device snapshots</h3><div class="muted" style="margin-bottom:8px">Automatic safety copies kept on this device (auto after each completed event & periodically). Restoring reverts all data to that point.</div><button class="btn subtle sm" onclick="snapshotNow()">${ico('dl')} Create snapshot now</button><div id="snapList" style="margin-top:12px">Loading…</div><button class="btn ghost" style="margin-top:14px" onclick="closeSheet()">Close</button>`);fillSnaps();}
async function fillSnaps(){const el=$('snapList');if(!el)return;const all=await idbAll('snaps');all.sort((a,b)=>b.ts-a.ts);el.innerHTML=all.length?all.map(s=>`<div class="rowline"><div class="grow"><div style="font-weight:600">${new Date(s.ts).toLocaleString('en-GB')}</div><div class="mini">${(s.size/1024).toFixed(1)} KB</div></div><button class="btn sm subtle" onclick="restoreSnap(${s.ts})">Restore</button></div>`).join(''):'<div class="mini">No snapshots yet.</div>';}
async function snapshotNow(){await maybeSnapshot(true);toast('Snapshot created');fillSnaps();}
async function restoreSnap(ts){if(!confirm('Restore this snapshot? Current data will be replaced.'))return;const all=await idbAll('snaps');const s=all.find(x=>x.ts===ts);if(!s)return;try{DB=JSON.parse(s.data);migrate();persist();closeSheet();SESSION=null;clearTimeout(sessionTimer);render();toast('Snapshot restored — please sign in');}catch(e){toast('Restore failed');}}

/* ================= EMAIL / SMTP ================= */
function editRecipients(){const list=(DB.recipients||[]);sheet(`<h3>Default recipients</h3><div class="muted" style="margin-bottom:8px">Attendance reports are emailed to these addresses.</div><div id="recList">${recRows(list)}</div><label class="f">Add email</label><div class="selrow" style="margin:0"><input class="t" id="recNew" placeholder="name@spjain.org"><button class="btn subtle sm" onclick="addRecipient()">Add</button></div><button class="btn primary" style="margin-top:16px" onclick="closeSheet()">Done</button>`);}
function recRows(list){return list.length?list.map((e,i)=>`<div class="rowline"><div class="grow" style="font-weight:600">${esc(e)}</div><button class="btn sm danger" onclick="delRecipient(${i})">${ico('x')}</button></div>`).join(''):'<div class="mini">No recipients yet.</div>';}
function addRecipient(){const v=$('recNew').value.trim();if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v)){toast('Enter a valid email');return;}DB.recipients=DB.recipients||[];if(DB.recipients.includes(v)){toast('Already added');return;}DB.recipients.push(v);save();$('recNew').value='';$('recList').innerHTML=recRows(DB.recipients);}
function delRecipient(i){DB.recipients.splice(i,1);save();$('recList').innerHTML=recRows(DB.recipients);}
function editSmtp(){const s=DB.smtp||{};sheet(`<h3>Email / SMTP settings</h3><div class="muted" style="margin-bottom:6px">Browsers can't speak SMTP directly, so sending uses a small HTTPS relay you host (e.g. a serverless function) that accepts these settings. Leave the relay blank to send via your device's share sheet instead.</div>
  <label class="f">From name</label><input class="t" id="smFn" value="${esc(s.fromName||'')}">
  <label class="f">From email</label><input class="t" id="smFe" value="${esc(s.fromEmail||'')}" placeholder="attendance@spjain.org">
  <label class="f">SMTP host</label><input class="t" id="smH" value="${esc(s.host||'')}" placeholder="smtp.office365.com">
  <div style="display:flex;gap:10px"><div style="flex:1"><label class="f">Port</label><input class="t" id="smP" value="${esc(s.port||'587')}"></div><div style="flex:1"><label class="f">Security</label><select class="t" id="smS"><option value="tls" ${s.secure==='tls'?'selected':''}>STARTTLS</option><option value="ssl" ${s.secure==='ssl'?'selected':''}>SSL/TLS</option><option value="none" ${s.secure==='none'?'selected':''}>None</option></select></div></div>
  <label class="f">Username</label><input class="t" id="smU" value="${esc(s.user||'')}" autocomplete="off">
  <label class="f">Password / App password</label><input class="t" id="smPw" type="password" value="${esc(s.pass||'')}" autocomplete="new-password">
  <label class="f">Send relay endpoint (HTTPS)</label><input class="t" id="smR" value="${esc(s.relay||'')}" placeholder="https://your-relay.example.com/send">
  <button class="btn primary" style="margin-top:16px" onclick="saveSmtp()">Save settings</button><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Cancel</button>`);}
function saveSmtp(){DB.smtp={fromName:$('smFn').value.trim(),fromEmail:$('smFe').value.trim(),host:$('smH').value.trim(),port:$('smP').value.trim(),secure:$('smS').value,user:$('smU').value.trim(),pass:$('smPw').value,relay:$('smR').value.trim()};save();closeSheet();render();toast('Email settings saved');}
function blobToB64(blob){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result).split(',')[1]);r.onerror=rej;r.readAsDataURL(blob);});}
async function emailReport(subject,filename,blob,mime){
  mime=mime||'application/octet-stream';
  const to=(DB.recipients||[]).slice();if(!to.length){toast('No recipients set — add them in More → Email');return;}
  const s=DB.smtp||{};
  if(s.relay){
    snack('Sending email…',null,4000);
    try{
      const b64=await blobToB64(blob);
      const res=await fetch(s.relay,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({host:s.host,port:s.port,secure:s.secure,user:s.user,pass:s.pass,fromName:s.fromName,from:s.fromEmail,to,subject,filename,mime,attachmentBase64:b64})});
      if(res.ok){snack('✓ Email sent successfully to '+to.length+' recipient'+(to.length>1?'s':''),null,3000);}
      else{let msg='';try{msg=(await res.text()).slice(0,120);}catch(e){}snack('✗ Send failed ('+res.status+') '+msg,null,4500);}
    }catch(err){snack('✗ Send failed: '+(err&&err.message||'network error'),null,4500);}
    return;
  }
  // No relay → use device share sheet (works offline; user picks their mail app)
  if(isNative()){await saveFile(filename,blob,mime);snack('File ready — pick your email app to attach & send',null,3500);return;}
  try{const file=new File([blob],filename,{type:mime});if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:subject,text:'To: '+to.join(', ')});snack('Opened share — choose your email app',null,3000);return;}}catch(e){}
  try{dl(filename,blob,mime);}catch(e){}
  location.href='mailto:'+encodeURIComponent(to.join(','))+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent('Attendance file attached: '+filename);
  snack('No relay set — file downloaded & email draft opened',null,4000);
}
function csvBlob(rows){return new Blob([rows.map(r=>r.map(csvEsc).join(',')).join('\n')],{type:'text/csv'});}

/* ================= PDF / EXCEL ================= */
function pdfReady(){if(!window.jspdf||!window.jspdf.jsPDF){toast('PDF engine needs internet once to load');return false;}return true;}
async function shareOrDownload(doc,fname,title,text){
  let blob;try{blob=doc.output('blob');}catch(e){toast('Could not export PDF');return;}
  if(isNative()){await saveFile(fname,blob,'application/pdf','report');return;}
  try{const file=new File([blob],fname,{type:'application/pdf'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){try{await navigator.share({files:[file],title,text});toast('Shared');return;}catch(e){}}
  }catch(e){}
  try{doc.save(fname);toast('PDF downloaded');}catch(e){try{const url=URL.createObjectURL(blob);window.open(url,'_blank');toast('PDF opened');}catch(err){toast('Could not export PDF');}}
}
function csvEsc(s){s=String(s==null?'':s);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}
function toDMY(iso){const m=String(iso||'').match(/^(\d{4})-(\d{2})-(\d{2})$/);return m?m[3]+'-'+m[2]+'-'+m[1]:(iso||'');}
function fromDMY(s){s=String(s||'').trim();let m=s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})$/);if(m)return m[3]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[1]).padStart(2,'0');m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(m)return s;const p=new Date(s);return isNaN(p)?'':p.toISOString().slice(0,10);}
function eventRows(e){const lbl=r=>({present:'Present',absent:'Absent',late:'Late'}[r]||'Unmarked');const mk=e.markedAt?fmtDT(e.markedAt):'';return peopleForEvent(e).map(p=>[e.name,toDMY(e.date),p.fn+' '+p.ln,p.role==='leader'?'Leader':'Student',p.cid||'',p.email||'',p.role==='leader'?'':batchName(p.batch),lbl(e.records[p.id]),mk]);}
const CSV_HEAD=['Event','Date','Name','Role','Campus ID','Email','Batch','Status','Marked At'];
function exportEventCSV(eid){const e=DB.events.find(x=>x.id===eid);const rows=[CSV_HEAD,...eventRows(e)];dl(`Attendance_${e.name.replace(/[^a-z0-9]+/gi,'_')}_${e.date}.csv`,rows.map(r=>r.map(csvEsc).join(',')).join('\n'),'text/csv');toast('Excel (CSV) exported');}
function exportMonthCSV(){const evs=eventsInMonth(repY,repM);if(!evs.length){toast('No events this month');return;}let rows=[CSV_HEAD];evs.forEach(e=>{rows=rows.concat(eventRows(e));});dl(`Attendance_${MONTHS[repM]}_${repY}.csv`,rows.map(r=>r.map(csvEsc).join(',')).join('\n'),'text/csv');toast('Month Excel (CSV) exported');}
function eventPdfBlock(doc,e,y){const c=scount(e);const lbl=r=>({present:'Present',absent:'Absent',late:'Late'}[r]||'Unmarked');if(y>250){doc.addPage();y=18;}doc.setFontSize(13);doc.setTextColor(30,34,51);doc.text(e.name,14,y);y+=6;doc.setFontSize(9);doc.setTextColor(120);doc.text(fmtDate(e.date)+' · '+fmtTime(e.start)+'-'+fmtTime(e.end)+'   Students — Present '+c.present+' · Late '+c.late+' · Absent '+c.absent,14,y);y+=6;if(e.markedAt){doc.setTextColor(150);doc.text('Attendance marked: '+fmtDT(e.markedAt)+(e.markedBy?' · by '+e.markedBy:''),14,y);y+=6;}doc.setTextColor(120);doc.setDrawColor(225);doc.line(14,y,196,y);y+=5;doc.setFontSize(9);studentsForEvent(e).forEach(p=>{if(y>285){doc.addPage();y=18;}const r=e.records[p.id];const col=r==='present'?[26,157,91]:r==='late'?[124,58,237]:r==='absent'?[208,36,47]:[120,120,120];doc.setTextColor(30,34,51);doc.text((p.fn+' '+p.ln).slice(0,32),16,y);doc.setTextColor(120);doc.text(((p.cid||'')+'  '+(p.email||'')).slice(0,46),90,y);doc.setTextColor(...col);doc.text(lbl(r),176,y);y+=6;});
  const ls=leaderStat(e);if(ls.length){if(y>278){doc.addPage();y=18;}doc.setTextColor(120);doc.setFontSize(8);doc.text('Leaders (not counted in stats): '+ls.map(x=>x.l.fn+' '+x.l.ln+' — '+x.label).join(', '),16,y,{maxWidth:180});y+=8;}
  return y+6;}
function buildEventDoc(e){const {jsPDF}=window.jspdf;const doc=new jsPDF();doc.setFontSize(18);doc.setTextColor(208,36,47);doc.text('SPJ London — Attendance',14,18);eventPdfBlock(doc,e,30);doc.setTextColor(150);doc.setFontSize(8);doc.text('Generated by SPJ Attendance — on-device',14,292);return doc;}
function buildMonthDoc(evs){const {jsPDF}=window.jspdf;const doc=new jsPDF();doc.setFontSize(18);doc.setTextColor(208,36,47);doc.text('SPJ London — '+MONTHS[repM]+' '+repY,14,18);let P=0,A=0,L=0;evs.forEach(e=>{const c=scount(e);P+=c.present;A+=c.absent;L+=c.late;});doc.setFontSize(10);doc.setTextColor(30,34,51);doc.text('Events: '+evs.length+'   Students — Present: '+P+'   Late: '+L+'   Absent: '+A,14,27);let y=36;evs.forEach(e=>{y=eventPdfBlock(doc,e,y);});doc.setTextColor(150);doc.setFontSize(8);doc.text('SPJ Attendance — on-device',14,292);return doc;}
function exportEventPDF(eid){if(!pdfReady())return;const e=DB.events.find(x=>x.id===eid);shareOrDownload(buildEventDoc(e),`Attendance_${e.name.replace(/[^a-z0-9]+/gi,'_')}_${e.date}.pdf`,'Attendance',e.name);}
function emailEventReport(eid){const e=DB.events.find(x=>x.id===eid);emailReport('Attendance — '+e.name+' ('+toDMY(e.date)+')',`Attendance_${e.name.replace(/[^a-z0-9]+/gi,'_')}_${e.date}.csv`,csvBlob([CSV_HEAD,...eventRows(e)]),'text/csv');}
function exportMonthPDF(){if(!pdfReady())return;const evs=eventsInMonth(repY,repM);if(!evs.length){toast('No events this month');return;}shareOrDownload(buildMonthDoc(evs),'Attendance_'+MONTHS[repM]+'_'+repY+'.pdf','Attendance '+MONTHS[repM]+' '+repY,'Monthly attendance');}
function emailMonthReport(){const evs=eventsInMonth(repY,repM);if(!evs.length){toast('No events this month');return;}let rows=[CSV_HEAD];evs.forEach(e=>{rows=rows.concat(eventRows(e));});emailReport('Attendance — '+MONTHS[repM]+' '+repY,'Attendance_'+MONTHS[repM]+'_'+repY+'.csv',csvBlob(rows),'text/csv');}

/* ================= VISIBILITY / BOOT ================= */
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&SESSION&&Date.now()>SESSION.exp){endSession();render();toast('Session timed out — please sign in');}});
setInterval(()=>{const c=$('clock');if(c)c.textContent=new Date().toLocaleTimeString('en-GB');},1000);
init();
</script>
