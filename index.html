<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#D0242F">
<title>SPJ Attendance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#D0242F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Attendance">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/firebase@10/firebase-app-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10/firebase-firestore-compat.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer onload="try{typeof render==='function'&&render()}catch(e){}"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --a1:#D0242F; --a1d:#a81b25; --acc-soft:#fdeaeb;
  --cta:#F5C443; --cta-ink:#4a3a00; --charcoal:#2b2f38;
  --txt:#1a2036; --muted:#646c88; --dim:#98a0bb; --line:#e5e8f1; --bg:#eef1f8; --card:#fff;
  --present:#1a9d5b; --present-bg:#e5f6ed;
  --absent:#D0242F; --absent-bg:#fdeaeb;
  --late:#7c3aed; --late-bg:#f1eafe;
  --orange:#d97706; --blue:#2563eb;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--txt);background:var(--bg);overscroll-behavior:none;overflow:hidden;-webkit-font-smoothing:antialiased;}
#app{width:100%;max-width:100%;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative;}
#header{flex:0 0 auto;}
#view{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;padding-bottom:calc(90px + env(safe-area-inset-bottom));}
#ptr{position:fixed;top:calc(env(safe-area-inset-top) + 6px);left:50%;transform:translateX(-50%) translateY(-46px);width:36px;height:36px;border-radius:50%;background:#fff;box-shadow:0 3px 12px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;opacity:0;z-index:60;transition:opacity .18s;}
#ptr .r{width:18px;height:18px;border:2.6px solid var(--a1);border-top-color:transparent;border-radius:50%;}
#ptr.spin .r{animation:ptrsp .7s linear infinite}@keyframes ptrsp{to{transform:rotate(360deg)}}
.ic{width:20px;height:20px;display:inline-block;vertical-align:middle;}
.wrap{padding:14px;}
.topbar{position:sticky;top:0;z-index:20;padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));padding-left:calc(16px + env(safe-area-inset-left));padding-right:calc(16px + env(safe-area-inset-right));display:flex;align-items:center;gap:10px;background:var(--a1);color:#fff;}
.topbar h1{font-size:17px;margin:0;font-weight:800;flex:1;text-align:center;color:#fff;}
.topbar h1.left{text-align:left;}
.hbtn{background:rgba(255,255,255,.18);border:none;color:#fff;width:40px;height:40px;border-radius:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hbtn.g{background:#fff;color:var(--a1);}
.hspace{width:40px;flex-shrink:0;}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 3px 12px rgba(26,32,54,.05);}
.card.tap{cursor:pointer;}.card.tap:active{transform:scale(.99);}
.card.unassigned{background:#fff7ed;border-color:#fed7aa}
.badge-un{background:#ffedd5;color:#c2410c;font-size:9px;font-weight:800;padding:2px 7px;border-radius:999px;margin-left:6px}
.row{display:flex;align-items:center;gap:12px;}
.grow{flex:1;min-width:0;}
.title{font-weight:700;font-size:15.5px;}
.muted{color:var(--muted);font-size:13px;}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:5px 11px;border-radius:999px;}
.pill.green{background:var(--present-bg);color:var(--present);}
.pill.red{background:var(--absent-bg);color:var(--absent);}
.pill.orange{background:#fff3e0;color:var(--orange);}
.pill.blue{background:#e8f0ff;color:var(--blue);}
@keyframes livePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.pill.live{animation:livePulse 1.5s ease-in-out infinite;transform-origin:center}
.sectlabel{font-size:13px;font-weight:800;color:var(--txt);margin:20px 6px 10px;display:flex;align-items:center;justify-content:space-between;}
.logo{border-radius:22%;border:2px solid #fff;background:var(--a1);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;box-shadow:0 3px 12px rgba(208,36,47,.28);flex-shrink:0;overflow:hidden;padding:0 1px;box-sizing:border-box;}
.logo b{font-weight:900;letter-spacing:.02em;line-height:.9;}
.logo span{font-weight:800;letter-spacing:.12em;margin-right:-.12em;opacity:.95;line-height:1;max-width:100%;white-space:nowrap;}
.calhead{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 14px;}
.calhead b{font-size:17px;font-weight:800;}
.calhead button{background:var(--acc-soft);border:none;color:var(--a1);width:34px;height:34px;border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.dow{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:10px;font-weight:800;color:var(--dim);margin-bottom:8px;}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;font-weight:700;border-radius:12px;cursor:pointer;position:relative;}
.cell.mute{color:var(--dim);opacity:.55;}
.cell.today{color:var(--a1);}
.cell.sel{background:var(--a1);color:#fff;}
.cell .evdot{width:5px;height:5px;border-radius:50%;background:var(--a1);position:absolute;bottom:6px;}
.cell.sel .evdot{background:#fff;}
.today-banner{background:linear-gradient(135deg,var(--a1),#e64550);color:#fff;border-radius:18px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;box-shadow:0 6px 18px rgba(208,36,47,.28)}
.today-banner .tb-day{font-weight:800;font-size:16px;line-height:1.2}
.today-banner .tb-sub{font-size:12px;opacity:.9;margin-top:2px}
.today-banner .tb-clock{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:.5px}
.calbar{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:8px 10px;margin-bottom:10px;box-shadow:0 2px 8px rgba(26,32,54,.04)}
.calbar b{flex:1;text-align:center;font-size:15px;font-weight:800;cursor:pointer}
.calbar button{background:var(--acc-soft);border:none;color:var(--a1);width:32px;height:32px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.calbar .mini-toggle{width:auto;padding:0 12px;font-size:12px;font-weight:800}
.compactcal{padding:10px}
.compactcal .grid{gap:2px}
.compactcal .cell{font-size:12.5px;border-radius:8px}
.compactcal .cell .evdot{width:4px;height:4px;bottom:4px}
.compactcal .dow{font-size:9px;margin-bottom:4px}
.seg2{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.seg2 button{border:0.5px solid var(--line);background:#fff;color:var(--muted);font-size:13px;font-weight:700;padding:7px 13px;border-radius:999px;cursor:pointer}
.seg2 button.on{background:var(--a1);border-color:transparent;color:#fff}
.seg2 .calbtn{margin-left:auto;width:40px;height:34px;display:flex;align-items:center;justify-content:center;padding:0}
.seg2 .calbtn.on{background:var(--a1);color:#fff;border-color:transparent}
.weekstrip{display:flex;align-items:center;gap:4px;margin-bottom:8px}
.weekstrip .wknav{background:var(--acc-soft);border:none;color:var(--a1);width:26px;height:52px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wkdays{flex:1;display:flex;justify-content:space-between;gap:2px}
.wkday{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;position:relative;color:var(--txt)}
.wkday .wd{font-size:10px;color:var(--muted);font-weight:700}
.wkday .dn{font-size:15px;font-weight:700;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.wkday.today .wd,.wkday.today .dn{color:var(--a1)}
.wkday.sel .dn{background:var(--a1);color:#fff}
.wkdot{position:absolute;bottom:0;width:5px;height:5px;border-radius:50%;background:var(--a1)}
.wkday.sel .wkdot{background:var(--a1)}
.agday{font-size:13px;color:var(--txt);font-weight:800;margin:16px 4px 8px}
.evcard{background:#fff;border:0.5px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;box-shadow:0 2px 8px rgba(26,32,54,.04)}
.evcard .title{font-weight:700;font-size:15.5px}
.evcard .pill{flex-shrink:0}
.card.setup,.evcard.setup{border-color:#f5d78a;background:#fff8e6}
.badge-setup{background:#ffedd5;color:#b45309;font-size:9px;font-weight:800;padding:2px 7px;border-radius:999px;margin-left:6px;white-space:nowrap}
.daychip{display:inline-flex;align-items:center;gap:8px;background:var(--acc-soft);color:var(--a1);font-weight:700;font-size:13px;padding:7px 13px;border-radius:999px;border:none;cursor:pointer}
.spark{display:flex;align-items:flex-end;gap:4px;height:46px;margin-top:14px}
.spark span{flex:1;background:var(--a1);border-radius:3px 3px 0 0;min-height:5px;opacity:.85}
.pbar{height:8px;border-radius:5px;background:var(--line);overflow:hidden;margin-top:10px}
.pbar i{display:block;height:100%;border-radius:5px}
.minigrid{display:flex;gap:8px;margin-top:12px}
.minigrid>div{flex:1;text-align:center;background:var(--bg);border-radius:10px;padding:8px 4px}
.minigrid b{display:block;font-size:18px;font-weight:800}
.minigrid span{font-size:10px;color:var(--muted);font-weight:700}
.collbtn{width:28px;height:28px;border-radius:8px;border:none;background:var(--a1);color:#fff;font-weight:900;font-size:19px;line-height:1;cursor:pointer;margin-right:9px;display:inline-flex;align-items:center;justify-content:center;vertical-align:middle}
.evrow{display:flex;gap:13px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px 14px;margin-bottom:10px;cursor:pointer;box-shadow:0 2px 8px rgba(26,32,54,.04);}
.datebadge{width:44px;text-align:center;flex-shrink:0;border-right:1px solid var(--line);padding-right:12px;}
.datebadge .wd{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.datebadge .d{font-size:20px;font-weight:800;line-height:1.05;color:var(--a1);}
.datebadge .m{font-size:10px;font-weight:800;color:var(--muted);margin-top:2px;}
.btn{border:none;border-radius:14px;padding:15px 16px;font-size:15px;font-weight:800;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn.primary{background:var(--a1);color:#fff;}
.btn.cta{background:var(--cta);color:var(--cta-ink);}
.btn.ghost{background:#fff;color:var(--txt);border:1px solid var(--line);}
.btn.danger{background:var(--a1);color:#fff;}
.btn.sm{width:auto;padding:9px 13px;font-size:13px;border-radius:11px;}
.btn.subtle{background:var(--acc-soft);color:var(--a1);}
.btn[disabled]{opacity:.45;pointer-events:none;}
.fab{position:fixed;bottom:calc(96px + env(safe-area-inset-bottom));right:calc(16px + env(safe-area-inset-right));width:56px;height:56px;border-radius:50%;background:var(--a1);color:#fff;border:none;cursor:pointer;box-shadow:0 5px 16px rgba(208,36,47,.35);z-index:30;display:flex;align-items:center;justify-content:center;}
.fab .ic{width:28px;height:28px;color:#fff;}
.nav{position:fixed;bottom:0;left:0;right:0;width:100%;background:#fff;border-top:1px solid var(--line);display:flex;z-index:40;padding:8px 0 calc(12px + env(safe-area-inset-bottom));}
.nav button{flex:1;background:none;border:none;color:var(--dim);font-size:11px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
.nav button.active{color:var(--a1);}
.nav button .ic{width:22px;height:22px;}
.evhead{background:var(--a1);color:#fff;border-radius:22px;padding:22px;position:relative;overflow:hidden;box-shadow:0 6px 18px rgba(208,36,47,.22);}
.evhead h2{margin:0 0 12px;font-size:22px;font-weight:800;}
.evhead .meta{display:flex;align-items:center;gap:9px;font-size:14px;opacity:.95;margin-bottom:7px;}
.evhead .meta .ic{width:17px;height:17px;}
.evhead .pill{background:rgba(255,255,255,.22);color:#fff;margin-top:10px;}
.twocol{display:flex;gap:12px;margin:12px 0;}
.twocol .card{flex:1;text-align:center;margin:0;}
.twocol .n{font-size:28px;font-weight:800;color:var(--a1);}
.twocol .l{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px;}
.avatar{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;color:#fff;}
.avatar.sm{width:34px;height:34px;border-radius:10px;font-size:12px;}
.avatar.lead{background:#f59e0b;}
.avatar.c0{background:#10b981}.avatar.c1{background:#3b82f6}.avatar.c2{background:#7c5cff}.avatar.c3{background:#ec4899}.avatar.c4{background:#f59e0b}.avatar.c5{background:#0891b2}
.avstack{display:flex;flex-wrap:wrap;gap:6px}
.searchbox{position:relative;margin-bottom:10px}
.searchbox .ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--dim)}
.search{width:100%;padding:12px 14px 12px 42px;border:1px solid var(--line);border-radius:14px;font-size:15px;background:#fff;color:var(--txt)}
.search:focus{outline:none;border-color:var(--a1)}
.ftabs{display:flex;gap:8px;overflow-x:auto;padding:2px;margin:6px 0}
.ftab{flex-shrink:0;border:1px solid var(--line);background:#fff;padding:8px 13px;border-radius:13px;font-weight:800;font-size:13px;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;line-height:1.2;min-width:56px}
.ftab .c{font-size:16px}
.ftab.on{background:var(--a1);border-color:transparent;color:#fff}
.mrow{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:8px 11px;margin-bottom:7px}
.mrow.present{border-color:var(--present);background:var(--present-bg)}
.mrow.absent{border-color:var(--absent);background:var(--absent-bg)}
.mrow.late{border-color:var(--late);background:var(--late-bg)}
.mrow .nm{font-weight:700;font-size:14px;line-height:1.15}
.mrow .m2{font-size:10.5px;color:var(--muted);margin-top:1px;line-height:1.2}
.mrow .stx{font-weight:800}
.statusbtn{width:34px;height:34px;border-radius:11px;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--dim)}
.statusbtn.present{background:var(--present);border-color:transparent;color:#fff}
.statusbtn.absent{background:var(--absent);border-color:transparent;color:#fff}
.statusbtn.late{background:var(--late);border-color:transparent;color:#fff}
.statusbtn .ic{width:18px;height:18px}
.legend{display:flex;justify-content:center;gap:20px;padding:10px;font-size:12px;font-weight:700;color:var(--muted)}
.legend span{display:flex;align-items:center;gap:7px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;background:currentColor}
.donut{width:120px;height:120px;border-radius:50%;position:relative;flex-shrink:0}
.donut::after{content:"";position:absolute;inset:21px;background:#fff;border-radius:50%;box-shadow:inset 0 1px 5px rgba(26,32,54,.08)}
.donut .mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2}
.donut .mid b{font-size:25px;font-weight:800;color:var(--txt)}
.donut .mid small{font-size:9px;color:var(--muted)}
.donutwrap{display:flex;align-items:center;gap:20px}
.legrow{font-size:15px;font-weight:800;margin:7px 0;display:flex;align-items:center;gap:9px}
.legrow small{color:var(--muted);font-weight:600;font-size:13px}
.dash-head{font-weight:800;font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:9px}
.reddot{width:10px;height:18px;border-radius:4px;background:var(--a1);display:inline-block;flex-shrink:0}
.darkcard{background:var(--charcoal);color:#fff;border:none}
.dash-tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:16px}
.dash-tiles .t3{border-radius:13px;padding:11px 6px;text-align:center;border:1px solid transparent}
.dash-tiles .t3 b{display:block;font-size:21px;font-weight:800}
.dash-tiles .t3 span{font-size:10px;font-weight:700;color:var(--muted)}
.dash-tiles .p{background:var(--present-bg);border-color:rgba(26,157,91,.2)}.dash-tiles .p b{color:var(--present)}
.dash-tiles .a{background:var(--absent-bg);border-color:rgba(208,36,47,.2)}.dash-tiles .a b{color:var(--absent)}
.dash-tiles .l{background:var(--late-bg);border-color:rgba(124,58,237,.2)}.dash-tiles .l b{color:var(--late)}
.statwrap{width:40px;height:40px;border-radius:12px;background:var(--acc-soft);color:var(--a1);display:flex;align-items:center;justify-content:center;margin:0 auto 6px}
.bento{display:grid;grid-template-columns:1fr 1fr;gap:10px}.bento .wide{grid-column:1/-1}
.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(26,32,54,.04)}
.stat .n{font-size:22px;font-weight:800}.stat .l{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px}
.three{grid-template-columns:1fr 1fr 1fr}
.selrow{display:flex;gap:10px;margin-bottom:12px}
.selrow select{flex:1;padding:12px;border:1px solid var(--line);border-radius:14px;font-size:14px;font-weight:700;background:#fff;color:var(--txt)}
.chips2{display:flex;gap:8px;margin-bottom:12px}
.chips2 button{flex:1;border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:12px;padding:9px 4px;font-weight:800;font-size:12px;cursor:pointer}
.chips2 button.on{background:var(--a1);border-color:transparent;color:#fff}
.sharerow{display:flex;justify-content:space-around;text-align:center;margin-top:10px}
.sharerow button{background:none;border:none;cursor:pointer;font-size:12px;color:var(--muted);font-weight:700;display:flex;flex-direction:column;align-items:center;gap:7px}
.sharerow .ci{width:50px;height:50px;border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff}
.sharerow .ci .ic{width:24px;height:24px}
.pdficon{width:110px;height:132px;margin:0 auto 18px;background:#fff;border:1px solid var(--line);border-radius:14px;position:relative;display:flex;align-items:flex-end;justify-content:center;padding-bottom:22px;box-shadow:0 6px 16px rgba(26,32,54,.1)}
.pdficon .lines{position:absolute;top:16px;left:16px;right:38px}.pdficon .lines i{display:block;height:4px;background:var(--line);border-radius:3px;margin-bottom:7px}
.pdficon .tag{background:var(--a1);color:#fff;font-weight:800;font-size:14px;padding:6px 13px;border-radius:9px}
.slist{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(26,32,54,.04)}
.sitem{display:flex;align-items:center;gap:13px;padding:14px 16px;border-bottom:1px solid var(--line);cursor:pointer}
.sitem:last-child{border-bottom:none}
.sitem .ic0{width:38px;height:38px;border-radius:12px;background:#fff;border:1.5px solid var(--a1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.toolbar .searchbox{flex:1;margin:0}
.editbtn{border:1px solid var(--a1);background:#fff;color:var(--a1);border-radius:12px;padding:11px 14px;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px}
.editbtn.on{background:var(--a1);color:#fff}
.selbar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px 12px;margin-bottom:12px;box-shadow:0 2px 8px rgba(26,32,54,.04)}

function ico(n,e){return `<svg class="ic ${e||''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">${P[n]||''}</svg>`;}
function logoHTML(size){const b=Math.round(size*.34),s=Math.round(size*.11);return `<div class="logo" style="width:${size}px;height:${size}px"><b style="font-size:${b}px">SPJ</b><span style="font-size:${s}px">LONDON</span></div>`;}

/* ================= SECURITY (prototype hashing) ================= */
function h(s){s=String(s==null?'':s).trim().toLowerCase();let x=5381;for(let i=0;i<s.length;i++)x=((x<<5)+x+s.charCodeAt(i))>>>0;return x.toString(16);}
function hpw(s){s=String(s==null?'':s);let x=5381;for(let i=0;i<s.length;i++)x=((x<<5)+x+s.charCodeAt(i))>>>0;return x.toString(16);}
let SESSION=null, sessionTimer=null;
const TIMEOUT_MS=2*60*60*1000; // 2 hours
function persistSess(){try{if(SESSION)sessionStorage.setItem('spj_sess',JSON.stringify(SESSION));}catch(e){}}
function endSession(){SESSION=null;clearTimeout(sessionTimer);try{sessionStorage.removeItem('spj_sess');}catch(e){}}
function restoreSession(){try{const s=JSON.parse(sessionStorage.getItem('spj_sess')||'null');if(s&&s.exp>Date.now()&&findUser(s.u)){SESSION=s;scheduleTimeout();}else{try{sessionStorage.removeItem('spj_sess');}catch(e){}}}catch(e){}}
function startSession(rec){SESSION={u:rec.u,role:rec.role,exp:Date.now()+TIMEOUT_MS};persistSess();scheduleTimeout();}
function scheduleTimeout(){clearTimeout(sessionTimer);if(!SESSION)return;sessionTimer=setTimeout(()=>{endSession();render();toast('Session timed out — please sign in');},Math.max(0,SESSION.exp-Date.now()));}

/* ================= DATA (IndexedDB primary + localStorage mirror) ================= */
const KEY='spj_attend_v2';
let DB,_idb=null;
function openDB(){return new Promise(res=>{if(typeof indexedDB==='undefined')return res(null);let r;try{r=indexedDB.open('spj_attend',1);}catch(e){return res(null);}r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('kv'))db.createObjectStore('kv');if(!db.objectStoreNames.contains('snaps'))db.createObjectStore('snaps',{keyPath:'ts'});};r.onsuccess=e=>{_idb=e.target.result;res(_idb);};r.onerror=()=>res(null);});}
function idbGet(store,key){return new Promise(res=>{if(!_idb)return res(null);try{const t=_idb.transaction(store,'readonly').objectStore(store).get(key);t.onsuccess=()=>res(t.result);t.onerror=()=>res(null);}catch(e){res(null);}});}
function idbPut(store,val,key){return new Promise(res=>{if(!_idb)return res();try{const os=_idb.transaction(store,'readwrite').objectStore(store);const t=key!==undefined?os.put(val,key):os.put(val);t.onsuccess=()=>res();t.onerror=()=>res();}catch(e){res();}});}
function idbAll(store){return new Promise(res=>{if(!_idb)return res([]);try{const out=[];const c=_idb.transaction(store,'readonly').objectStore(store).openCursor();c.onsuccess=e=>{const cur=e.target.result;if(cur){out.push(cur.value);cur.continue();}else res(out);};c.onerror=()=>res(out);}catch(e){res([]);}});}
function idbDel(store,key){return new Promise(res=>{if(!_idb)return res();try{const t=_idb.transaction(store,'readwrite').objectStore(store).delete(key);t.onsuccess=()=>res();t.onerror=()=>res();}catch(e){res();}});}
function persist(){if(_idb)idbPut('kv',DB,'db');try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){}if(typeof fbMaybePush==='function')fbMaybePush();}
function migrate(){const s=seed();DB.users=DB.users||s.users;DB.meta=DB.meta||{rev:0,backupRev:0};DB.meta.autoBackup=DB.meta.autoBackup||'off';DB.meta.lastBackupAt=DB.meta.lastBackupAt||0;DB.meta.backupUrl=DB.meta.backupUrl||'';DB.meta.backupToken=DB.meta.backupToken||'';if(typeof DB.meta.includeSecrets!=='boolean')DB.meta.includeSecrets=false;DB.smtp=DB.smtp||s.smtp;DB.recipients=DB.recipients||s.recipients;(function(){const a=DB.users.find(u=>u.u==='Admin');if(a&&a.ph==='144fa9ec')a.ph='225e82e4';})();}
/* returns DB for export; strips SMTP password & relay token unless includeSecrets is on */
function exportDB(){const c=JSON.parse(JSON.stringify(DB));if(!(DB.meta&&DB.meta.includeSecrets)){if(c.smtp)c.smtp.pass='';if(c.meta)c.meta.backupToken='';}return c;}
function exportJSON(){return JSON.stringify(exportDB(),null,2);}
function abInterval(){return DB.meta.autoBackup==='daily'?864e5:DB.meta.autoBackup==='weekly'?6048e5:0;}
async function checkAutoBackup(){const iv=abInterval();if(!iv||!SESSION)return;const last=DB.meta.lastBackupAt||0;if(Date.now()-last<iv)return;if(FB.connected){const ok=await fbBackupSilent();if(ok){DB.meta.backupRev=DB.meta.rev||0;DB.meta.lastBackupAt=Date.now();persist();snack('Auto-backup saved to Firestore',null,2500);}return;}
  if(DB.meta.backupUrl){await pushBackup(false);return;}try{const {text,name}=await maybeEncrypt(exportJSON(),'spj-attendance-backup-'+new Date().toISOString().slice(0,10));
  const hasCloud=(odSignedIn()&&odFolder('backup'))||gdSignedIn();
  if(hasCloud){await saveFile(name,text,'application/json','backup');}
  else if(isNative()){if(!safFolderName('backup'))return;await saveFile(name,text,'application/json','backup');}
  else{return;/* web with no cloud target: skip auto to avoid a download prompt on every open */}
  DB.meta.backupRev=DB.meta.rev||0;DB.meta.lastBackupAt=Date.now();persist();snack('Auto-backup saved'+(bkPass()?' (encrypted)':''),null,3500);}catch(e){}}
async function pushBackup(manual){const url=DB.meta.backupUrl;if(!url){if(manual)toast('Set a server backup endpoint first');return;}if(manual)snack('Backing up to server…',null,4000);try{let payload={token:DB.meta.backupToken||'',app:'SPJ Attendance',at:new Date().toISOString()};if(bkPass()&&cryptoOk){payload.enc=1;payload.data=await encJSON(exportJSON(),bkPass());}else{payload.data=exportDB();}const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','X-Relay-Token':DB.meta.backupToken||''},body:JSON.stringify(payload)});if(res.ok){DB.meta.backupRev=DB.meta.rev||0;DB.meta.lastBackupAt=Date.now();DB.meta.lastServerBackup=Date.now();persist();snack('✓ Backed up to server'+(payload.enc?' (encrypted)':''),null,3000);}else{let m='';try{m=(await res.text()).slice(0,120);}catch(e){}snack('✗ Server backup failed ('+res.status+') '+m,null,4500);}}catch(err){snack('✗ Server backup failed: '+(err&&err.message||'network error'),null,4500);}}
function save(bump){if(bump!==false){DB.meta=DB.meta||{rev:0,backupRev:0};DB.meta.rev=(DB.meta.rev||0)+1;}persist();}
function normalize(){DB.events.forEach(e=>{e.start=to24(e.start);e.end=to24(e.end);});DB.meta.timeFmt=DB.meta.timeFmt||'12';}

async function maybeSnapshot(force){DB.meta=DB.meta||{};const last=DB.meta.lastSnap||0;if(!force&&Date.now()-last<6*3600*1000)return;DB.meta.lastSnap=Date.now();const json=JSON.stringify(DB);try{await idbPut('snaps',{ts:Date.now(),at:new Date().toISOString(),size:json.length,data:json});const all=await idbAll('snaps');all.sort((a,b)=>b.ts-a.ts);for(const s of all.slice(15))await idbDel('snaps',s.ts);}catch(e){}persist();}
async function init(){await openDB();let raw=await idbGet('kv','db');if(!raw){const ls=localStorage.getItem(KEY);if(ls){try{raw=JSON.parse(ls);}catch(e){}}}DB=raw||seed();migrate();normalize();prefillDemo();autoFinalizeDrafts();persist();await maybeSnapshot();restoreSession();odInitDeepLink();fbAutoConnect();render();bindBack();bindPullRefresh();}
function uid(){return Math.random().toString(36).slice(2,9);}
function seed(){
  const b1=uid(),b2=uid(),b3=uid(),sg=uid();
  const S=(fn,ln,cid,b)=>({id:uid(),fn,ln,email:(fn+'.'+ln).toLowerCase()+'@spjain.org',cid,batch:b});
  const students=[S('Alice','Johnson','SPJ001',b1),S('Brian','Lee','SPJ002',b1),S('Catherine','Kim','SPJ003',b1),S('Daniel','Park','SPJ004',b1),S('Emma','Watson','SPJ005',b1),S('Frank','Martin','SPJ006',b1),S('Grace','Taylor','SPJ007',b2),S('Henry','Wilson','SPJ008',b2),S('Isla','Brown','SPJ009',b3)];
  const L=(fn,ln)=>({id:uid(),fn,ln,email:(fn+'.'+ln).toLowerCase()+'@spjain.org',group:sg});
  const staff=[L('John','Smith'),L('Emily','Davis'),L('Michael','Brown')];
  const ev=(name,date,t1,t2,batches,leaders)=>({id:uid(),name,date,start:t1,end:t2,batches,students:[],leaders,records:{},status:null});
  return {
    batches:[{id:b1,name:'GMBA June 2026'},{id:b2,name:'MGB Exchange July 2026'},{id:b3,name:'BBA Sept 2024'}],
    groups:[{id:sg,name:'Staff'}], students, staff,
    events:[ev("Lord's Cricket Visit",'2026-07-11','10:00 AM','4:00 PM',[b1],[staff[0].id,staff[1].id,staff[2].id]),ev('Kayaking Adventure','2026-08-21','9:00 AM','1:00 PM',[b1,b2],[staff[0].id,staff[1].id]),ev('Museum Tour','2026-07-05','11:00 AM','2:00 PM',[b1],[staff[1].id]),ev('Central Park Walk','2026-09-18','8:00 AM','10:00 AM',[b2],[staff[0].id]),ev('Team Building','2026-10-02','9:00 AM','3:00 PM',[b1,b3],[staff[2].id])],
    users:[
      {u:'Admin',role:'super',ph:'225e82e4',sq:{maiden:'b88aaf2',color:'b88a540'}}, /* pw admin@123 · recovery: maiden 'spj', color 'red' */
      {u:'ella',role:'user',ph:'2e2a4459',sq:{maiden:'105d956a',color:'b88a540'}} /* ella@123 · maiden 'smith', color 'red' */
    ],
    meta:{rev:0,backupRev:0,timeFmt:'12',autoBackup:'off',lastBackupAt:0,backupUrl:'',backupToken:'',lastServerBackup:0,includeSecrets:false},
    smtp:{fromName:'SPJ London',fromEmail:'',host:'',port:'587',secure:'tls',user:'',pass:'',relay:''},
    recipients:['ai@spjain.org']

/* ================= HELPERS ================= */
const $=id=>document.getElementById(id);
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function dayNum(d){return new Date(d+'T00:00:00').getDate();}
function monY(d){return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{month:'short'}).toUpperCase();}
function wday(d){return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short'});}
function fmtDT(ts){if(!ts)return '';const d=new Date(ts);const dd=String(d.getDate()).padStart(2,'0'),mm=String(d.getMonth()+1).padStart(2,'0');return dd+'-'+mm+'-'+d.getFullYear()+' | '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}
const ymd=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
function batchName(id){return (DB.batches.find(b=>b.id===id)||{}).name||'—';}
function studentsForEvent(e){const direct=DB.students.filter(s=>e.students.includes(s.id));const viaBatch=DB.students.filter(s=>e.batches.includes(s.batch)&&!e.students.includes(s.id));return [...viaBatch,...direct];}
function leadersForEvent(e){return DB.staff.filter(s=>e.leaders.includes(s.id));}
function peopleForEvent(e){return [...leadersForEvent(e).map(x=>({...x,role:'leader'})),...studentsForEvent(e).map(x=>({...x,role:'student'}))];}
function eventStatus(e){if(e.status==='completed')return {t:'Completed',c:'green'};const has=Object.keys(e.records||{}).length>0;const today=new Date().toISOString().slice(0,10);if(has)return e.date<today?{t:'Completed',c:'green'}:{t:'Draft',c:'orange'};if(e.date<today)return {t:'No Show',c:'red'};if(e.date>today)return {t:'Upcoming',c:'blue'};const now=new Date();const cur=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');const s=to24(e.start),en=to24(e.end);if(s&&cur<s)return {t:'Upcoming',c:'blue'};if(en&&cur>en)return {t:'Due',c:'orange'};return {t:'In progress',c:'red'};}
function autoFinalizeDrafts(){const today=new Date().toISOString().slice(0,10);let n=0;DB.events.forEach(e=>{if(e.status!=='completed'&&Object.keys(e.records||{}).length>0&&e.date<today){peopleForEvent(e).forEach(p=>{if(!e.records[p.id])e.records[p.id]='absent';});e.status='completed';e.markedAt=e.markedAt||Date.now();e.markedBy=e.markedBy||'auto';n++;}});if(n)save(false);}
function isCompleted(e){return eventStatus(e).t==='Completed';}
function countMarks(e){const p=peopleForEvent(e);let present=0,absent=0,late=0,un=0;p.forEach(x=>{const r=e.records[x.id];if(r==='present')present++;else if(r==='absent')absent++;else if(r==='late')late++;else un++;});return {present,absent,late,un,total:p.length};}
/* student-only counts for reports/dashboard (leaders excluded) */
function scount(e){const st=studentsForEvent(e);let present=0,absent=0,late=0;st.forEach(s=>{const r=e.records[s.id];if(r==='present')present++;else if(r==='absent')absent++;else if(r==='late')late++;});return {present,absent,late,total:present+absent+late,students:st.length};}
function leaderStat(e){return leadersForEvent(e).map(l=>{const r=e.records[l.id];const attended=r==='present'||r==='late';return {l,attended,label:r?(attended?'Attended':'Absent'):'No show'};});}
function tally(events,batchId){let present=0,absent=0,late=0;events.forEach(e=>{let ppl;if(batchId)ppl=DB.students.filter(s=>s.batch===batchId&&(e.batches.includes(batchId)||e.students.includes(s.id)));else ppl=studentsForEvent(e);ppl.forEach(p=>{const r=e.records[p.id];if(r==='present')present++;else if(r==='absent')absent++;else if(r==='late')late++;});});return {present,absent,late,total:present+absent+late};}

function doLogin(){const rec=findUser($('luser').value);const pw=$('lpw').value;if(!rec||rec.ph!==hpw(pw)){toast('Incorrect username or password');return;}const wantBio=$('lbio')&&$('lbio').checked;startSession(rec);go('calendar');setTimeout(checkAutoBackup,600);if(wantBio)bioEnable(rec.u,pw);}

/* ---- Biometric unlock: native app (plugin) OR web (WebAuthn Face ID/fingerprint) ---- */
const BIO_SRV='spj-attendance';
function bioPlugin(){return (window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.NativeBiometric)||null;}
function bioEnabled(){try{return localStorage.getItem('spj_bio')==='1';}catch(e){return false;}}
function waSupported(){return !!(window.PublicKeyCredential&&navigator.credentials&&navigator.credentials.create);}
async function waPlatform(){try{return waSupported()&&await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();}catch(e){return false;}}
async function bioAvailable(){if(isNative()){const p=bioPlugin();if(!p)return false;try{const r=await p.isAvailable({useFallback:true});return !!(r&&r.isAvailable);}catch(e){return false;}}return await waPlatform();}
async function bioEnable(username,password){
  if(isNative()){const p=bioPlugin();if(!p){toast('Biometric unlock works in the installed app only');return false;}
    try{await p.verifyIdentity({reason:'Confirm to enable unlock',title:'Enable unlock',subtitle:'SPJ Attendance',useFallback:true});
      await p.setCredentials({username,password,server:BIO_SRV});try{localStorage.setItem('spj_bio','1');}catch(e){}
      toast('Biometric / device-PIN unlock enabled');return true;
    }catch(e){toast('Could not enable unlock ('+(e&&e.message||'cancelled')+')');return false;}}
  // web WebAuthn
  if(!(await waPlatform())){toast('Face ID / fingerprint not available on this device');return false;}
  try{const cred=await navigator.credentials.create({publicKey:{
      challenge:crypto.getRandomValues(new Uint8Array(32)),
      rp:{name:'SPJ Attendance',id:location.hostname},
      user:{id:crypto.getRandomValues(new Uint8Array(16)),name:username,displayName:username},
      pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
      authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required',residentKey:'preferred'},
      timeout:60000,attestation:'none'}});
    try{localStorage.setItem('spj_bio','1');localStorage.setItem('spj_bio_user',username);localStorage.setItem('spj_bio_cred',_b64(cred.rawId));}catch(e){}
    toast('Biometric unlock enabled');return true;
  }catch(e){toast('Could not enable ('+(e&&e.message||'cancelled')+')');return false;}}
async function bioDisable(){if(isNative()){const p=bioPlugin();try{if(p)await p.deleteCredentials({server:BIO_SRV});}catch(e){}}try{localStorage.removeItem('spj_bio');localStorage.removeItem('spj_bio_user');localStorage.removeItem('spj_bio_cred');}catch(e){}toast('Unlock turned off');}
async function bioUnlock(){
  if(isNative()){const p=bioPlugin();if(!p)return;
    try{await p.verifyIdentity({reason:'Unlock SPJ Attendance',title:'Unlock',subtitle:'SPJ Attendance',useFallback:true});
      const c=await p.getCredentials({server:BIO_SRV});if(!c||!c.username){toast('No saved login — sign in with password');return;}
      const rec=findUser(c.username);if(!rec||rec.ph!==hpw(c.password)){toast('Saved login changed — use your password');await bioDisable();render();return;}
      startSession(rec);go('calendar');setTimeout(checkAutoBackup,600);
    }catch(e){}return;}
  // web WebAuthn
  const id=localStorage.getItem('spj_bio_cred'),un=localStorage.getItem('spj_bio_user');
  if(!id||!un){toast('Set up biometric unlock first');return;}
  try{await navigator.credentials.get({publicKey:{challenge:crypto.getRandomValues(new Uint8Array(32)),allowCredentials:[{type:'public-key',id:_ub64(id).buffer,transports:['internal']}],userVerification:'required',timeout:60000,rpId:location.hostname}});
    const rec=findUser(un);if(!rec){toast('Saved login no longer exists — use password');await bioDisable();render();return;}
    startSession(rec);go('calendar');setTimeout(checkAutoBackup,600);
  }catch(e){/* cancelled/failed → stay on password screen */}}

function navMonth(dir){let m=cur.m+dir,y=cur.y;if(m<0){m=11;y--;}if(m>11){m=0;y++;}cur={y,m};selDay=null;render();}
function attPct(e){const c=scount(e);return c.total?Math.round((c.present+c.late)/c.total*100):0;}
function weekDaysOf(iso){const d=new Date(iso+'T00:00:00');const sun=new Date(d);sun.setDate(d.getDate()-d.getDay());const a=[];for(let i=0;i<7;i++){const x=new Date(sun);x.setDate(sun.getDate()+i);a.push(x.toISOString().slice(0,10));}return a;}
function shiftWeek(dir){const base=weekAnchor||new Date().toISOString().slice(0,10);const d=new Date(base+'T00:00:00');d.setDate(d.getDate()+dir*7);weekAnchor=d.toISOString().slice(0,10);selDay=null;render();}
function grpLabel(dt){const today=new Date().toISOString().slice(0,10);const t=new Date();t.setDate(t.getDate()+1);const tom=t.toISOString().slice(0,10);const sh=new Date(dt+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});if(dt===today)return 'Today · '+sh;if(dt===tom)return 'Tomorrow · '+sh;return sh;}
function needsSetup(e){return studentsForEvent(e).length===0;}
function eventCard(e){const st=eventStatus(e);const today=new Date().toISOString().slice(0,10);const done=st.t==='Completed';const isToday=e.date===today;const setup=needsSetup(e);
  const chip=done?`<span class="pill green">${ico('check')} Done · ${attPct(e)}%</span>`:`<span class="pill ${st.c}${st.t==='In progress'?' live':''}">${st.t}</span>`;
  const meta=`${ico('clock')} ${fmtTime(e.start)} – ${fmtTime(e.end)}${e.batches.length?' · '+e.batches.map(batchName).join(', '):''} · ${studentsForEvent(e).length} students`;
  const action=setup?`<button class="btn subtle" style="margin-top:12px" onclick="event.stopPropagation();assignEvent('${e.id}')">${ico('users')} Assign students</button>`:(isToday&&!done)?`<button class="btn cta" style="margin-top:12px" onclick="event.stopPropagation();go('calendar',null,'${e.id}','mark')">${ico('check')} ${st.t==='Draft'?'Resume marking':'Mark attendance'}</button>`:'';
  return `<div class="evcard${setup?' setup':''}" onclick="go('calendar',null,'${e.id}')"><div class="row"><div class="grow"><div class="title">${esc(e.name)}${setup?'<span class="badge-setup">NEEDS SETUP</span>':''}</div></div>${chip}</div><div class="muted" style="margin-top:5px">${meta}</div>${action}</div>`;}
function calendarView(v){
  const today=new Date().toISOString().slice(0,10);
  const monthName=new Date(cur.y,cur.m,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const first=new Date(cur.y,cur.m,1).getDay(),daysIn=new Date(cur.y,cur.m+1,0).getDate(),prevDays=new Date(cur.y,cur.m,0).getDate();
  const evD={};DB.events.filter(e=>!e.archived).forEach(e=>evD[e.date]=1);
  let cells='';for(let i=0;i<first;i++)cells+=`<div class="cell mute">${prevDays-first+i+1}</div>`;
  for(let d=1;d<=daysIn;d++){const ds=ymd(cur.y,cur.m,d);const cl=['cell'];if(ds===selDay)cl.push('sel');else if(ds===today)cl.push('today');cells+=`<div class="${cl.join(' ')}" onclick="selDay=(selDay==='${ds}'?null:'${ds}');render()">${d}${evD[ds]?'<span class="evdot"></span>':''}</div>`;}
  const used=first+daysIn,trail=(7-(used%7))%7;for(let i=1;i<=trail;i++)cells+=`<div class="cell mute">${i}</div>`;
  const wk=weekDaysOf(weekAnchor||today);
  const strip=wk.map(ds=>{const d=new Date(ds+'T00:00:00');const cl=ds===selDay?'sel':(ds===today?'today':'');return `<button class="wkday ${cl}" onclick="selDay=(selDay==='${ds}'?null:'${ds}');render()"><span class="wd">${d.toLocaleDateString('en-GB',{weekday:'short'})}</span><span class="dn">${d.getDate()}</span>${evD[ds]?'<span class="wkdot"></span>':''}</button>`;}).join('');
  let list;
  if(selDay)list=DB.events.filter(e=>!e.archived&&e.date===selDay);
  else if(agendaFilter==='today')list=DB.events.filter(e=>!e.archived&&e.date===today);
  else if(agendaFilter==='past')list=DB.events.filter(e=>!e.archived&&e.date<today);
  else list=DB.events.filter(e=>!e.archived&&e.date>=today);
  const groups={};list.forEach(e=>{(groups[e.date]=groups[e.date]||[]).push(e);});
  const dates=Object.keys(groups).sort((a,b)=>agendaFilter==='past'&&!selDay?b.localeCompare(a):a.localeCompare(b));
  dates.forEach(dt=>groups[dt].sort((a,b)=>to24(a.start).localeCompare(to24(b.start))));
  const agenda=dates.length?dates.map(dt=>`<div class="agday">${grpLabel(dt)}</div>`+groups[dt].map(eventCard).join('')).join(''):'<div class="empty">'+ico('cal')+'<div>No events '+(selDay?'on this day':agendaFilter==='today'?'today':agendaFilter)+'.</div></div>';
  v.innerHTML=`<div class="wrap">
    <div class="seg2">
      <button class="${!selDay&&agendaFilter==='today'?'on':''}" onclick="selDay=null;agendaFilter='today';render()">Today</button>
      <button class="${!selDay&&agendaFilter==='upcoming'?'on':''}" onclick="selDay=null;agendaFilter='upcoming';render()">Upcoming</button>
      <button class="${!selDay&&agendaFilter==='past'?'on':''}" onclick="selDay=null;agendaFilter='past';render()">Past</button>
      <button class="calbtn ${calMin?'':'on'}" aria-label="Month view" onclick="calMin=!calMin;render()">${ico('cal')}</button>
    </div>
    ${calMin?`<div class="weekstrip"><button class="wknav" aria-label="Previous week" onclick="shiftWeek(-1)">${ico('back')}</button><div class="wkdays">${strip}</div><button class="wknav" aria-label="Next week" onclick="shiftWeek(1)">${ico('chev')}</button></div>`
      :`<div class="card compactcal"><div class="calhead"><button onclick="navMonth(-1)">${ico('back')}</button><b style="cursor:pointer" onclick="openMonthPicker()">${monthName} ▾</b><button onclick="navMonth(1)">${ico('chev')}</button></div><div class="dow"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div><div class="grid">${cells}</div></div>`}
    ${selDay?`<div style="margin:2px 2px 4px"><button class="daychip" onclick="selDay=null;render()">${new Date(selDay+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})} ${ico('x')}</button><button class="btn sm subtle" style="width:auto;padding:6px 12px;margin-left:8px" onclick="addEventForCalendar()">${ico('plus')} Add here</button></div>`:''}
    ${agenda}</div>`;
}

function tapMark(eid,pid){const e=DB.events.find(x=>x.id===eid);const cur=e.records[pid];if(!cur){setMark(eid,pid,'present');return;}openChooser(eid,pid);}
function setMark(eid,pid,st){const e=DB.events.find(x=>x.id===eid);if(st)e.records[pid]=st;else delete e.records[pid];save();markRefresh(e);}

function openChooser(eid,pid){const e=DB.events.find(x=>x.id===eid);const p=[...DB.students,...DB.staff].find(x=>x.id===pid)||{};const cur=e.records[pid];
  sheet(`<h3>Change status</h3><div class="muted" style="margin-bottom:14px">${esc((p.fn||'')+' '+(p.ln||''))} — currently <b>${(cur||'unmarked').toUpperCase()}</b></div>

function markRefresh(e){const c=countMarks(e);['cAll','cPres','cAbs','cLate'].forEach((id,i)=>{const el=$(id);if(el)el.textContent=[c.total,c.present,c.absent,c.late][i];});const un=$('unmarkedN');if(un)un.textContent=c.un;

function markView(v){const e=DB.events.find(x=>x.id===route.id);const _t=new Date().toISOString().slice(0,10);if(e.date>_t&&e.status!=='completed'){toast('Attendance opens on the event day');go('calendar',null,e.id);return;}const ld=sortP(leadersForEvent(e)),st=sortP(studentsForEvent(e));

function markRemaining(eid,status){const e=DB.events.find(x=>x.id===eid);let n=0;peopleForEvent(e).forEach(p=>{if(!e.records[p.id]){e.records[p.id]=status;n++;}});if(!n){toast('Everyone is already marked');return;}save();markRefresh(e);toast(n+' marked '+status);}

function dashboardView(v){
  if(!dashScope.batch)dashScope.batch=DB.batches[0]?.id;
  const evs=scopeEvents();const bId=dashScope.type==='batch'?dashScope.batch:null;const t=tally(evs,bId);
  const total=t.total||1,pp=Math.round(t.present/total*100);
  const scopeLbl=dashScope.type==='batch'?esc(batchName(dashScope.batch)):dashScope.type==='month'?MONTHS[dashScope.month]+' '+dashScope.year:dashScope.type==='year'?dashScope.year:'All time';

/* ================= REPORTS ================= */
function eventsInMonth(y,m){return DB.events.filter(e=>{if(e.archived)return false;const d=new Date(e.date+'T00:00:00');return d.getFullYear()===y&&d.getMonth()===m;}).sort((a,b)=>a.date.localeCompare(b.date));}
function allYears(){const cy=new Date().getFullYear();let lo=cy-2,hi=cy+1;DB.events.forEach(e=>{const y=+e.date.slice(0,4);if(y<lo)lo=y;if(y>hi)hi=y;});const out=[];for(let y=lo;y<=hi;y++)out.push(y);return out;}
function monthBatchRows(evs){const done=evs.filter(isCompleted);return DB.batches.map(b=>{const bevs=done.filter(e=>e.batches.includes(b.id));const studs=DB.students.filter(s=>s.batch===b.id);let p=0,l=0,a=0;bevs.forEach(e=>studs.forEach(s=>{const r=e.records[s.id];if(r==='present')p++;else if(r==='late')l++;else a++;}));const slots=bevs.length*studs.length;const pct=slots?Math.round((p+l)/slots*100):null;return {b,events:bevs.length,students:studs.length,slots,p,l,a,pct};}).filter(x=>x.events>0);}
function monthStudentRows(evs){const done=evs.filter(isCompleted);return DB.students.map(s=>{const sevs=done.filter(e=>studentsForEvent(e).some(x=>x.id===s.id));let p=0,l=0,a=0;sevs.forEach(e=>{const r=e.records[s.id];if(r==='present')p++;else if(r==='late')l++;else a++;});const sched=sevs.length;const pct=sched?Math.round((p+l)/sched*100):null;return {s,sched,p,l,a,pct};}).filter(x=>x.sched>0).sort((a,b)=>(a.pct==null?999:a.pct)-(b.pct==null?999:b.pct));}
function pctColor(p){return p==null?'var(--dim)':p>=85?'var(--present)':p>=70?'var(--orange)':'var(--absent)';}
function repStuRefresh(){const el=$('repStuBody');if(!el)return;const evs=eventsInMonth(repY,repM);const rows=monthStudentRows(evs).filter(x=>!repStuQ||(x.s.fn+' '+x.s.ln+' '+(x.s.cid||'')).toLowerCase().includes(repStuQ.toLowerCase()));
  el.innerHTML=rows.length?rows.map(x=>`<div class="card" style="padding:12px 14px"><div class="row"><div class="avatar ${avColor(x.s.fn)}">${initials(x.s.fn,x.s.ln)}</div><div class="grow"><div style="font-weight:700">${esc(x.s.fn)} ${esc(x.s.ln)}</div><div class="mini">${esc(x.s.cid||'—')} · ${esc(batchName(x.s.batch))} · ${x.sched} event${x.sched>1?'s':''}</div></div><div style="font-weight:800;font-size:18px;color:${pctColor(x.pct)}">${x.pct}%</div></div>
    <div class="minigrid"><div><b style="color:var(--present)">${x.p}</b><span>Present</span></div><div><b style="color:var(--late)">${x.l}</b><span>Late</span></div><div><b style="color:var(--absent)">${x.a}</b><span>Absent</span></div></div></div>`).join(''):'<div class="empty">'+ico('users')+'<div>No completed events this month.</div></div>';}

  } else if(repMode==='batch'){

      <div class="sectlabel">Attendance by batch · ${mlabel}</div>
      ${rows.length?rows.map(x=>`<div class="card"><div class="row"><div class="grow"><div class="title" style="font-size:14.5px">${esc(x.b.name)}</div><div class="mini">${x.students} students · ${x.events} event${x.events>1?'s':''} · ${x.slots} slots</div></div><div style="font-weight:800;font-size:18px;color:${pctColor(x.pct)}">${x.pct}%</div></div>

        <div class="pbar"><i style="width:${x.pct}%;background:${pctColor(x.pct)}"></i></div></div>`).join(''):'<div class="empty">'+ico('cap')+'<div>No completed events this month.</div></div>'}`;
  } else {
    body=`<div class="card"><div class="dash-head"><span class="reddot"></span>Export ${mlabel}</div><div class="selrow" style="margin:0"><button class="btn ghost" style="flex:1" onclick="exportStudentCSV()">${ico('sheetx')} Excel</button><button class="btn primary" style="flex:1" onclick="exportStudentPDF()">${ico('doc')} PDF</button></div></div>

      <div id="repStuBody"></div>`;
  }
  v.innerHTML=`<div class="wrap">
    ${seg}
    <div class="selrow"><select onchange="repM=+this.value;render()">${MONTHS.map((m,i)=>`<option value="${i}" ${i===repM?'selected':''}>${m}</option>`).join('')}</select><select onchange="repY=+this.value;render()">${years.map(y=>`<option ${y===repY?'selected':''}>${y}</option>`).join('')}</select></div>
    <div class="bento three" style="margin-bottom:6px"><div class="stat"><div class="n" style="color:var(--a1)">${evs.length}</div><div class="l">Events</div></div><div class="stat"><div class="n" style="color:var(--present)">${pp}%</div><div class="l">Attendance</div></div><div class="stat"><div class="n" style="color:var(--absent)">${a}</div><div class="l">Absences</div></div></div>
    ${body}</div>`;
  if(repMode==='student')repStuRefresh();

function exportBatchCSV(){const evs=eventsInMonth(repY,repM);const rows=[['Batch','Students','Events','Present','Late','Absent','Attendance %'],...monthBatchRows(evs).map(x=>[x.b.name,x.students,x.events,x.p,x.l,x.a,x.pct+'%'])];dl('Batch_summary_'+MONTHS[repM]+'_'+repY+'.csv',rows.map(r=>r.map(csvEsc).join(',')).join('\n'),'text/csv');toast('Batch summary exported');}
function exportStudentCSV(){const evs=eventsInMonth(repY,repM);const rows=[['Name','Campus ID','Batch','Events','Present','Late','Absent','Attendance %'],...monthStudentRows(evs).map(x=>[x.s.fn+' '+x.s.ln,x.s.cid||'',batchName(x.s.batch),x.sched,x.p,x.l,x.a,x.pct+'%'])];dl('Student_summary_'+MONTHS[repM]+'_'+repY+'.csv',rows.map(r=>r.map(csvEsc).join(',')).join('\n'),'text/csv');toast('Student summary exported');}
function exportStudentPDF(){if(!pdfReady())return;const evs=eventsInMonth(repY,repM);const rows=monthStudentRows(evs);const {jsPDF}=window.jspdf;const doc=new jsPDF();doc.setFontSize(18);doc.setTextColor(208,36,47);doc.text('SPJ London — Student Attendance',14,18);doc.setFontSize(10);doc.setTextColor(120);doc.text(MONTHS[repM]+' '+repY+' · lowest attendance first (completed events only)',14,26);let y=36;doc.setFontSize(9);doc.setTextColor(30,34,51);doc.text('Student',14,y);doc.text('Batch',80,y);doc.text('Ev',140,y);doc.text('P',152,y);doc.text('L',162,y);doc.text('A',172,y);doc.text('%',184,y);y+=3;doc.setDrawColor(220);doc.line(14,y,196,y);y+=6;rows.forEach(x=>{if(y>285){doc.addPage();y=18;}doc.setTextColor(30,34,51);doc.text((x.s.fn+' '+x.s.ln).slice(0,30),14,y);doc.setTextColor(120);doc.text(batchName(x.s.batch).slice(0,22),80,y);doc.setTextColor(30,34,51);doc.text(''+x.sched,140,y);doc.text(''+x.p,152,y);doc.text(''+x.l,162,y);doc.text(''+x.a,172,y);const col=x.pct>=85?[26,157,91]:x.pct>=70?[217,119,6]:[208,36,47];doc.setTextColor(...col);doc.text(x.pct+'%',184,y);y+=6;});doc.setTextColor(150);doc.setFontSize(8);doc.text('SPJ Attendance — on-device',14,292);shareOrDownload(doc,'Student_summary_'+MONTHS[repM]+'_'+repY+'.pdf','Student attendance','Student summary');}

/* ---- focus-safe list shell ---- */
function listShell(v,ph,importBtn,build){window._build=build;v.innerHTML=`<div class="wrap">${toolbar(ph)}${importBtn||''}<div id="listBody"></div></div>`;listRefresh();}
function listRefresh(){const el=$('listBody');if(el)el.innerHTML=window._build();}
function toolbar(ph){return `<div class="toolbar"><div class="searchbox">${ico('search')}<input class="search" value="${esc(ui.q)}" placeholder="${ph}" oninput="ui.q=this.value;listRefresh()"></div><button class="editbtn" title="Sort ${nameSort==='az'?'A→Z':'Z→A'}" onclick="toggleSort()">${ico('sort')}</button><button class="editbtn ${ui.edit?'on':''}" onclick="ui.edit=!ui.edit;ui.sel=new Set();render()">${ico('edit')} ${ui.edit?'Done':'Edit'}</button></div>`;}
function selbar(ids,coll,label){const all=ids.length&&ids.every(i=>ui.sel.has(i));return `<div class="selbar"><div class="chk ${all?'on':''}" onclick="toggleAll(${JSON.stringify(ids).replace(/"/g,'&quot;')})">${all?ico('check'):''}</div><div class="grow"><b>${ui.sel.size}</b> selected</div><button class="btn sm danger" ${ui.sel.size?'':'disabled'} onclick="bulkDelete('${coll}','${label}')">${ico('trash')} Delete</button></div>`;}
function toggleAll(ids){const all=ids.length&&ids.every(i=>ui.sel.has(i));if(all)ids.forEach(i=>ui.sel.delete(i));else ids.forEach(i=>ui.sel.add(i));listRefresh();}
function toggleSel(id){ui.sel.has(id)?ui.sel.delete(id):ui.sel.add(id);listRefresh();}
function chkbox(id){return `<div class="chk ${ui.sel.has(id)?'on':''}" onclick="event.stopPropagation();toggleSel('${id}')">${ui.sel.has(id)?ico('check'):''}</div>`;}
function bulkDelete(coll,label){const n=ui.sel.size;if(!n)return;if(!confirm(`Delete ${n} ${label}${n>1?'s':''}? You can undo immediately after.`))return;const removed=DB[coll].filter(x=>ui.sel.has(x.id));DB[coll]=DB[coll].filter(x=>!ui.sel.has(x.id));save();ui.sel=new Set();snack(`${n} ${label}${n>1?'s':''} deleted`,()=>{DB[coll]=DB[coll].concat(removed);save();render();toast('Restored');},6000);render();}
function matchQ(s){return !ui.q||s.toLowerCase().includes(ui.q.toLowerCase());}
function toggleSort(){nameSort=nameSort==='az'?'za':'az';render();}
function fullNm(o){return ((o.fn||'')+' '+(o.ln||'')).trim().toLowerCase();}
function sortP(arr){const a=arr.slice().sort((x,y)=>fullNm(x).localeCompare(fullNm(y)));return nameSort==='za'?a.reverse():a;}
function sortNm(arr){const a=arr.slice().sort((x,y)=>((x.name||'').toLowerCase()).localeCompare((y.name||'').toLowerCase()));return nameSort==='za'?a.reverse():a;}

function listBatches(v){listShell(v,'Search batches...',null,()=>{const items=sortNm(DB.batches.filter(b=>matchQ(b.name)));const ids=items.map(b=>b.id);const unN=DB.students.filter(isUnassigned).length;const unCard=(matchQ('unassigned')||!ui.q)?`<div class="card unassigned" style="padding:12px 14px"><div class="row"><div class="grow" onclick="go('more','batchview','__unassigned__')"><div class="title">Unassigned Students <span class="badge-un">SYSTEM</span></div><div class="muted">${unN} student${unN!==1?'s':''} · no batch</div></div><button class="btn sm subtle" onclick="go('more','batchview','__unassigned__')">${ico('chev')}</button></div></div>`:'';
  return (ui.edit?selbar(ids,'batches','batch'):'')+items.map(b=>`<div class="card" style="padding:12px 14px"><div class="row">${ui.edit?chkbox(b.id):''}<div class="grow" onclick="${ui.edit?`editBatch('${b.id}')`:`go('more','batchview','${b.id}')`}"><div class="title">${esc(b.name)}</div><div class="muted">${DB.students.filter(s=>s.batch===b.id).length} students enrolled</div></div><button class="btn sm subtle" onclick="${ui.edit?`editBatch('${b.id}')`:`go('more','batchview','${b.id}')`}">${ui.edit?ico('edit'):ico('chev')}</button></div></div>`).join('')+(ui.edit?'':unCard)||emptyMsg('cap','No batches found.');});}
function isUnassigned(s){return !s.batch||!DB.batches.find(b=>b.id===s.batch);}
function selbarStudents(ids){const all=ids.length&&ids.every(i=>ui.sel.has(i));return `<div class="selbar"><div class="chk ${all?'on':''}" onclick="toggleAll(${JSON.stringify(ids).replace(/"/g,'&quot;')})">${all?ico('check'):''}</div><div class="grow"><b>${ui.sel.size}</b> selected</div><button class="btn sm subtle" ${ui.sel.size?'':'disabled'} onclick="bulkAssign()">${ico('cap')} Assign</button><button class="btn sm danger" ${ui.sel.size?'':'disabled'} onclick="bulkDelete('students','student')">${ico('trash')}</button></div>`;}
function filterBatchOpts(selId,q,withUn){const sel=$(selId);if(!sel)return;const cur=sel.value;q=(q||'').toLowerCase();let list=DB.batches.filter(b=>b.name.toLowerCase().includes(q)).map(b=>({v:b.id,n:b.name}));if(withUn&&('unassigned'.includes(q)||!q))list.unshift({v:'',n:'— Unassigned —'});sel.innerHTML=list.map(o=>`<option value="${o.v}" ${o.v===cur?'selected':''}>${esc(o.n)}</option>`).join('')||'<option value="">No match</option>';}
function bulkAssign(){if(!ui.sel.size)return;const ids=[...ui.sel];sheet(`<h3>Assign ${ids.length} student${ids.length>1?'s':''} to batch</h3><label class="f">Batch</label><div class="searchbox">${ico('search')}<input class="search" id="baQ" placeholder="Search batch..." oninput="filterBatchOpts('baB',this.value,true)"></div><select class="t" id="baB"><option value="">— Unassigned —</option>${DB.batches.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('')}</select><button class="btn primary" style="margin-top:16px" onclick="doBulkAssign(${JSON.stringify(ids).replace(/"/g,'&quot;')})">Assign</button><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Cancel</button>`);}
function doBulkAssign(ids){const b=$('baB').value;ids.forEach(id=>{const s=DB.students.find(x=>x.id===id);if(s)s.batch=b;});save();ui.sel=new Set();closeSheet();render();toast(ids.length+' student'+(ids.length>1?'s':'')+' assigned');}
function listStudents(v){listShell(v,'Search students...','',()=>{const items=sortP(DB.students.filter(s=>matchQ(s.fn+' '+s.ln+' '+(s.cid||'')+' '+s.email)));const ids=items.map(s=>s.id);const un=DB.students.filter(isUnassigned).length;return (un?`<div class="mini" style="margin:0 4px 10px;color:#c2410c">${un} unassigned student${un>1?'s':''} — highlighted in amber</div>`:'')+(ui.edit?selbarStudents(ids):'')+items.map(s=>{const u=isUnassigned(s);return `<div class="card ${u?'unassigned':''}" style="padding:11px 14px"><div class="row">${ui.edit?chkbox(s.id):''}<div class="avatar ${u?'':avColor(s.fn)}" ${u?'style="background:#f59e0b"':''}>${initials(s.fn,s.ln)}</div><div class="grow" onclick="${ui.edit?`editStudent('${s.id}')`:`studentInfo('${s.id}')`}"><div style="font-weight:700">${esc(s.fn)} ${esc(s.ln)}${u?'<span class="badge-un">UNASSIGNED</span>':''}</div><div class="mini">${esc(s.cid||'—')} · ${u?'No batch':esc(batchName(s.batch))}</div><div class="mini">${esc(s.email)}</div></div><button class="btn sm subtle" onclick="${ui.edit?`editStudent('${s.id}')`:`studentInfo('${s.id}')`}">${ui.edit?ico('edit'):ico('chev')}</button></div></div>`;}).join('')||emptyMsg('users','No students found.');});}
function listStaff(v){listShell(v,'Search staff...','',()=>{const items=sortP(DB.staff.filter(s=>matchQ(s.fn+' '+s.ln+' '+s.email)));const ids=items.map(s=>s.id);return (ui.edit?selbar(ids,'staff','staff member'):'')+items.map(s=>`<div class="card" style="padding:11px 14px"><div class="row">${ui.edit?chkbox(s.id):''}<div class="avatar lead">${initials(s.fn,s.ln)}</div><div class="grow" onclick="${ui.edit?`editStaff('${s.id}')`:`staffInfo('${s.id}')`}"><div style="font-weight:700">${esc(s.fn)} ${esc(s.ln)}</div><div class="mini">${esc(s.email)}</div></div><button class="btn sm subtle" onclick="${ui.edit?`editStaff('${s.id}')`:`staffInfo('${s.id}')`}">${ui.edit?ico('edit'):ico('chev')}</button></div></div>`).join('')||emptyMsg('crown','No staff found.');});}
function searchEvent(e,q){if(!q)return true;q=q.toLowerCase();const d=new Date(e.date+'T00:00:00');const hay=(e.name+' '+d.getFullYear()+' '+MONTHS[d.getMonth()]+' '+MONTHS[d.getMonth()].slice(0,3)+' '+(e.start||'')+' '+(e.end||'')).toLowerCase();return hay.includes(q);}
function evMeta(e){return `${e.batches.map(batchName).join(', ')||'—'} · ${studentsForEvent(e).length} students · ${leadersForEvent(e).length} leaders`;}
function evChk(which,id){const sel=which==='up'?evUI.selUp:evUI.selPast;return `<div class="chk ${sel.has(id)?'on':''}" onclick="event.stopPropagation();evToggle('${which}','${id}')">${sel.has(id)?ico('check'):''}</div>`;}
function evToggle(which,id){const sel=which==='up'?evUI.selUp:evUI.selPast;sel.has(id)?sel.delete(id):sel.add(id);which==='up'?refreshUp():refreshPast();}
function evToggleAll(which,ids){const sel=which==='up'?evUI.selUp:evUI.selPast;const all=ids.length&&ids.every(i=>sel.has(i));if(all)ids.forEach(i=>sel.delete(i));else ids.forEach(i=>sel.add(i));which==='up'?refreshUp():refreshPast();}
function evSelbar(which,ids){const sel=which==='up'?evUI.selUp:evUI.selPast;const all=ids.length&&ids.every(i=>sel.has(i));const del=which==='up'?`<button class="btn sm danger" ${sel.size?'':'disabled'} onclick="evBulkDelete('${which}')">${ico('trash')}</button>`:'';return `<div class="selbar"><div class="chk ${all?'on':''}" onclick="evToggleAll('${which}',${JSON.stringify(ids).replace(/"/g,'&quot;')})">${all?ico('check'):''}</div><div class="grow"><b>${sel.size}</b> selected</div><button class="btn sm subtle" ${sel.size?'':'disabled'} onclick="evBulkArchive('${which}')">Archive</button>${del}</div>`;}
function evBulkArchive(which){const sel=which==='up'?evUI.selUp:evUI.selPast;const n=sel.size;if(!n)return;const ids=[...sel];ids.forEach(id=>{const e=DB.events.find(x=>x.id===id);if(e)e.archived=true;});save();sel.clear();snack(`${n} event${n>1?'s':''} archived`,()=>{ids.forEach(id=>{const e=DB.events.find(x=>x.id===id);if(e)e.archived=false;});save();render();toast('Restored');},6000);render();}
function evBulkDelete(which){const sel=which==='up'?evUI.selUp:evUI.selPast;if(!sel.size)return;const ids=[...sel];const blocked=ids.filter(id=>{const e=DB.events.find(x=>x.id===id);return e&&eventStatus(e).t==='In progress';});const del=ids.filter(id=>blocked.indexOf(id)<0);if(!del.length){toast("In-progress events can't be deleted");return;}const n=del.length;if(!confirm(`Permanently delete ${n} event${n>1?'s':''}? Archiving is recommended. You can undo immediately after.`))return;const rm=new Set(del);const removed=DB.events.filter(x=>rm.has(x.id));DB.events=DB.events.filter(x=>!rm.has(x.id));save();sel.clear();snack(`${n} deleted${blocked.length?' · '+blocked.length+' in-progress kept':''}`,()=>{DB.events=DB.events.concat(removed);save();render();toast('Restored');},6000);render();}
function collBtn(open,fn){return `<button class="collbtn" onclick="${fn}">${open?'−':'+'}</button>`;}
function listEvents(v){
  v.innerHTML=`<div class="wrap">
    <div class="sectlabel" style="margin-top:0"><span>${collBtn(upOpen,'upOpen=!upOpen;render()')} Upcoming events</span>${upOpen?`<button class="editbtn ${evUI.editUp?'on':''}" style="padding:6px 11px;font-size:12px" onclick="evUI.editUp=!evUI.editUp;evUI.selUp=new Set();render()">${ico('edit')} ${evUI.editUp?'Done':'Bulk edit'}</button>`:''}</div>
    ${upOpen?`<div class="searchbox">${ico('search')}<input class="search" value="${esc(qUp)}" placeholder="Search upcoming — name, year, month, time" oninput="qUp=this.value;refreshUp()"></div><div id="upBody"></div>`:''}
    <div class="sectlabel"><span>${collBtn(pastOpen,'pastOpen=!pastOpen;render()')} Past events</span>${pastOpen?`<button class="editbtn ${evUI.editPast?'on':''}" style="padding:6px 11px;font-size:12px" onclick="evUI.editPast=!evUI.editPast;evUI.selPast=new Set();render()">${ico('edit')} ${evUI.editPast?'Done':'Bulk edit'}</button>`:''}</div>
    ${pastOpen?`<div class="searchbox">${ico('search')}<input class="search" value="${esc(qPast)}" placeholder="Search past — name, year, month, time" oninput="qPast=this.value;refreshPast()"></div><div id="pastBody"></div><button class="btn ghost" style="margin-top:12px" onclick="showArchived=!showArchived;refreshPast()">${showArchived?'Hide':'Show'} archived (${DB.events.filter(e=>e.archived).length})</button>`:''}
  </div>`;
  if(upOpen)refreshUp();if(pastOpen)refreshPast();
}
function refreshUp(){const el=$('upBody');if(!el)return;const today=new Date().toISOString().slice(0,10);const list=DB.events.filter(e=>!e.archived&&e.status!=='completed'&&e.date>=today&&searchEvent(e,qUp)).sort((a,b)=>a.date.localeCompare(b.date));const ids=list.map(e=>e.id);const ed=evUI.editUp;
  el.innerHTML=(ed?evSelbar('up',ids):'')+list.map(e=>{const st=eventStatus(e);const isTod=e.date===today;const setup=needsSetup(e);return `<div class="card${setup?' setup':''}"><div class="row">${ed?evChk('up',e.id):''}<div class="grow"><div class="title">${esc(e.name)} <span class="pill ${st.c}${st.t==='In progress'?' live':''}" style="padding:2px 8px;font-size:9px">${st.t.toUpperCase()}</span>${setup?'<span class="badge-setup">NEEDS SETUP</span>':''}</div><div class="muted">${fmtDate(e.date)} · ${fmtTime(e.start)}–${fmtTime(e.end)}</div><div class="mini" style="margin-top:4px">${evMeta(e)}</div></div></div>
    ${ed?'':`<div class="row" style="margin-top:10px;gap:8px"><button class="btn sm subtle" onclick="assignEvent('${e.id}')">${ico('users')} Assign</button>${isTod?`<button class="btn sm subtle" onclick="openMark('${e.id}')">${ico('check')} ${st.t==='Draft'?'Resume':'Mark'}</button>`:''}<button class="btn sm subtle" onclick="editEvent('${e.id}')">${ico('edit')} Edit</button></div>`}</div>`;}).join('')||emptyMsg('cal','No upcoming events.');}
function refreshPast(){const el=$('pastBody');if(!el)return;const today=new Date().toISOString().slice(0,10);const list=DB.events.filter(e=>(e.status==='completed'||e.date<today)&&(showArchived||!e.archived)&&searchEvent(e,qPast)).sort((a,b)=>b.date.localeCompare(a.date));const ids=list.filter(e=>!e.archived).map(e=>e.id);const ed=evUI.editPast;
  el.innerHTML=(ed?evSelbar('past',ids):'')+list.map(e=>{const done=isCompleted(e);const st=eventStatus(e);const arch=e.archived;const c=scount(e);
    let actions;
    if(arch)actions=`<button class="btn sm subtle" onclick="restoreEvent('${e.id}')">Restore</button>`;
    else if(done)actions=`<button class="btn sm subtle" onclick="reopenMark('${e.id}')">${ico('check')} Edit attendance</button>`;
    else actions=`<button class="btn sm subtle" onclick="assignEvent('${e.id}')">${ico('users')} Assign</button><button class="btn sm subtle" onclick="go('calendar',null,'${e.id}','mark')">${ico('check')} Mark</button>`;
    return `<div class="card ${arch?'unassigned':''}"><div class="row">${ed&&!arch?evChk('past',e.id):''}<div class="grow"><div class="title">${esc(e.name)} <span class="pill ${st.c}" style="padding:2px 8px;font-size:9px">${arch?'ARCHIVED':st.t.toUpperCase()}</span></div><div class="muted">${fmtDate(e.date)} · ${fmtTime(e.start)}–${fmtTime(e.end)}</div><div class="mini" style="margin-top:4px">${done?c.present+'P · '+c.absent+'A · '+c.late+'L · ':''}${evMeta(e)}</div></div></div>
      ${ed?'':`<div class="row" style="margin-top:10px;gap:8px">${actions}</div>`}</div>`;}).join('')||emptyMsg('cal','No past events.');}
function openMark(eid){const e=DB.events.find(x=>x.id===eid);const today=new Date().toISOString().slice(0,10);if(e.date>today&&e.status!=='completed'){toast('Attendance opens on the event day');return;}if(e.status==='completed'&&!confirm('This event is completed. Edit its attendance now?'))return;go('calendar',null,eid,'mark');}
function reopenMark(eid){openMark(eid);}
function restoreEvent(id){const e=DB.events.find(x=>x.id===id);e.archived=false;save();refreshPast();toast('Event restored');}
function emptyMsg(i,t){return `<div class="empty">${ico(i)}<div>${t}</div></div>`;}
function fabAction(){if(route.sub==='batches')editBatch();else if(route.sub==='students')editStudent();else if(route.sub==='staff')editStaff();else if(route.sub==='events')editEvent();}
/* ---- Read-only detail cards (view mode) ---- */
function infoRow(label,val){return `<div style="display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)"><span class="mini" style="color:var(--muted)">${label}</span><span style="font-weight:600;text-align:right">${val}</span></div>`;}
function studentInfo(id){const s=DB.students.find(x=>x.id===id);if(!s)return;const done=DB.events.filter(isCompleted);const mine=done.filter(e=>studentsForEvent(e).some(x=>x.id===id));let p=0,l=0,a=0;mine.forEach(e=>{const r=e.records[id];if(r==='present')p++;else if(r==='late')l++;else a++;});const pct=mine.length?Math.round((p+l)/mine.length*100):null;
  sheet(`<div class="row" style="gap:12px;margin-bottom:6px"><div class="avatar ${isUnassigned(s)?'':avColor(s.fn)}" ${isUnassigned(s)?'style="background:#f59e0b"':''}>${initials(s.fn,s.ln)}</div><div><h3 style="margin:0">${esc(s.fn)} ${esc(s.ln)}</h3><div class="mini">Student</div></div></div>
   <div class="mini" style="margin:2px 0 10px;color:var(--muted)">🔒 Read-only — turn on <b>Edit</b> to make changes</div>
   ${infoRow('Campus ID',esc(s.cid||'—'))}${infoRow('Email',esc(s.email||'—'))}${infoRow('Batch',esc(isUnassigned(s)?'Unassigned':batchName(s.batch)))}${infoRow('Events attended',mine.length?((p+l)+' / '+mine.length+(pct!=null?' · '+pct+'%':'')):'—')}
   <button class="btn ghost" style="margin-top:16px" onclick="closeSheet()">Close</button>`);}
function staffInfo(id){const s=DB.staff.find(x=>x.id===id);if(!s)return;sheet(`<div class="row" style="gap:12px;margin-bottom:6px"><div class="avatar lead">${initials(s.fn,s.ln)}</div><div><h3 style="margin:0">${esc(s.fn)} ${esc(s.ln)}</h3><div class="mini">Leader / Staff</div></div></div>
   <div class="mini" style="margin:2px 0 10px;color:var(--muted)">🔒 Read-only — turn on <b>Edit</b> to make changes</div>
   ${infoRow('Email',esc(s.email||'—'))}
   <button class="btn ghost" style="margin-top:16px" onclick="closeSheet()">Close</button>`);}

/* ================= BATCH DETAIL (enrolled students + picker) ================= */
function batchView(v){
  const un=route.id==='__unassigned__';
  const b=un?{name:'Unassigned Students'}:DB.batches.find(x=>x.id===route.id);if(!b){go('more','batches');return;}
  const enrolled=()=>un?DB.students.filter(isUnassigned):DB.students.filter(s=>s.batch===route.id);

let assignTabState='batch', assignQ='';
function assignEvent(id){window._ae=id;assignTabState='batch';assignQ='';sheet(`<h3>Assign people</h3><div class="muted" id="aeName" style="margin-bottom:10px"></div><div class="tabbar"><button id="tb1" onclick="assignTab('batch')">Batches</button><button id="tb2" onclick="assignTab('stud')">Students</button><button id="tb3" onclick="assignTab('lead')">Leaders</button></div><div class="searchbox">${ico('search')}<input class="search" id="aq" placeholder="Search..." oninput="assignQ=this.value;assignBody()"></div><div id="assignBody" style="margin-top:12px"></div><button class="btn primary" style="margin-top:16px" onclick="closeSheet();render()">Done</button>`);$('aeName').textContent=(DB.events.find(x=>x.id===id)||{}).name||'';assignTab('batch');}

function assignBody(){const e=DB.events.find(x=>x.id===window._ae),b=$('assignBody'),q=assignQ.toLowerCase();
  if(assignTabState==='batch'){const items=sortNm(DB.batches.filter(x=>x.name.toLowerCase().includes(q)));b.innerHTML=selAllBtn(items.map(x=>x.id),'batches')+items.map(x=>`<span class="chip ${e.batches.includes(x.id)?'on':''}" onclick="toggleAssign('batches','${x.id}','${esc(x.name)}')">${esc(x.name)} · ${DB.students.filter(s=>s.batch===x.id).length}</span>`).join('')+`<div class="mini" style="margin-top:8px">Assigning a batch includes <b>all its students</b> automatically.</div>`;}
  else if(assignTabState==='stud'){const items=sortP(DB.students.filter(s=>(s.fn+' '+s.ln+' '+(s.cid||'')).toLowerCase().includes(q)));b.innerHTML=selAllBtn(items.map(x=>x.id),'students')+items.map(s=>{const viaBatch=e.batches.includes(s.batch);const on=e.students.includes(s.id)||viaBatch;return `<span class="chip ${on?'on':''}" onclick="toggleAssign('students','${s.id}','${esc(s.fn+' '+s.ln)}')">${esc(s.fn)} ${esc(s.ln)}${viaBatch?' · via batch':''}</span>`;}).join('')||'<div class="mini">No students match.</div>';}
  else{const items=sortP(DB.staff.filter(s=>(s.fn+' '+s.ln).toLowerCase().includes(q)));b.innerHTML=selAllBtn(items.map(x=>x.id),'leaders')+items.map(s=>`<span class="chip ${e.leaders.includes(s.id)?'on':''}" onclick="toggleAssign('leaders','${s.id}','${esc(s.fn+' '+s.ln)}')">${esc(s.fn)} ${esc(s.ln)}</span>`).join('')||'<div class="mini">No staff match.</div>';}}
function selAllBtn(ids,field){if(!ids.length)return '';const e=DB.events.find(x=>x.id===window._ae);const all=ids.every(i=>e[field].includes(i));return `<button class="btn sm ghost" style="margin-bottom:10px" onclick="selectAllVisible('${field}',${JSON.stringify(ids).replace(/"/g,'&quot;')})">${all?'Unselect all visible':'Select all visible ('+ids.length+')'}</button>`;}
function selectAllVisible(field,ids){const e=DB.events.find(x=>x.id===window._ae);const all=ids.every(i=>e[field].includes(i));if(all)e[field]=e[field].filter(i=>!ids.includes(i));else ids.forEach(i=>{if(!e[field].includes(i))e[field].push(i);});save();assignBody();toast(all?'Cleared visible':'Added visible');}
function toggleAssign(field,vid,name){const e=DB.events.find(x=>x.id===window._ae),arr=e[field],i=arr.indexOf(vid);if(field==='students'){const viaBatch=e.batches.includes((DB.students.find(s=>s.id===vid)||{}).batch);if(i<0&&viaBatch){toast(name+' already added (via batch)');return;}}if(i>=0){arr.splice(i,1);toast('Removed '+name);}else{arr.push(vid);toast('Added '+name);}save();assignBody();}

/* ================= CSV IMPORT ================= */
function downloadSampleCSV(kind){if(kind==='students')dl('students-sample.csv','First Name,Last Name,Campus ID,Email ID,Batch\nAlice,Johnson,SPJ001,alice.johnson@spjain.org,GMBA June 2026\nBrian,Lee,SPJ002,brian.lee@spjain.org,\n','text/csv');else if(kind==='events')dl('events-sample.csv','Event Name,Date,Start Time,End Time\nSports Day,15-11-2026,09:00,15:00\nGuest Lecture,03-12-2026,2:00 PM,4:30 PM\n','text/csv');else dl('staff-sample.csv','First Name,Last Name,Email ID\nJohn,Smith,john.smith@spjain.org\nEmily,Davis,emily.davis@spjain.org\n','text/csv');toast('Sample CSV downloaded');}
function csvImport(kind){const ex=kind==='students'?'First Name, Last Name, Campus ID, Email ID, Batch':kind==='events'?'Event Name, Date (DD-MM-YYYY), Start Time, End Time':'First Name, Last Name, Email ID';const ph=kind==='students'?'Alice,Johnson,SPJ020,alice@spjain.org,GMBA June 2026':kind==='events'?'Sports Day,15-11-2026,09:00,15:00':'John,Smith,john@spjain.org';sheet(`<h3>Bulk import ${kind}</h3><div class="muted">Columns: <b>${ex}</b>${kind==='students'?'<br>If the <b>batch</b> is missing or misspelled, the student goes to <b>Unassigned</b>.':''}${kind==='events'?'<br>Past-dated or invalid rows are skipped.':''}</div><button class="btn ghost sm" style="margin-top:10px" onclick="downloadSampleCSV('${kind}')">${ico('dl')} Download sample CSV</button><input type="file" accept=".csv" id="csvFile" class="t" style="margin-top:12px" onchange="readCsvFile()"><label class="f">…or paste rows</label><textarea class="t" id="csvText" placeholder="${ph}"></textarea>${kind==='students'?`<label class="f">Default batch (used when a row has no batch column)</label><select class="t" id="csvBatch"><option value="">— Unassigned —</option>${DB.batches.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('')}</select>`:''}<button class="btn primary" style="margin-top:16px" onclick="doImport('${kind}')">Import</button><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Cancel</button>`);}
function readCsvFile(){const f=$('csvFile').files[0];if(!f)return;const r=new FileReader();r.onload=e=>{$('csvText').value=e.target.result;};r.readAsText(f);}
function doImport(kind){const txt=$('csvText').value.trim();if(!txt){closeSheet();return;}const lines=txt.split(/\r?\n/).filter(l=>l.trim());let n=0,un=0,dup=0;const defB=kind==='students'?$('csvBatch').value:'';const today=new Date().toISOString().slice(0,10);
  const nrm=s=>(s||'').trim().toLowerCase();const emails=new Set(),cids=new Set();
  if(kind==='students')DB.students.forEach(s=>{if(s.email)emails.add(nrm(s.email));if(s.cid)cids.add(nrm(s.cid));});
  if(kind==='staff')DB.staff.forEach(s=>{if(s.email)emails.add(nrm(s.email));});
  lines.forEach((line,i)=>{const c=line.split(',').map(x=>x.trim());if(i===0&&/first\s*name|event\s*name/i.test(line))return;if(!c[0])return;
    if(kind==='students'){const em=nrm(c[3]),cid=nrm(c[2]);if((em&&emails.has(em))||(cid&&cids.has(cid))){dup++;return;}if(em)emails.add(em);if(cid)cids.add(cid);let bId=defB;if(c[4]){const bm=DB.batches.find(x=>x.name.trim().toLowerCase()===c[4].trim().toLowerCase());bId=bm?bm.id:'';}if(!bId)un++;DB.students.push({id:uid(),fn:c[0],ln:c[1]||'',cid:c[2]||'',email:c[3]||'',batch:bId});}

    else {const em=nrm(c[2]);if(em&&emails.has(em)){dup++;return;}if(em)emails.add(em);DB.staff.push({id:uid(),fn:c[0],ln:c[1]||'',email:c[2]||'',group:DB.groups[0]?.id});}
    n++;});
  save();closeSheet();render();
  const resLines=['✓ <b>'+n+'</b> '+kind+' imported'];
  if(kind==='students'&&un)resLines.push(un+' placed in <b>Unassigned</b> (missing/unknown batch)');

  if(dup)resLines.push('⚠ <b>'+dup+'</b> duplicate'+(dup>1?'s':'')+' skipped (email or campus ID already exists)');
  sheet('<h3>Import '+(dup?'finished':'complete')+'</h3><div class="banner '+(dup?'warn':'')+'" style="margin:4px 0 16px">'+ico(dup?'info':'check')+'<div>'+resLines.join('<br>')+'</div></div><button class="btn primary" onclick="closeSheet();render()">Close</button>');}
