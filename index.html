/* Saves a file. Priority on the native app: (1) your chosen SAF folder (silent, auto-
   syncs if that folder is a Drive/OneDrive folder), else (2) the native share sheet.
   On the web it falls back to a normal browser download. */
async function saveFile(name,content,mime,purpose){
  purpose=purpose||'report';
  // 1) OneDrive (native app OR hosted web page), when signed in with a folder chosen
  if(odSignedIn()&&odFolder(purpose)){
    try{await odUpload(purpose,name,content,mime);toast('Saved to OneDrive ('+odFolder(purpose).name+')');return true;}
    catch(e){toast('OneDrive save failed: '+(e&&e.message||e));}
  }
  // 1b) Google Drive (hosted web page) — single "SPJ Attendance" folder
  if(gdSignedIn()){
    try{await gdUpload(name,content,mime);toast('Saved to Google Drive');return true;}
    catch(e){toast('Google Drive save failed: '+(e&&e.message||e));}
  }
  if(isNative()){
    const saf=safPlugin();
    if(saf&&safFolderName(purpose)){
      try{const data=await toBase64(content,mime);await saf.saveToFolder({key:purpose,name,data,mime:mime||'application/octet-stream'});toast('Saved to your '+purpose+' folder ('+safFolderName(purpose)+')');return true;}
      catch(e){const m=(e&&(e.message||e)+'')||'';if(m.indexOf('no-')>=0){try{localStorage.removeItem('spj_saf_'+purpose);}catch(_){}toast('Lost access to the '+purpose+' folder — please pick it again');}}
    }
    if(window.Capacitor.Plugins&&window.Capacitor.Plugins.Filesystem){
      try{const {Filesystem,Share}=window.Capacitor.Plugins;const data=await toBase64(content,mime);const w=await Filesystem.writeFile({path:name,data,directory:'CACHE'});const uri=(w&&w.uri)||'';if(Share&&Share.share&&uri){try{await Share.share({title:name,text:name,url:uri,files:[uri],dialogTitle:'Save or share '+name});}catch(e){}}toast('Saved — choose where to keep it');return true;}
      catch(e){toast('Could not save file: '+(e&&e.message||e));return false;}
    }
  } else {
    // 2) Web: try the share sheet (works well on iPhone/Android Safari) before a plain download
    try{const b=content instanceof Blob?content:new Blob([content],{type:mime});const file=new File([b],name,{type:mime||'application/octet-stream'});if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:name});return true;}}catch(e){}
  }
  const blob=content instanceof Blob?content:new Blob([content],{type:mime});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(url),1500);return true;
}

function gdInit(){const L=gdLib();if(!L||!gdClientId())return;_gtc=L.initTokenClient({client_id:gdClientId(),scope:'https://www.googleapis.com/auth/drive.file',callback:function(resp){if(resp&&resp.access_token){_gtok=resp.access_token;_gexp=Date.now()+((resp.expires_in||3600)*1000)-60000;const c=gdCfg();c.connected=true;gdSetCfg(c);}if(_gresolve){_gresolve(resp);_gresolve=null;_greject=null;}}});}
function gdConnect(){if(!gdClientId()){toast('Enter and save your Client ID first');return;}if(!gdLib()){toast('Google sign-in is still loading — wait a moment and tap again');return;}if(!_gtc)gdInit();if(!_gtc){toast('Could not start Google sign-in');return;}try{_gtc.requestAccessToken({prompt:'consent'});setTimeout(render,1200);}catch(e){toast('Connect failed: '+(e&&e.message||e));}}
function gdToken(){return new Promise((res,rej)=>{if(_gtok&&Date.now()<_gexp)return res(_gtok);if(!_gtc)gdInit();if(!_gtc)return rej(new Error('Not connected'));_gresolve=r=>{if(r&&r.access_token)res(r.access_token);else rej(new Error(r&&r.error||'auth failed'));};try{_gtc.requestAccessToken({prompt:''});}catch(e){rej(e);}});}
function gdSignOut(){try{if(_gtok&&gdLib().revoke)gdLib().revoke(_gtok,function(){});}catch(e){}_gtok=null;_gexp=0;const c=gdCfg();gdSetCfg({clientId:c.clientId});toast('Disconnected Google Drive');render();}
async function gdFolderId(){const c=gdCfg();if(c.folderId)return c.folderId;const t=await gdToken();
  const q=encodeURIComponent("mimeType='application/vnd.google-apps.folder' and name='SPJ Attendance' and trashed=false");
  let res=await fetch('https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id)&spaces=drive',{headers:{Authorization:'Bearer '+t}});let j=await res.json();let id=j.files&&j.files[0]&&j.files[0].id;
  if(!id){res=await fetch('https://www.googleapis.com/drive/v3/files?fields=id',{method:'POST',headers:{Authorization:'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify({name:'SPJ Attendance',mimeType:'application/vnd.google-apps.folder'})});j=await res.json();id=j.id;}
  if(!id)throw new Error('folder failed');c.folderId=id;gdSetCfg(c);return id;}
async function gdUpload(name,content,mime){const t=await gdToken();const folderId=await gdFolderId();const blob=content instanceof Blob?content:new Blob([content],{type:mime||'application/octet-stream'});
  const q=encodeURIComponent("name='"+name.replace(/'/g,"\\'")+"' and '"+folderId+"' in parents and trashed=false");
  let res=await fetch('https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id)',{headers:{Authorization:'Bearer '+t}});let j=await res.json();const existing=j.files&&j.files[0]&&j.files[0].id;
  if(existing){res=await fetch('https://www.googleapis.com/upload/drive/v3/files/'+existing+'?uploadType=media',{method:'PATCH',headers:{Authorization:'Bearer '+t,'Content-Type':mime||'application/octet-stream'},body:blob});}
  else{const meta={name:name,parents:[folderId]};const fd=new FormData();fd.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));fd.append('file',blob);res=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+t},body:fd});}
  if(!res.ok){let m='';try{m=(await res.json()).error.message;}catch(e){m=res.status;}throw new Error(m);}return true;}
async function gdRestore(){if(!gdSignedIn()){toast('Connect Google Drive first');return;}sheet('<h3>Restore from Google Drive</h3><div class="muted">Loading…</div>');
  try{const t=await gdToken();const folderId=await gdFolderId();const q=encodeURIComponent("'"+folderId+"' in parents and trashed=false");const res=await fetch('https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id,name,modifiedTime)&orderBy=modifiedTime desc',{headers:{Authorization:'Bearer '+t}});const j=await res.json();if(!res.ok)throw new Error('list failed');
    let files=(j.files||[]).filter(x=>/\.json$/i.test(x.name));if(!files.length){sheet('<h3>Restore from Google Drive</h3><div class="muted">No .json backups in the SPJ Attendance folder.</div><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Close</button>');return;}
    const rows=files.slice(0,30).map(x=>`<button class="btn ghost" style="display:block;width:100%;text-align:left;margin-bottom:8px" onclick="gdDoRestore('${x.id}','${esc(x.name).replace(/'/g,"\\'")}')"><b>${esc(x.name)}</b><br><span class="mini">${x.modifiedTime?new Date(x.modifiedTime).toLocaleString('en-GB'):''}</span></button>`).join('');
    sheet('<h3>Restore from Google Drive</h3><div class="muted" style="margin-bottom:10px">Newest first. This REPLACES all data on this device.</div>'+rows+'<button class="btn ghost" onclick="closeSheet()">Cancel</button>');
  }catch(e){sheet('<h3>Restore from Google Drive</h3><div class="muted">Error: '+esc(e.message||e)+'</div><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Close</button>');}}
async function gdDoRestore(id,name){if(!confirm('Restore "'+name+'"? This REPLACES all current data on this device.'))return;
  try{const t=await gdToken();const res=await fetch('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media',{headers:{Authorization:'Bearer '+t}});if(!res.ok)throw new Error('download failed');let text=await res.text();let d;try{d=JSON.parse(text);}catch(x){d=null;}
    if(d&&d.spjEnc){const pass=prompt('This backup is encrypted. Enter the passphrase:');if(!pass){toast('Cancelled');return;}try{text=await decJSON(text,pass);d=JSON.parse(text);}catch(x){alert('Wrong passphrase or corrupted file.');return;}}
    if(!d||!d.events||!d.students||!d.users)throw 0;DB=d;migrate();save(false);SESSION=null;clearTimeout(sessionTimer);closeSheet();render();toast('Restored — please sign in');
  }catch(e){alert('Could not restore this file.');}}
function gdConfigSheet(){const c=gdCfg();sheet(`<h3>Google Drive</h3><div class="muted" style="margin-bottom:10px">Paste the <b>OAuth Client ID</b> from your Google Cloud project (Web application), then connect. Files are kept in a <b>“SPJ Attendance”</b> folder in your Drive.</div><label class="f">Client ID</label><input class="t" id="gdCid" value="${esc(c.clientId||'')}" placeholder="xxxxx.apps.googleusercontent.com"><button class="btn primary" style="margin-top:14px" onclick="gdSaveCid()">Save Client ID</button>${gdSignedIn()?`<div class="mini" style="margin-top:12px">✓ Connected</div><button class="btn subtle" style="margin-top:8px" onclick="gdSignOut()">Disconnect</button>`:`<button class="btn subtle" style="margin-top:10px" onclick="gdConnect()">${ico('lock')} Connect Google Drive</button>`}<button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Close</button>`);}
function gdSaveCid(){const v=$('gdCid').value.trim();const c=gdCfg();c.clientId=v;gdSetCfg(c);toast('Client ID saved');gdInit();render();}

/* ================= FIRESTORE LIVE SYNC + BACKUPS ================= */
const FB={app:null,dbx:null,docRef:null,unsub:null,connected:false,applying:false,pushT:null,deviceId:null};
function fbAvailable(){return typeof firebase!=='undefined'&&!!firebase.initializeApp;}
function fbCfg(){try{return JSON.parse(localStorage.getItem('spj_fb')||'{}');}catch(e){return{};}}
function fbSetCfg(o){try{localStorage.setItem('spj_fb',JSON.stringify(o));}catch(e){}}
function fbPass(){try{return localStorage.getItem('spj_fb_pw')||'';}catch(e){return '';}}
function fbConfigured(){const c=fbCfg();return fbAvailable()&&c.apiKey&&c.projectId&&c.email;}
function fbDevice(){if(!FB.deviceId){try{FB.deviceId=localStorage.getItem('spj_fb_dev');}catch(e){}if(!FB.deviceId){FB.deviceId=_rand(6);try{localStorage.setItem('spj_fb_dev',FB.deviceId);}catch(e){}}}return FB.deviceId;}
function fbInitApp(){if(FB.app)return;const c=fbCfg();FB.app=firebase.initializeApp({apiKey:c.apiKey,authDomain:c.authDomain||(c.projectId+'.firebaseapp.com'),projectId:c.projectId,appId:c.appId||'',storageBucket:(c.projectId+'.appspot.com')});FB.dbx=firebase.firestore();}
async function fbConnect(silent){if(!fbConfigured()){if(!silent)toast('Enter Firebase settings first');return;}if(!fbPass()){if(!silent)toast('Enter the workspace password');return;}
  try{fbInitApp();await firebase.auth().signInWithEmailAndPassword(fbCfg().email,fbPass());fbDevice();
    FB.docRef=FB.dbx.collection('workspace').doc('db');
    if(FB.unsub)FB.unsub();
    FB.unsub=FB.docRef.onSnapshot(snap=>{try{if(snap.metadata.hasPendingWrites)return;if(!snap.exists){fbPush(true);return;}const d=snap.data();if(!d||!d.data)return;let remote;try{remote=JSON.parse(d.data);}catch(e){return;}const rrev=(remote.meta&&remote.meta.rev)||0,lrev=(DB.meta&&DB.meta.rev)||0;if(d.by===fbDevice()&&rrev<=lrev)return;if(rrev<lrev)return;FB.applying=true;DB=remote;try{migrate();normalize();}catch(e){}persist();FB.applying=false;if(SESSION&&!findUser(SESSION.u)){endSession();}render();}catch(e){}},err=>{});
    FB.connected=true;if(!silent){toast('Live sync connected');render();}
  }catch(e){FB.connected=false;const m=(e&&e.message||'')+'';if(!silent)toast('Sync connect failed: '+(m.includes('password')||m.includes('credential')?'wrong workspace password':m));}}
function fbPush(force){if(!FB.connected||!FB.docRef)return;if(FB.applying&&!force)return;clearTimeout(FB.pushT);FB.pushT=setTimeout(()=>{try{FB.docRef.set({data:JSON.stringify(DB),rev:(DB.meta&&DB.meta.rev)||0,at:firebase.firestore.FieldValue.serverTimestamp(),by:fbDevice()});}catch(e){}},700);}
function fbMaybePush(){if(FB.connected&&!FB.applying)fbPush();}
function fbAutoConnect(){if(fbConfigured()&&fbPass())fbConnect(true);}
function fbDisconnect(){try{if(FB.unsub)FB.unsub();}catch(e){}try{firebase.auth().signOut();}catch(e){}FB.connected=false;try{localStorage.removeItem('spj_fb_pw');}catch(e){}toast('Live sync disconnected');render();}
async function fbBackupNow(){if(!FB.connected){toast('Connect live sync first');return;}try{await FB.dbx.collection('backups').add({data:JSON.stringify(DB),rev:(DB.meta&&DB.meta.rev)||0,at:firebase.firestore.FieldValue.serverTimestamp(),by:fbDevice(),label:new Date().toLocaleString('en-GB')});
    const snap=await FB.dbx.collection('backups').orderBy('at','desc').get();let i=0;snap.forEach(doc=>{i++;if(i>30)doc.ref.delete();});toast('Restore point saved to Firestore');}catch(e){toast('Backup failed: '+(e&&e.message||e));}}
async function fbBackupSilent(){if(!FB.connected)return false;try{await FB.dbx.collection('backups').add({data:JSON.stringify(DB),rev:(DB.meta&&DB.meta.rev)||0,at:firebase.firestore.FieldValue.serverTimestamp(),by:fbDevice(),label:new Date().toLocaleString('en-GB')+' · auto'});const snap=await FB.dbx.collection('backups').orderBy('at','desc').get();let i=0;snap.forEach(doc=>{i++;if(i>30)doc.ref.delete();});return true;}catch(e){return false;}}
async function fbRestorePoints(){if(!FB.connected){toast('Connect live sync first');return;}sheet('<h3>Restore points (Firestore)</h3><div class="muted">Loading…</div>');
  try{const snap=await FB.dbx.collection('backups').orderBy('at','desc').limit(20).get();const rows=[];snap.forEach(doc=>{const d=doc.data();rows.push(`<button class="btn ghost" style="display:block;width:100%;text-align:left;margin-bottom:8px" onclick="fbDoRestore('${doc.id}')"><b>${esc(d.label||doc.id)}</b><br><span class="mini">rev ${d.rev||0}</span></button>`);});
    if(!rows.length){sheet('<h3>Restore points (Firestore)</h3><div class="muted">No restore points yet. Tap “Save restore point”.</div><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Close</button>');return;}
    sheet('<h3>Restore points (Firestore)</h3><div class="muted" style="margin-bottom:10px">Newest first. Restores to ALL devices.</div>'+rows.join('')+'<button class="btn ghost" onclick="closeSheet()">Cancel</button>');
  }catch(e){sheet('<h3>Restore points</h3><div class="muted">Error: '+esc(e.message||e)+'</div><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Close</button>');}}
async function fbDoRestore(id){if(!confirm('Restore this point? It REPLACES the live data for everyone.'))return;try{const doc=await FB.dbx.collection('backups').doc(id).get();const d=doc.data();if(!d||!d.data)throw 0;DB=JSON.parse(d.data);migrate();normalize();save();closeSheet();render();toast('Restored to all devices');}catch(e){alert('Could not restore.');}}
function fbConfigSheet(){const c=fbCfg();sheet(`<h3>Live Sync (Firestore)</h3><div class="muted" style="margin-bottom:10px">Paste your Firebase project details, the shared workspace email, and the workspace password. Every device with these + the password sees the same live data.</div>
  <label class="f">API key</label><input class="t" id="fbK" value="${esc(c.apiKey||'')}" placeholder="AIza...">
  <label class="f">Project ID</label><input class="t" id="fbP" value="${esc(c.projectId||'')}" placeholder="spj-attendance-xxxx">
  <label class="f">App ID</label><input class="t" id="fbA" value="${esc(c.appId||'')}" placeholder="1:123...:web:...">
  <label class="f">Workspace email</label><input class="t" id="fbE" value="${esc(c.email||'')}" placeholder="workspace@yourschool.com">
  <label class="f">Workspace password</label><input class="t" id="fbW" type="password" placeholder="${fbPass()?'•••••••• (saved on this device)':'shared password'}">
  <button class="btn primary" style="margin-top:14px" onclick="fbSaveConnect()">${FB.connected?'Save & reconnect':'Save & connect'}</button>
  ${FB.connected?'<div class="mini" style="margin-top:12px">✓ Live sync connected</div><button class="btn subtle" style="margin-top:8px" onclick="fbDisconnect()">Disconnect</button>':''}
  <button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Close</button>`);}
function fbSaveConnect(){const c=fbCfg();c.apiKey=$('fbK').value.trim();c.projectId=$('fbP').value.trim();c.appId=$('fbA').value.trim();c.email=$('fbE').value.trim();c.authDomain=c.projectId+'.firebaseapp.com';fbSetCfg(c);const pw=$('fbW').value;if(pw){try{localStorage.setItem('spj_fb_pw',pw);}catch(e){}}closeSheet();fbConnect(false);}
function autoBackupSheet(){const cur=DB.meta.autoBackup||'off';sheet(`<h3>Auto-backup</h3><div class="muted" style="margin-bottom:12px">When the app opens and a backup is due, it saves a full JSON backup automatically. To make it a <b>cloud</b> backup, point your browser's download folder to a cloud-synced folder (iCloud Drive · OneDrive · Google Drive) — the file then syncs on its own.</div>${['off','daily','weekly'].map(o=>`<button class="btn ${cur===o?'primary':'ghost'}" style="margin-bottom:10px" onclick="setAutoBackup('${o}')">${o==='off'?'Off':o[0].toUpperCase()+o.slice(1)}</button>`).join('')}<div class="mini" style="margin-top:6px">Last backup: ${DB.meta.lastBackupAt?new Date(DB.meta.lastBackupAt).toLocaleString('en-GB'):'never'}</div>`);}
function setAutoBackup(o){DB.meta.autoBackup=o;save();closeSheet();render();toast('Auto-backup: '+o);}
function toggleSecrets(){DB.meta.includeSecrets=!DB.meta.includeSecrets;save();render();toast(DB.meta.includeSecrets?'SMTP password & token WILL be included in backups':'SMTP password & token excluded from backups');}
function serverBackupSheet(){const u=DB.meta.backupUrl||'',t=DB.meta.backupToken||'';sheet(`<h3>Server backup</h3><div class="muted" style="margin-bottom:8px">Pushes the full backup to your relay's <b>/backup</b> endpoint, which archives a timestamped copy on your server. With Auto-backup on, this happens automatically each time the app opens and a backup is due.</div><label class="f">Backup endpoint (HTTPS)</label><input class="t" id="buU" value="${esc(u)}" placeholder="https://your-relay.example.com/backup"><label class="f">Relay token (optional)</label><input class="t" id="buT" value="${esc(t)}"><button class="btn primary" style="margin-top:16px" onclick="saveServerBackup()">Save</button><button class="btn subtle" style="margin-top:10px" onclick="pushBackup(true)">${ico('share')} Back up to server now</button><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Close</button>${DB.meta.lastServerBackup?`<div class="mini" style="margin-top:8px">Last server backup: ${new Date(DB.meta.lastServerBackup).toLocaleString('en-GB')}</div>`:''}`);}
function saveServerBackup(){DB.meta.backupUrl=$('buU').value.trim();DB.meta.backupToken=$('buT').value.trim();save();closeSheet();render();toast('Server backup settings saved');}
/* ---- optional passphrase encryption (AES-256-GCM, key stays on device) ---- */
const cryptoOk=(typeof crypto!=='undefined'&&crypto.subtle);
function bkPass(){try{return localStorage.getItem('spj_bk_pass')||'';}catch(e){return '';}}
function _b64(bytes){let s='';const a=new Uint8Array(bytes);for(let i=0;i<a.length;i++)s+=String.fromCharCode(a[i]);return btoa(s);}
function _ub64(str){const s=atob(str);const a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function _deriveKey(pass,salt,use){const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:120000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,[use]);}
async function encJSON(text,pass){const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12));const key=await _deriveKey(pass,salt,'encrypt');const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(text));return JSON.stringify({spjEnc:1,alg:'AES-GCM',iter:120000,salt:_b64(salt),iv:_b64(iv),ct:_b64(ct)});}
async function decJSON(fileText,pass){let d;try{d=JSON.parse(fileText);}catch(e){return fileText;}if(!d||!d.spjEnc)return fileText;const key=await _deriveKey(pass,_ub64(d.salt),'decrypt');const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:_ub64(d.iv)},key,_ub64(d.ct));return new TextDecoder().decode(pt);}
async function maybeEncrypt(json,base){const p=bkPass();if(p&&cryptoOk){return {text:await encJSON(json,p),name:base+'.enc.json'};}return {text:json,name:base+'.json'};}
function encSheet(){const has=!!bkPass();sheet(`<h3>Backup encryption</h3><div class="muted" style="margin-bottom:10px">Encrypts every backup (download · cloud share · server) with AES-256 from your passphrase. The passphrase is kept <b>only on this device</b>, never inside the backup — you'll need it to restore.${cryptoOk?'':' <b style="color:var(--a1)">Not supported in this browser.</b>'}</div><label class="f">Passphrase</label><input class="t" id="bkP" type="password" placeholder="${has?'•••••••• (currently set)':'Enter a passphrase'}"><button class="btn primary" style="margin-top:16px" ${cryptoOk?'':'disabled'} onclick="saveBkPass()">${has?'Update passphrase':'Enable encryption'}</button>${has?`<button class="btn danger" style="margin-top:10px" onclick="clearBkPass()">Turn off encryption</button>`:''}<button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Cancel</button>`);}
function saveBkPass(){const p=$('bkP').value;if(!p){toast('Enter a passphrase');return;}try{localStorage.setItem('spj_bk_pass',p);}catch(e){}closeSheet();render();toast('Backup encryption enabled');}
function clearBkPass(){if(!confirm('Turn off encryption? New backups will be unencrypted (existing encrypted files still need the passphrase).'))return;try{localStorage.removeItem('spj_bk_pass');}catch(e){}closeSheet();render();toast('Encryption off');}

async function shareBackup(){DB.meta.backupRev=DB.meta.rev||0;DB.meta.app='SPJ Attendance';DB.meta.version=2;DB.meta.lastBackupAt=Date.now();persist();const {text,name}=await maybeEncrypt(exportJSON(),'spj-attendance-backup-'+new Date().toISOString().slice(0,10));try{const file=new File([text],name,{type:'application/json'});if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:'SPJ Attendance backup'});toast('Shared'+(bkPass()?' (encrypted)':'')+' — save to iCloud / OneDrive / Drive');render();return;}}catch(e){}dl(name,text,'application/json');toast('Backup downloaded'+(bkPass()?' (encrypted)':''));render();}
/* on-device snapshots */
function openSnapshots(){sheet(`<h3>On-device snapshots</h3><div class="muted" style="margin-bottom:8px">Automatic safety copies kept on this device (auto after each completed event & periodically). Restoring reverts all data to that point.</div><button class="btn subtle sm" onclick="snapshotNow()">${ico('dl')} Create snapshot now</button><div id="snapList" style="margin-top:12px">Loading…</div><button class="btn ghost" style="margin-top:14px" onclick="closeSheet()">Close</button>`);fillSnaps();}
async function fillSnaps(){const el=$('snapList');if(!el)return;const all=await idbAll('snaps');all.sort((a,b)=>b.ts-a.ts);el.innerHTML=all.length?all.map(s=>`<div class="rowline"><div class="grow"><div style="font-weight:600">${new Date(s.ts).toLocaleString('en-GB')}</div><div class="mini">${(s.size/1024).toFixed(1)} KB</div></div><button class="btn sm subtle" onclick="restoreSnap(${s.ts})">Restore</button></div>`).join(''):'<div class="mini">No snapshots yet.</div>';}
async function snapshotNow(){await maybeSnapshot(true);toast('Snapshot created');fillSnaps();}
async function restoreSnap(ts){if(!confirm('Restore this snapshot? Current data will be replaced.'))return;const all=await idbAll('snaps');const s=all.find(x=>x.ts===ts);if(!s)return;try{DB=JSON.parse(s.data);migrate();persist();closeSheet();SESSION=null;clearTimeout(sessionTimer);render();toast('Snapshot restored — please sign in');}catch(e){toast('Restore failed');}}

function editRecipients(){const list=(DB.recipients||[]);sheet(`<h3>Default recipients</h3><div class="muted" style="margin-bottom:8px">Attendance reports are emailed to these addresses.</div><div id="recList">${recRows(list)}</div><label class="f">Add email</label><div class="selrow" style="margin:0"><input class="t" id="recNew" placeholder="name@spjain.org"><button class="btn subtle sm" onclick="addRecipient()">Add</button></div><button class="btn primary" style="margin-top:16px" onclick="closeSheet()">Done</button>`);}
function recRows(list){return list.length?list.map((e,i)=>`<div class="rowline"><div class="grow" style="font-weight:600">${esc(e)}</div><button class="btn sm danger" onclick="delRecipient(${i})">${ico('x')}</button></div>`).join(''):'<div class="mini">No recipients yet.</div>';}
function addRecipient(){const v=$('recNew').value.trim();if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v)){toast('Enter a valid email');return;}DB.recipients=DB.recipients||[];if(DB.recipients.includes(v)){toast('Already added');return;}DB.recipients.push(v);save();$('recNew').value='';$('recList').innerHTML=recRows(DB.recipients);}
function delRecipient(i){DB.recipients.splice(i,1);save();$('recList').innerHTML=recRows(DB.recipients);}
function editSmtp(){const s=DB.smtp||{};sheet(`<h3>Email / SMTP settings</h3><div class="muted" style="margin-bottom:6px">Browsers can't speak SMTP directly, so sending uses a small HTTPS relay you host (e.g. a serverless function) that accepts these settings. Leave the relay blank to send via your device's share sheet instead.</div>
  <label class="f">From name</label><input class="t" id="smFn" value="${esc(s.fromName||'')}">
  <label class="f">From email</label><input class="t" id="smFe" value="${esc(s.fromEmail||'')}" placeholder="attendance@spjain.org">
  <label class="f">SMTP host</label><input class="t" id="smH" value="${esc(s.host||'')}" placeholder="smtp.office365.com">
  <div style="display:flex;gap:10px"><div style="flex:1"><label class="f">Port</label><input class="t" id="smP" value="${esc(s.port||'587')}"></div><div style="flex:1"><label class="f">Security</label><select class="t" id="smS"><option value="tls" ${s.secure==='tls'?'selected':''}>STARTTLS</option><option value="ssl" ${s.secure==='ssl'?'selected':''}>SSL/TLS</option><option value="none" ${s.secure==='none'?'selected':''}>None</option></select></div></div>
  <label class="f">Username</label><input class="t" id="smU" value="${esc(s.user||'')}" autocomplete="off">
  <label class="f">Password / App password</label><input class="t" id="smPw" type="password" value="${esc(s.pass||'')}" autocomplete="new-password">
  <label class="f">Send relay endpoint (HTTPS)</label><input class="t" id="smR" value="${esc(s.relay||'')}" placeholder="https://your-relay.example.com/send">
  <button class="btn primary" style="margin-top:16px" onclick="saveSmtp()">Save settings</button><button class="btn ghost" style="margin-top:10px" onclick="closeSheet()">Cancel</button>`);}
function saveSmtp(){DB.smtp={fromName:$('smFn').value.trim(),fromEmail:$('smFe').value.trim(),host:$('smH').value.trim(),port:$('smP').value.trim(),secure:$('smS').value,user:$('smU').value.trim(),pass:$('smPw').value,relay:$('smR').value.trim()};save();closeSheet();render();toast('Email settings saved');}
function blobToB64(blob){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result).split(',')[1]);r.onerror=rej;r.readAsDataURL(blob);});}
async function emailReport(subject,filename,blob,mime){
  mime=mime||'application/octet-stream';
  const to=(DB.recipients||[]).slice();if(!to.length){toast('No recipients set — add them in More → Email');return;}
  const s=DB.smtp||{};
  if(s.relay){
    snack('Sending email…',null,4000);
    try{
      const b64=await blobToB64(blob);
      const res=await fetch(s.relay,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({host:s.host,port:s.port,secure:s.secure,user:s.user,pass:s.pass,fromName:s.fromName,from:s.fromEmail,to,subject,filename,mime,attachmentBase64:b64})});
      if(res.ok){snack('✓ Email sent successfully to '+to.length+' recipient'+(to.length>1?'s':''),null,3000);}
      else{let msg='';try{msg=(await res.text()).slice(0,120);}catch(e){}snack('✗ Send failed ('+res.status+') '+msg,null,4500);}
    }catch(err){snack('✗ Send failed: '+(err&&err.message||'network error'),null,4500);}
    return;
  }
  // No relay → use device share sheet (works offline; user picks their mail app)
  if(isNative()){await saveFile(filename,blob,mime);snack('File ready — pick your email app to attach & send',null,3500);return;}
  try{const file=new File([blob],filename,{type:mime});if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:subject,text:'To: '+to.join(', ')});snack('Opened share — choose your email app',null,3000);return;}}catch(e){}
  try{dl(filename,blob,mime);}catch(e){}
  location.href='mailto:'+encodeURIComponent(to.join(','))+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent('Attendance file attached: '+filename);
  snack('No relay set — file downloaded & email draft opened',null,4000);
}
function csvBlob(rows){return new Blob([rows.map(r=>r.map(csvEsc).join(',')).join('\n')],{type:'text/csv'});}

/* ================= PDF / EXCEL ================= */
function pdfReady(){if(!window.jspdf||!window.jspdf.jsPDF){toast('PDF engine needs internet once to load');return false;}return true;}
async function shareOrDownload(doc,fname,title,text){
  let blob;try{blob=doc.output('blob');}catch(e){toast('Could not export PDF');return;}
  if(isNative()){await saveFile(fname,blob,'application/pdf','report');return;}
  try{const file=new File([blob],fname,{type:'application/pdf'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){try{await navigator.share({files:[file],title,text});toast('Shared');return;}catch(e){}}
  }catch(e){}
  try{doc.save(fname);toast('PDF downloaded');}catch(e){try{const url=URL.createObjectURL(blob);window.open(url,'_blank');toast('PDF opened');}catch(err){toast('Could not export PDF');}}
}
function csvEsc(s){s=String(s==null?'':s);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}
function toDMY(iso){const m=String(iso||'').match(/^(\d{4})-(\d{2})-(\d{2})$/);return m?m[3]+'-'+m[2]+'-'+m[1]:(iso||'');}
function fromDMY(s){s=String(s||'').trim();let m=s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})$/);if(m)return m[3]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[1]).padStart(2,'0');m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(m)return s;const p=new Date(s);return isNaN(p)?'':p.toISOString().slice(0,10);}
function eventRows(e){const lbl=r=>({present:'Present',absent:'Absent',late:'Late'}[r]||'Unmarked');const mk=e.markedAt?fmtDT(e.markedAt):'';return peopleForEvent(e).map(p=>[e.name,toDMY(e.date),p.fn+' '+p.ln,p.role==='leader'?'Leader':'Student',p.cid||'',p.email||'',p.role==='leader'?'':batchName(p.batch),lbl(e.records[p.id]),mk]);}
const CSV_HEAD=['Event','Date','Name','Role','Campus ID','Email','Batch','Status','Marked At'];
function exportEventCSV(eid){const e=DB.events.find(x=>x.id===eid);const rows=[CSV_HEAD,...eventRows(e)];dl(`Attendance_${e.name.replace(/[^a-z0-9]+/gi,'_')}_${e.date}.csv`,rows.map(r=>r.map(csvEsc).join(',')).join('\n'),'text/csv');toast('Excel (CSV) exported');}
function exportMonthCSV(){const evs=eventsInMonth(repY,repM);if(!evs.length){toast('No events this month');return;}let rows=[CSV_HEAD];evs.forEach(e=>{rows=rows.concat(eventRows(e));});dl(`Attendance_${MONTHS[repM]}_${repY}.csv`,rows.map(r=>r.map(csvEsc).join(',')).join('\n'),'text/csv');toast('Month Excel (CSV) exported');}
function eventPdfBlock(doc,e,y){const c=scount(e);const lbl=r=>({present:'Present',absent:'Absent',late:'Late'}[r]||'Unmarked');if(y>250){doc.addPage();y=18;}doc.setFontSize(13);doc.setTextColor(30,34,51);doc.text(e.name,14,y);y+=6;doc.setFontSize(9);doc.setTextColor(120);doc.text(fmtDate(e.date)+' · '+fmtTime(e.start)+'-'+fmtTime(e.end)+'   Students — Present '+c.present+' · Late '+c.late+' · Absent '+c.absent,14,y);y+=6;if(e.markedAt){doc.setTextColor(150);doc.text('Attendance marked: '+fmtDT(e.markedAt)+(e.markedBy?' · by '+e.markedBy:''),14,y);y+=6;}doc.setTextColor(120);doc.setDrawColor(225);doc.line(14,y,196,y);y+=5;doc.setFontSize(9);studentsForEvent(e).forEach(p=>{if(y>285){doc.addPage();y=18;}const r=e.records[p.id];const col=r==='present'?[26,157,91]:r==='late'?[124,58,237]:r==='absent'?[208,36,47]:[120,120,120];doc.setTextColor(30,34,51);doc.text((p.fn+' '+p.ln).slice(0,32),16,y);doc.setTextColor(120);doc.text(((p.cid||'')+'  '+(p.email||'')).slice(0,46),90,y);doc.setTextColor(...col);doc.text(lbl(r),176,y);y+=6;});
  const ls=leaderStat(e);if(ls.length){if(y>278){doc.addPage();y=18;}doc.setTextColor(120);doc.setFontSize(8);doc.text('Leaders (not counted in stats): '+ls.map(x=>x.l.fn+' '+x.l.ln+' — '+x.label).join(', '),16,y,{maxWidth:180});y+=8;}
  return y+6;}
function buildEventDoc(e){const {jsPDF}=window.jspdf;const doc=new jsPDF();doc.setFontSize(18);doc.setTextColor(208,36,47);doc.text('SPJ London — Attendance',14,18);eventPdfBlock(doc,e,30);doc.setTextColor(150);doc.setFontSize(8);doc.text('Generated by SPJ Attendance — on-device',14,292);return doc;}
function buildMonthDoc(evs){const {jsPDF}=window.jspdf;const doc=new jsPDF();doc.setFontSize(18);doc.setTextColor(208,36,47);doc.text('SPJ London — '+MONTHS[repM]+' '+repY,14,18);let P=0,A=0,L=0;evs.forEach(e=>{const c=scount(e);P+=c.present;A+=c.absent;L+=c.late;});doc.setFontSize(10);doc.setTextColor(30,34,51);doc.text('Events: '+evs.length+'   Students — Present: '+P+'   Late: '+L+'   Absent: '+A,14,27);let y=36;evs.forEach(e=>{y=eventPdfBlock(doc,e,y);});doc.setTextColor(150);doc.setFontSize(8);doc.text('SPJ Attendance — on-device',14,292);return doc;}
function exportEventPDF(eid){if(!pdfReady())return;const e=DB.events.find(x=>x.id===eid);shareOrDownload(buildEventDoc(e),`Attendance_${e.name.replace(/[^a-z0-9]+/gi,'_')}_${e.date}.pdf`,'Attendance',e.name);}
function emailEventReport(eid){const e=DB.events.find(x=>x.id===eid);emailReport('Attendance — '+e.name+' ('+toDMY(e.date)+')',`Attendance_${e.name.replace(/[^a-z0-9]+/gi,'_')}_${e.date}.csv`,csvBlob([CSV_HEAD,...eventRows(e)]),'text/csv');}
function exportMonthPDF(){if(!pdfReady())return;const evs=eventsInMonth(repY,repM);if(!evs.length){toast('No events this month');return;}shareOrDownload(buildMonthDoc(evs),'Attendance_'+MONTHS[repM]+'_'+repY+'.pdf','Attendance '+MONTHS[repM]+' '+repY,'Monthly attendance');}
function emailMonthReport(){const evs=eventsInMonth(repY,repM);if(!evs.length){toast('No events this month');return;}let rows=[CSV_HEAD];evs.forEach(e=>{rows=rows.concat(eventRows(e));});emailReport('Attendance — '+MONTHS[repM]+' '+repY,'Attendance_'+MONTHS[repM]+'_'+repY+'.csv',csvBlob(rows),'text/csv');}

/* ================= VISIBILITY / BOOT ================= */
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&SESSION&&Date.now()>SESSION.exp){endSession();render();toast('Session timed out — please sign in');}});
setInterval(()=>{const c=$('clock');if(c)c.textContent=new Date().toLocaleTimeString('en-GB');},1000);
init();
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('service-worker.js').catch(function(){});});}</script>
