<style>
:root{
  --a1:#D0242F; --a1d:#a81b25; --acc-soft:#fdeaeb;
  --cta:#F5C443; --cta-ink:#4a3a00; --charcoal:#2b2f38;
  --txt:#1a2036; --muted:#646c88; --dim:#98a0bb; --line:#e5e8f1; --bg:#eef1f8; --card:#fff;
  --present:#1a9d5b; --present-bg:#e5f6ed;
  --absent:#D0242F; --absent-bg:#fdeaeb;
  --late:#7c3aed; --late-bg:#f1eafe;
  --orange:#d97706; --blue:#2563eb;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{margin:0;padding:0;width:100%;height:100%;background:var(--bg);}
body{margin:0;padding:0;overflow:hidden;overscroll-behavior:none;background:var(--bg);font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--txt);-webkit-font-smoothing:antialiased;}
#app{display:flex;flex-direction:column;width:100%;height:100vh;height:100dvh;background:var(--bg);overflow:hidden;}
#header{flex:0 0 auto;}
#view{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;padding-bottom:14px;}
#ptr{position:fixed;top:calc(env(safe-area-inset-top) + 6px);left:50%;transform:translateX(-50%) translateY(-46px);width:36px;height:36px;border-radius:50%;background:#fff;box-shadow:0 3px 12px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;opacity:0;z-index:60;transition:opacity .18s;}
#ptr .r{width:18px;height:18px;border:2.6px solid var(--a1);border-top-color:transparent;border-radius:50%;}
#ptr.spin .r{animation:ptrsp .7s linear infinite}@keyframes ptrsp{to{transform:rotate(360deg)}}
/* Home dashboard */
@keyframes dpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.6)}}
.dhero{background:#B01E27;color:#fff;padding:calc(14px + env(safe-area-inset-top)) 18px 30px;border-radius:0 0 24px 24px}

.dpickwrap{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:11px}

.dpill b{display:block;font-size:16px;font-weight:900;color:#B01E27}

.dbody{padding:0 16px 8px}
.dsl{font-size:10.5px;font-weight:800;color:#9aa0ae;letter-spacing:.08em;margin:20px 2px 10px;display:flex;justify-content:space-between;align-items:center}

.livecard{background:#f0faf3;border:1px solid #cde6d6;border-radius:16px;padding:15px;margin-bottom:11px}

.livecard.st-red .lpw,.livecard.st-amber .lpw{background:#eef1f8}
.mhsub{margin-top:12px;font-size:12px;color:rgba(255,255,255,.9);font-weight:600;display:flex;align-items:center;gap:6px}

.minfo{display:flex;align-items:center;gap:10px;background:#f4f5f9;border:0.5px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;opacity:.72;cursor:pointer}
.minfo .mig{flex:1;min-width:0}
.minfo .mn{font-weight:700;font-size:14px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.lrow{display:flex;align-items:center;gap:7px}
.ldot{width:8px;height:8px;border-radius:50%;background:#D0242F;animation:dpulse 1.3s infinite}
.ltag{font-size:9px;font-weight:900;letter-spacing:.1em;color:#D0242F}
.ltm{margin-left:auto;font-size:10px;font-weight:700;color:#5f8a70}
.lname{font-size:18px;font-weight:900;margin-top:8px;color:#12241a}
.lsub{font-size:11px;color:#5f8a70;margin-top:2px;font-weight:600}
.lpw{height:7px;background:#cfeadd;border-radius:5px;margin-top:12px;overflow:hidden}
.lpw i{display:block;height:100%;background:#16a34a;border-radius:5px}
.lpt{font-size:10.5px;font-weight:700;color:#5f8a70;margin-top:6px}
.lbtn{position:relative;overflow:hidden;width:auto;min-width:62%;max-width:100%;display:block;margin:13px auto 0;padding:12px 22px;border-radius:12px;color:#fff;border:none;font-weight:900;font-size:14px;letter-spacing:.01em;box-shadow:0 4px 14px rgba(26,32,54,.16);animation:lbtnpulse 1.7s ease-in-out infinite;transform-origin:center}
@keyframes lbtnpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.lbtn .lsh{position:absolute;top:0;left:-40%;width:40%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.5),transparent);animation:lsweep 2.4s infinite;pointer-events:none}
@keyframes lsweep{0%{left:-40%}55%,100%{left:120%}}
.lbtn-done{width:auto;min-width:62%;display:block;margin:13px auto 0;padding:12px 20px;border-radius:12px;font-weight:900;font-size:13.5px;background:#e4f6ea;color:#15803d;border:1px solid #bfe6cd;cursor:default;text-align:center}
.lcap{font-size:10px;color:var(--muted);text-align:center;margin-top:7px}
.dpast{background:#fff;border:1px solid var(--line);border-radius:14px;padding:2px 14px}
.didle{text-align:center;font-size:11px;font-weight:700;color:#9aa0ae;padding:12px 0 10px;border-bottom:1px solid var(--line)}
.prow{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line)}
.dpast .prow:first-of-type{border-top:none}
.pdb{width:34px;text-align:center;flex-shrink:0}
.pdd{font-size:16px;font-weight:900;line-height:1}
.pmm{font-size:8.5px;color:var(--muted);font-weight:700}
.pn{font-weight:700;font-size:12.5px}
.ps{font-size:10px;color:var(--muted)}
.dup{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.urow{display:flex;align-items:center;gap:12px;padding:12px 14px}
.urow+.urow{border-top:1px solid var(--line)}
.ut{font-size:11px;font-weight:800;color:var(--muted);width:44px;flex-shrink:0}
.un{font-size:12.5px;font-weight:700;color:#4b5163}
.us{font-size:10px;color:#a7adc0;margin-top:1px}
.uday{margin-left:auto;font-size:9px;font-weight:800;color:#b6bccb}
.dsegbar{display:flex;gap:4px;margin-top:13px}
.dsegbar i{height:6px;border-radius:4px;flex:1;background:rgba(255,255,255,.25)}
.dsegbar i.on{background:#fff}
.tscroll{display:flex;gap:10px;overflow-x:auto;padding:2px 16px 4px;-webkit-overflow-scrolling:touch}
.tcard{min-width:200px;max-width:230px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px;box-shadow:0 2px 10px rgba(20,25,45,.06)}
.ttag{font-size:8.5px;font-weight:800;padding:3px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:5px}
.ttag.live{color:#D0242F;background:#fdecec}.ttag.up{color:#2563eb;background:#eaf1fe}
.ttag .ld{width:6px;height:6px;border-radius:50%;background:#D0242F;animation:dpulse 1.3s infinite}
.tname{font-weight:800;font-size:13.5px;margin-top:9px}
.tsub{font-size:11px;color:var(--muted);margin-top:2px}
.tmark{margin-top:11px;width:100%;background:#F5C443;color:#3a2c00;border:none;font-weight:900;font-size:11.5px;padding:9px;border-radius:9px}
.lbc{background:#fff;border:1px solid var(--line);border-radius:15px;padding:15px}
.lrw{display:flex;align-items:center;gap:11px;margin-bottom:14px}.lrw:last-child{margin-bottom:0}
.lrk{width:16px;font-weight:900;color:#c1c6d6;font-size:13px;text-align:center}
.lbar{flex:1}.lbh{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:5px}.lbh .p{font-weight:900}
.ltk{height:8px;background:#eef1f7;border-radius:5px;overflow:hidden}.ltk i{display:block;height:100%;border-radius:5px}
.pcard{background:#fff;border:1px solid var(--line);border-radius:15px;padding:14px}
.ptrend{display:flex;align-items:flex-end;gap:7px;height:58px}
.ptrend .pb{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%}
.ptrend .pcol{width:100%;flex:1;background:#eef1f7;border-radius:5px 5px 2px 2px;display:flex;align-items:flex-end;overflow:hidden}
.ptrend .pfill{width:100%;background:var(--a1);border-radius:5px 5px 2px 2px}
.ptrend .plab{font-size:8px;color:var(--muted);font-weight:700}
.ptitle{font-size:10px;color:var(--muted);font-weight:700;margin:9px 0 2px;display:flex;justify-content:space-between}
.prow2{display:flex;align-items:center;gap:11px;padding:11px 0;border-top:1px solid var(--line)}
.prow2 .g{flex:1;min-width:0}
.prow2 .n{font-weight:700;font-size:12.5px}
.prow2 .stk{display:flex;height:7px;border-radius:4px;overflow:hidden;margin-top:6px;background:#eef1f7}
.prow2 .stk i{height:100%}
.dtwo{display:flex;gap:10px;align-items:stretch}
.tcol{flex:1;min-width:0;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;display:flex;flex-direction:column;min-height:260px}
.mtl{position:relative;padding-top:2px}
.mtl:before{content:"";position:absolute;left:5px;top:6px;bottom:6px;width:2px;background:#e4e8f2}
.mtlr{position:relative;padding-left:20px;margin-bottom:11px}.mtlr:last-child{margin-bottom:0}
.mtd{position:absolute;left:0;top:2px;width:12px;height:12px;border-radius:50%;border:2px solid #fff}
.mtlr .mn{font-size:11.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mtlr .md{font-size:9.5px;color:var(--muted);font-weight:600;margin-top:1px}
.tlmini{font-size:11px;font-weight:600;color:#4b5163;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.tlmini:last-child{margin-bottom:0}
.tlmini b{color:var(--muted);font-weight:800;font-size:10px;margin-right:5px}
.tcol .tl2:before{left:5px;top:4px}
.tcol .tlg{padding-left:20px;margin-bottom:12px}
.tcol .tldot{width:12px;height:12px}
.tcol .tldate{font-size:10px;margin-bottom:6px}
.tcolh{font-size:9px;font-weight:800;letter-spacing:.05em;color:#9aa0ae;text-transform:uppercase;margin-bottom:11px}
.crow{display:flex;align-items:center;gap:7px;margin-bottom:11px}.crow:last-child{margin-bottom:0}
.crow .cg{flex:1;min-width:0}
.crow .cn{font-size:11.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crow .cd{font-size:9px;color:var(--muted);font-weight:600;margin-top:1px}
.cchip{font-size:12px;font-weight:900;flex-shrink:0}
.crk{width:14px;font-size:11px;font-weight:900;color:#c1c6d6;text-align:center;flex-shrink:0}
.crow .stk2{height:5px;border-radius:3px;overflow:hidden;background:#eef1f7;display:flex;margin-top:4px}.crow .stk2 i{height:100%}
.tl2{position:relative;margin-top:2px}
.tl2:before{content:"";position:absolute;left:6px;top:5px;bottom:8px;width:2px;background:#e4e8f2}
.tlg{position:relative;padding-left:24px;margin-bottom:15px}.tlg:last-child{margin-bottom:0}
.tldot{position:absolute;left:0;top:2px;width:14px;height:14px;border-radius:50%;border:3px solid #fff}
.tldate{font-size:11px;font-weight:800;margin-bottom:8px;letter-spacing:.02em}
.tli{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:7px;box-shadow:0 1px 6px rgba(20,25,45,.05);display:flex;align-items:center;gap:10px}
.tli:last-child{margin-bottom:0}
.tli .tlt{font-size:10.5px;font-weight:800;color:var(--muted);width:46px;flex-shrink:0}
.tli .tlg2{flex:1;min-width:0}
.tli .tln{font-weight:700;font-size:12.5px}
.tli .tls{font-size:10.5px;color:var(--muted);margin-top:1px}
.ic{width:20px;height:20px;display:inline-block;vertical-align:middle;}
.wrap{padding:14px;}
.topbar{position:sticky;top:0;z-index:20;padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));padding-left:calc(16px + env(safe-area-inset-left));padding-right:calc(16px + env(safe-area-inset-right));display:flex;align-items:center;gap:10px;background:var(--a1);color:#fff;}
.topbar h1{font-size:17px;margin:0;font-weight:800;flex:1;text-align:center;color:#fff;}
.topbar h1.left{text-align:left;}
.hbtn{background:rgba(255,255,255,.18);border:none;color:#fff;width:40px;height:40px;border-radius:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hbtn.g{background:#fff;color:var(--a1);}
.hspace{width:40px;flex-shrink:0;}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 3px 12px rgba(26,32,54,.05);}
.card.tap{cursor:pointer;}.card.tap:active{transform:scale(.99);}
.card.unassigned{background:#fff7ed;border-color:#fed7aa}
.badge-un{background:#ffedd5;color:#c2410c;font-size:9px;font-weight:800;padding:2px 7px;border-radius:999px;margin-left:6px}
.row{display:flex;align-items:center;gap:12px;}
.grow{flex:1;min-width:0;}
.title{font-weight:700;font-size:15.5px;}
.muted{color:var(--muted);font-size:13px;}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:5px 11px;border-radius:999px;}
.pill.green{background:var(--present-bg);color:var(--present);}
.pill.red{background:var(--absent-bg);color:var(--absent);}
.pill.orange{background:#fff3e0;color:var(--orange);}
.pill.blue{background:#e8f0ff;color:var(--blue);}

.pill.live{animation:livePulse 1.5s ease-in-out infinite;transform-origin:center}
.sectlabel{font-size:13px;font-weight:800;color:var(--txt);margin:20px 6px 10px;display:flex;align-items:center;justify-content:space-between;}
.logo{border-radius:22%;border:2px solid #fff;background:var(--a1);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;flex-shrink:0;overflow:hidden;padding:0 1px;box-sizing:border-box;}
.logo b{font-weight:900;letter-spacing:.02em;line-height:.9;}
.logo span{font-weight:800;letter-spacing:.12em;margin-right:-.12em;opacity:.95;line-height:1;max-width:100%;white-space:nowrap;}

.calhead b{font-size:17px;font-weight:800;}

.cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;font-weight:700;border-radius:12px;cursor:pointer;position:relative;}

.cell:not(.mute):not(.sel):hover{background:var(--acc-soft);}

.cell.sel{background:var(--a1);color:#fff;}
.cell .evdot{width:5px;height:5px;border-radius:50%;background:var(--a1);position:absolute;bottom:6px;}

.today-banner{background:linear-gradient(135deg,var(--a1),#e64550);color:#fff;border-radius:18px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;box-shadow:0 3px 12px rgba(26,32,54,.08)}
.today-banner .tb-day{font-weight:800;font-size:16px;line-height:1.2}
.today-banner .tb-sub{font-size:12px;opacity:.9;margin-top:2px}

/* ================= SECURITY (prototype hashing) ================= */
function h(s){s=String(s==null?'':s).trim().toLowerCase();let x=5381;for(let i=0;i<s.length;i++)x=((x<<5)+x+s.charCodeAt(i))>>>0;return x.toString(16);}
function hpw(s){s=String(s==null?'':s);let x=5381;for(let i=0;i<s.length;i++)x=((x<<5)+x+s.charCodeAt(i))>>>0;return x.toString(16);}
let SESSION=null, sessionTimer=null;
const TIMEOUT_MS=2*60*60*1000; // 2 hours
function persistSess(){try{if(SESSION)sessionStorage.setItem('spj_sess',JSON.stringify(SESSION));}catch(e){}}
function endSession(){SESSION=null;clearTimeout(sessionTimer);try{sessionStorage.removeItem('spj_sess');}catch(e){}}
function restoreSession(){try{const s=JSON.parse(sessionStorage.getItem('spj_sess')||'null');if(s&&s.exp>Date.now()&&findUser(s.u)){SESSION=s;scheduleTimeout();}else{try{sessionStorage.removeItem('spj_sess');}catch(e){}}}catch(e){}}
function startSession(rec){SESSION={u:rec.u,role:rec.role,exp:Date.now()+TIMEOUT_MS};persistSess();scheduleTimeout();}
function uRole(){return (SESSION&&SESSION.role)||'user';}
function isSuper(){return uRole()==='super';}
function isMarker(){return uRole()==='marker';}

function canRemoveStudents(){return uRole()!=='marker';}

function idbPut(store,val,key){return new Promise(res=>{if(!_idb)return res();try{const os=_idb.transaction(store,'readwrite').objectStore(store);const t=key!==undefined?os.put(val,key):os.put(val);t.onsuccess=()=>res();t.onerror=()=>res();}catch(e){res();}});}

function idbDel(store,key){return new Promise(res=>{if(!_idb)return res();try{const t=_idb.transaction(store,'readwrite').objectStore(store).delete(key);t.onsuccess=()=>res();t.onerror=()=>res();}catch(e){res();}});}

function render(){

  if(!SESSION){document.body.classList.remove('authed');$('nav').style.display='none';$('header').innerHTML='';$('fab').style.display='none';$('view').style.paddingBottom='0';loginView($('view'));return;}
  if(isMarker()&&(route.tab==='reports'||route.tab==='more'||(route.tab==='calendar'&&!route.id)))route={tab:'dashboard',sub:null,id:null,mode:null};
  if(!(route.tab==='calendar'&&route.id&&route.mode==='mark'))fbAttendUnsub();
  document.body.classList.add('authed');$('view').style.paddingBottom='';$('nav').style.display='';renderHeader();renderNav();const v=$('view');$('fab').style.display='none';
  if(route.tab==='calendar'){route.id?(route.mode==='mark'?markView(v):eventDetail(v)):calendarView(v);}
  else if(route.tab==='dashboard')dashboardView(v);

    </div><div class="brandline">🔒 On-device only · auto sign-out after 2 hours</div></div>`;

function findUser(u){u=(u||'').trim().toLowerCase();return DB.users.find(x=>x.u.toLowerCase()===u);}
function doLogin(){const rec=findUser($('luser').value);const pw=$('lpw').value;if(!rec||rec.ph!==hpw(pw)){toast('Incorrect username or password');return;}const wantBio=$('lbio')&&$('lbio').checked;startSession(rec);const _fin=autoFinalizeDrafts();go('dashboard');if(_fin)snack(_fin+' past draft'+(_fin>1?'s':'')+' auto-completed (unmarked → absent).',null,4000);setTimeout(checkAutoBackup,600);if(wantBio)bioEnable(rec.u,pw);}
function logout(){if(confirm('Sign out now?')){endSession();render();}}
/* ---- Biometric unlock: native app (plugin) OR web (WebAuthn Face ID/fingerprint) ---- */
const BIO_SRV='spj-attendance';
function bioPlugin(){return (window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.NativeBiometric)||null;}
function bioEnabled(){try{return localStorage.getItem('spj_bio')==='1';}catch(e){return false;}}
function waSupported(){return !!(window.PublicKeyCredential&&navigator.credentials&&navigator.credentials.create);}
async function waPlatform(){try{return waSupported()&&await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();}catch(e){return false;}}
async function bioAvailable(){if(isNative()){const p=bioPlugin();if(!p)return false;try{const r=await p.isAvailable({useFallback:true});return !!(r&&r.isAvailable);}catch(e){return false;}}return await waPlatform();}
async function bioEnable(username,password){
  if(isNative()){const p=bioPlugin();if(!p){toast('Biometric unlock works in the installed app only');return false;}
    try{await p.verifyIdentity({reason:'Confirm to enable unlock',title:'Enable unlock',subtitle:'SPJ Attendance',useFallback:true});
      await p.setCredentials({username,password,server:BIO_SRV});try{localStorage.setItem('spj_bio','1');}catch(e){}
      toast('Biometric / device-PIN unlock enabled');return true;
    }catch(e){toast('Could not enable unlock ('+(e&&e.message||'cancelled')+')');return false;}}
  // web WebAuthn
  if(!(await waPlatform())){toast('Face ID / fingerprint not available on this device');return false;}
  try{const cred=await navigator.credentials.create({publicKey:{
      challenge:crypto.getRandomValues(new Uint8Array(32)),
      rp:{name:'SPJ Attendance',id:location.hostname},
      user:{id:crypto.getRandomValues(new Uint8Array(16)),name:username,displayName:username},
      pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
      authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required',residentKey:'preferred'},
      timeout:60000,attestation:'none'}});
    try{localStorage.setItem('spj_bio','1');localStorage.setItem('spj_bio_user',username);localStorage.setItem('spj_bio_cred',_b64(cred.rawId));}catch(e){}
    toast('Biometric unlock enabled');return true;
  }catch(e){toast('Could not enable ('+(e&&e.message||'cancelled')+')');return false;}}
async function bioDisable(){if(isNative()){const p=bioPlugin();try{if(p)await p.deleteCredentials({server:BIO_SRV});}catch(e){}}try{localStorage.removeItem('spj_bio');localStorage.removeItem('spj_bio_user');localStorage.removeItem('spj_bio_cred');}catch(e){}toast('Unlock turned off');}
async function bioUnlock(){
  if(isNative()){const p=bioPlugin();if(!p)return;
    try{await p.verifyIdentity({reason:'Unlock SPJ Attendance',title:'Unlock',subtitle:'SPJ Attendance',useFallback:true});
      const c=await p.getCredentials({server:BIO_SRV});if(!c||!c.username){toast('No saved login — sign in with password');return;}
      const rec=findUser(c.username);if(!rec||rec.ph!==hpw(c.password)){toast('Saved login changed — use your password');await bioDisable();render();return;}
      startSession(rec);autoFinalizeDrafts();go('dashboard');setTimeout(checkAutoBackup,600);
    }catch(e){}return;}
  // web WebAuthn
  const id=localStorage.getItem('spj_bio_cred'),un=localStorage.getItem('spj_bio_user');
  if(!id||!un){toast('Set up biometric unlock first');return;}
  try{await navigator.credentials.get({publicKey:{challenge:crypto.getRandomValues(new Uint8Array(32)),allowCredentials:[{type:'public-key',id:_ub64(id).buffer,transports:['internal']}],userVerification:'required',timeout:60000,rpId:location.hostname}});
    const rec=findUser(un);if(!rec){toast('Saved login no longer exists — use password');await bioDisable();render();return;}
    startSession(rec);autoFinalizeDrafts();go('dashboard');setTimeout(checkAutoBackup,600);
  }catch(e){/* cancelled/failed → stay on password screen */}}
function bioToggle(){if(!isNative()&&!waSupported()){toast('This device/browser has no biometric support');return;}
  if(bioEnabled()){if(confirm('Turn off biometric unlock?')){bioDisable().then(render);}return;}
  const pw=prompt('Enter your current password to enable unlock:');if(!pw)return;const rec=findUser(SESSION.u);
  if(!rec||rec.ph!==hpw(pw)){toast('Password incorrect');return;}
  bioEnable(rec.u,pw).then(ok=>{if(ok)render();});}

function navMonth(dir){let m=cur.m+dir,y=cur.y;if(m<0){m=11;y--;}if(m>11){m=0;y++;}cur={y,m};selDay=null;render();}
function attPct(e){const c=scount(e);return c.total?Math.round((c.present+c.late)/c.total*100):0;}
function weekDaysOf(iso){const d=new Date(iso+'T00:00:00');const sun=new Date(d);sun.setDate(d.getDate()-d.getDay());const a=[];for(let i=0;i<7;i++){const x=new Date(sun);x.setDate(sun.getDate()+i);a.push(x.toISOString().slice(0,10));}return a;}
function railDays(){const today=new Date();let mn=new Date(today),mx=new Date(today);DB.events.filter(e=>!e.archived).forEach(e=>{const d=new Date(e.date+'T00:00:00');if(d<mn)mn=d;if(d>mx)mx=d;});mn.setDate(mn.getDate()-14);mx.setDate(mx.getDate()+28);const a=[],cur=new Date(mn);while(cur<=mx&&a.length<520){a.push(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);}return a;}
function weekStripHTML(){const today=new Date().toISOString().slice(0,10);const evD={};DB.events.filter(e=>!e.archived).forEach(e=>evD[e.date]=1);return railDays().map(ds=>{const d=new Date(ds+'T00:00:00');const cl=(ds===selDay?'sel ':'')+(ds===today?'today':'');return `<button class="wkday ${cl}" data-d="${ds}" onclick="pickDay('${ds}')"><span class="wd">${d.toLocaleDateString('en-GB',{weekday:'short'})}</span><span class="dn">${d.getDate()}</span>${evD[ds]?'<span class="wkdot"></span>':''}</button>`;}).join('');}
function setWkMy(ds){const my=document.querySelector('.wkmy');if(!my||!ds)return;const dt=new Date(ds+'T00:00:00');my.querySelector('b').textContent=dt.toLocaleDateString('en-GB',{month:'short'}).toUpperCase();my.querySelector('span').textContent=dt.getFullYear();}
function bindRailScroll(){const strip=document.querySelector('.wkdays');if(!strip||strip._rb)return;strip._rb=true;let raf=null;strip.addEventListener('scroll',()=>{if(raf)return;raf=requestAnimationFrame(()=>{raf=null;const sr=strip.getBoundingClientRect();let ds=null;const cells=strip.querySelectorAll('.wkday');for(const c of cells){if(c.getBoundingClientRect().right>sr.left+6){ds=c.getAttribute('data-d');break;}}if(ds)setWkMy(ds);});},{passive:true});}
function shiftWeek(dir){const base=weekAnchor||new Date().toISOString().slice(0,10);const d=new Date(base+'T00:00:00');d.setDate(d.getDate()+dir*7);weekAnchor=d.toISOString().slice(0,10);selDay=null;render();}
function resetCal(){const t=new Date();if(calMin){weekAnchor=t.toISOString().slice(0,10);}else{cur={y:t.getFullYear(),m:t.getMonth()};}selDay=null;_scrollDate=null;render();}
function latestPastDate(){const t=new Date().toISOString().slice(0,10);const ds=DB.events.filter(e=>!e.archived&&e.date<t).map(e=>e.date).sort();return ds.length?ds[ds.length-1]:t;}
function calTab(f){selDay=null;_scrollDate=null;calMin=true;agendaFilter=f;if(f==='past'){const d=latestPastDate();weekAnchor=d;_scrollDate=d;}else{weekAnchor=new Date().toISOString().slice(0,10);}render();}
function grpLabel(dt){const today=new Date().toISOString().slice(0,10);const t=new Date();t.setDate(t.getDate()+1);const tom=t.toISOString().slice(0,10);const sh=new Date(dt+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});if(dt===today)return 'Today · '+sh;if(dt===tom)return 'Tomorrow · '+sh;return sh;}
function needsSetup(e){return studentsForEvent(e).length===0;}
function eventCard(e){const st=eventStatus(e);const today=new Date().toISOString().slice(0,10);const done=st.t==='Completed';const isToday=e.date===today;const setup=needsSetup(e);
  const chip=done?`<span class="pill green">${ico('check')} Done · ${attPct(e)}%</span>`:`<span class="pill ${st.c}${st.t==='In progress'?' live':''}">${st.t}</span>`;
  const meta=`${ico('clock')} ${fmtTime(e.start)} – ${fmtTime(e.end)}${e.batches.length?' · '+e.batches.map(batchName).join(', '):''} · ${studentsForEvent(e).length} students`;
  const action=setup?`<button class="btn subtle" style="margin-top:12px" onclick="event.stopPropagation();assignEvent('${e.id}')">${ico('users')} Assign students</button>`:(isToday&&!done)?`<button class="btn cta" style="margin-top:12px" onclick="event.stopPropagation();go('calendar',null,'${e.id}','mark')">${ico('check')} ${st.t==='Draft'?'Resume marking':'Mark attendance'}</button>`:'';
  return `<div class="evcard${setup?' setup':''}" onclick="go('calendar',null,'${e.id}')"><div class="row"><div class="grow"><div class="title">${setup?'<span style="color:#e0940a">⚠</span> ':''}${esc(e.name)}${setup?'<span class="badge-setup">NEEDS SETUP</span>':''}</div></div>${chip}</div><div class="muted" style="margin-top:5px">${meta}</div>${action}</div>`;}

function barCol(e){const t=eventStatus(e).t;if(t==='Completed')return'#16a34a';if(t==='In progress'||t==='Due')return'#D0242F';if(t==='Draft')return'#EA8600';if(needsSetup(e))return'#e0940a';if(t==='No Show')return'#94a3b8';return'#F5C443';}
function isLive(e){if(!e||e.archived)return false;const t=new Date().toISOString().slice(0,10);if(e.date!==t)return false;const nowHM=String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0');const s=to24(e.start||'00:00'),en=to24(e.end||'23:59');return nowHM>=s&&nowHM<en;}
function cardHue(i){return ['#D0242F','#2563eb','#16a34a','#7c5cff','#d97706','#0891b2'][((i|0)%6+6)%6];}
function liveCardHTML(e,idx){const _tp=(idx==null)?'':' style="background:'+cardHue(idx)+'1a;color:'+cardHue(idx)+';padding:2px 8px;border-radius:7px;font-weight:800"';const ppl=peopleForEvent(e).length;const mk=Object.keys(e.records||{}).length;const w=ppl?Math.round(mk/ppl*100):0;const done=e.status==='completed';const draft=!done&&mk>0;const _t=new Date().toISOString().slice(0,10);const _now=String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0');const soon=!done&&!draft&&e.date===_t&&to24(_now)<to24(e.start||'00:00');const tagC=done?'#16a34a':draft?'#EA8600':soon?'#2563eb':'#D0242F';const tag=done?'COMPLETED':draft?'DRAFT · IN PROGRESS':soon?('TODAY · '+fmtTime(e.start)):'IN PROGRESS';const stcls=done?'st-green':draft?'st-amber':soon?'st-white':'st-red';const btn=done?`<button class="lbtn-done" style="cursor:pointer" onclick="event.stopPropagation();go('calendar',null,'${e.id}')">${ico('check')} View attendance details ${ico('chev')}</button><div class="selrow" style="margin-top:10px"><button class="btn ghost" style="flex:1" onclick="event.stopPropagation();exportEventPDF('${e.id}')">${ico('dl')} PDF</button><button class="btn ghost" style="flex:1" onclick="event.stopPropagation();exportEventCSV('${e.id}')">${ico('sheetx')} Excel</button><button class="btn subtle" style="flex:1" onclick="event.stopPropagation();emailEventReport('${e.id}')">${ico('mail')} Email</button></div>`:`<button class="lbtn" style="background:${tagC}" onclick="event.stopPropagation();openMark('${e.id}')">${draft?'Resume attendance marking':'Mark attendance'} →<span class="lsh"></span></button>`;return `<div class="livecard ${stcls}"${done?` onclick="go('calendar',null,'${e.id}')" style="cursor:pointer"`:''}><div class="lrow"><span class="ldot" style="background:${tagC};${soon?'animation:none':''}"></span><span class="ltag" style="color:${tagC}">${tag}</span><span class="ltm"${_tp}>${esc(e.start||'')}–${esc(e.end||'')}</span></div><div class="lname">${esc(e.name)}</div><div class="lsub">${esc(e.batches.map(batchName).join(', ')||'—')} · ${ppl} people</div><div class="lpw"><i style="width:${done?100:Math.max(4,w)}%;background:${tagC}"></i></div><div class="lpt">${done?(ppl+' marked · '+attPct(e)+'% present'):(mk+' of '+ppl+' marked')}</div>${btn}</div>`;}
function pickDay(ds){selDay=(selDay===ds?null:ds);if(selDay){const wk=weekDaysOf(weekAnchor||ds);if(wk.indexOf(selDay)<0)weekAnchor=selDay;}render();}
function toggleAg(id){const el=document.getElementById('agx-'+id);if(!el)return;el.classList.toggle('open');const c=el.closest('.agcard');if(c)c.classList.toggle('exp');}
function agRow(e){const st=eventStatus(e);const setup=needsSetup(e);const done=st.t==='Completed';const today=new Date().toISOString().slice(0,10);const isPast=done||e.date<today;const chipTxt=done?('Done · '+attPct(e)+'%'):st.t;const mk=(st.t==='In progress'||st.t==='Draft'||st.t==='Due');const c=scount(e);

function syncWkHi(d,smooth){const strip=document.querySelector('.wkdays');if(!strip)return;setWkMy(d);const cell=strip.querySelector('.wkday[data-d="'+d+'"]');strip.querySelectorAll('.wkday').forEach(w=>w.classList.toggle('act',w.getAttribute('data-d')===d));if(!cell)return;const target=Math.max(0,cell.offsetLeft-(strip.clientWidth-cell.clientWidth)/2);strip.scrollTo({left:target,behavior:(smooth===false?'auto':'smooth')});}
function bindAgendaScroll(){const sc=document.getElementById('view');if(!sc||sc._agb)return;sc._agb=true;sc.addEventListener('scroll',()=>{

function calendarView(v){
  const today=new Date().toISOString().slice(0,10);
  const nowHM=String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0');
  const monthName=new Date(cur.y,cur.m,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const first=new Date(cur.y,cur.m,1).getDay(),daysIn=new Date(cur.y,cur.m+1,0).getDate(),prevDays=new Date(cur.y,cur.m,0).getDate();
  const evD={};DB.events.filter(e=>!e.archived).forEach(e=>evD[e.date]=1);
  let cells='';for(let i=0;i<first;i++)cells+=`<div class="cell mute">${prevDays-first+i+1}</div>`;
  for(let d=1;d<=daysIn;d++){const ds=ymd(cur.y,cur.m,d);const cl=['cell'];if(ds===selDay)cl.push('sel');else if(ds===today)cl.push('today');cells+=`<div class="${cl.join(' ')}" onclick="pickDay('${ds}')">${d}${evD[ds]?'<span class="evdot"></span>':''}</div>`;}
  const used=first+daysIn,trail=(7-(used%7))%7;for(let i=1;i<=trail;i++)cells+=`<div class="cell mute">${i}</div>`;
  const wk=weekDaysOf(weekAnchor||today);
  const strip=weekStripHTML(weekAnchor||today);
  let list;
  if(!calMin){list=DB.events.filter(e=>{if(e.archived)return false;const dd=new Date(e.date+'T00:00:00');return dd.getFullYear()===cur.y&&dd.getMonth()===cur.m;});if(selDay)list=list.filter(e=>e.date===selDay);}
  else if(selDay)list=DB.events.filter(e=>!e.archived&&e.date===selDay);
  else if(agendaFilter==='today')list=DB.events.filter(e=>!e.archived&&e.date===today);
  else if(agendaFilter==='past')list=DB.events.filter(e=>!e.archived&&e.date<today);
  else list=DB.events.filter(e=>!e.archived&&e.date>=today);
  const groups={};list.forEach(e=>{(groups[e.date]=groups[e.date]||[]).push(e);});
  const desc=(calMin&&agendaFilter==='past'&&!selDay);

  dates.forEach(dt=>groups[dt].sort((a,b)=>to24(a.start).localeCompare(to24(b.start))));
  const pending=list.filter(needsSetup).length;
  const scopeWord=!calMin?monthName:(agendaFilter==='past'?'past':agendaFilter==='today'?'today':'upcoming');
  const summary=(!selDay&&list.length)?`<div class="esum"><b>${list.length}</b> ${scopeWord} event${list.length>1?'s':''}${pending?` · <span class="w">⚠ ${pending} need setup</span>`:''}</div>`:'';
  const pal2=['#D0242F','#2563eb','#16a34a','#7c5cff','#d97706','#0891b2'];
  const agenda=dates.length?`<div class="etl">`+dates.map((dt,i)=>{const col=pal2[i%pal2.length];
      let rows='';const isToday=dt===today&&!desc;let placed=false;
      groups[dt].forEach((e,ei)=>{if(isToday&&!placed&&to24(e.start)>=nowHM){rows+=`<div class="agnow"><span class="agnowline"></span><span class="agnowt">now ${fmtTime(nowHM)}</span></div>`;placed=true;}rows+=(isToday?liveCardHTML(e,ei):agRow(e));});
      if(isToday&&!placed)rows+=`<div class="agnow"><span class="agnowline"></span><span class="agnowt">now ${fmtTime(nowHM)}</span></div>`;
      return `<div class="egrp agsec" data-d="${dt}"><div class="edot" style="background:${col}"></div><div class="edl" style="color:${col}">${grpLabel(dt)}</div>${rows}</div>`;
    }).join('')+`</div>`:`<div class="empty">${ico('cal')}<div>${selDay?'No events on this day':('No '+scopeWord+' events')}.</div></div>`;
  v.innerHTML=`<div class="wrap">
    <div class="calsticky"><div class="seg2">
      <button class="${!selDay&&calMin&&agendaFilter==='today'?'on':''}" onclick="calTab('today')">Today</button>
      <button class="${!selDay&&calMin&&agendaFilter==='upcoming'?'on':''}" onclick="calTab('upcoming')">Upcoming</button>
      <button class="${!selDay&&calMin&&agendaFilter==='past'?'on':''}" onclick="calTab('past')">Past</button>
      <button class="calbtn ${calMin?'':'on'}" aria-label="Month view" title="Month view" onclick="calMin=!calMin;selDay=null;_scrollDate=null;render()">${ico('cal')}</button>
      <button class="calbtn" aria-label="Reset to ${calMin?'this week':'this month'}" title="Reset to ${calMin?'this week':'this month'}" onclick="resetCal()">${ico('reset')}</button>
    </div>
    ${calMin?`<div class="weekstrip"><div class="wkmy" aria-hidden="true"><b></b><span></span></div><div class="wkdays">${strip}</div></div>`
      :`<div class="card compactcal"><div class="calhead"><button onclick="navMonth(-1)">${ico('back')}</button><b style="cursor:pointer" onclick="openMonthPicker()">${monthName} ▾</b><button onclick="navMonth(1)">${ico('chev')}</button></div><div class="dow"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div><div class="grid">${cells}</div></div>`}</div>
    ${summary}${agenda}</div>`;
  bindAgendaScroll();bindRailScroll();
  requestAnimationFrame(()=>{if(calMin)syncWkHi(selDay||_scrollDate||today,false);});
}

function sortRoster(arr,e){const nm=p=>((p.fn||'')+' '+(p.ln||'')).toLowerCase();let out;if(rosterSort==='name')out=arr.slice().sort((a,b)=>nm(a).localeCompare(nm(b)));else{const tgt={pres:'present',abs:'absent',late:'late'}[rosterSort];out=arr.slice().sort((a,b)=>{const ra=(e.records[a.id]===tgt)?0:1,rb=(e.records[b.id]===tgt)?0:1;return ra-rb||nm(a).localeCompare(nm(b));});}return rosterDir==='desc'?out.reverse():out;}

function tapMark(eid,pid){const e=DB.events.find(x=>x.id===eid);const cur=e.records[pid];if(!cur){setMark(eid,pid,'present');return;}openChooser(eid,pid);}
function setMark(eid,pid,st){const e=DB.events.find(x=>x.id===eid);if(st)e.records[pid]=st;else delete e.records[pid];save();fbMark(eid,pid,st||null);markRefresh(e);}
function pickMark(eid,pid,st){setMark(eid,pid,st==='null'?null:st);closeSheet();}
function openChooser(eid,pid){const e=DB.events.find(x=>x.id===eid);const p=[...DB.students,...DB.staff].find(x=>x.id===pid)||{};const cur=e.records[pid];
  sheet(`<h3>Change status</h3><div class="muted" style="margin-bottom:14px">${esc((p.fn||'')+' '+(p.ln||''))} — currently <b>${(cur||'unmarked').toUpperCase()}</b></div>
   <button class="btn" style="background:var(--present);color:#fff;margin-bottom:10px" onclick="pickMark('${eid}','${pid}','present')">${ico('check')} Present</button>
   <button class="btn" style="background:var(--late);color:#fff;margin-bottom:10px" onclick="pickMark('${eid}','${pid}','late')">${ico('clock')} Late</button>
   <button class="btn" style="background:var(--absent);color:#fff;margin-bottom:10px" onclick="pickMark('${eid}','${pid}','absent')">${ico('x')} Absent</button>
   <button class="btn ghost" onclick="pickMark('${eid}','${pid}','null')">${ico('dash')} Clear mark</button>
   <div class="mini" style="text-align:center;margin-top:12px">Tap anywhere outside to cancel</div>`);}
function markRefresh(e){const c=countMarks(e);['cAll','cPres','cAbs','cLate'].forEach((id,i)=>{const el=$(id);if(el)el.textContent=[c.total,c.present,c.absent,c.late][i];});const un=$('unmarkedN');if(un)un.textContent=c.un;
  document.querySelectorAll('[data-pid]').forEach(row=>{const pid=row.dataset.pid,r=e.records[pid];row.className='mrow'+(r?' '+r:'');const b=row.querySelector('.statusbtn');b.className='statusbtn'+(r?' '+r:'');b.innerHTML=r==='present'?ICO.check:r==='absent'?ICO.x:r==='late'?ICO.clock:ICO.dash;const stx=row.querySelector('.stx');const col=r==='present'?'var(--present)':r==='absent'?'var(--absent)':r==='late'?'var(--late)':'var(--dim)';stx.textContent=r?' · '+r.toUpperCase():'';stx.style.color=col;row.style.display=(markFilter==='all'||markFilter===r)&&(!markQuery||row.dataset.name.includes(markQuery.toLowerCase()))?'':'none';});}

    <div class="mini" style="text-align:center;margin:2px 0 10px">Tap a row: Present → Late → Absent · <b style="color:var(--a1)">auto-saved</b></div>
    ${ld.length?'<div class="sectlabel" style="margin:6px 0 6px">Leaders</div>'+ld.map(p=>person(p,true)).join(''):''}
    ${st.length?'<div class="sectlabel" style="margin:10px 0 6px">Students</div>'+st.map(p=>person(p,false)).join(''):'<div class="empty">'+ico('users')+'<div>No students assigned.</div></div>'}
    <div class="legend"><span style="color:var(--present)"><span class="dot"></span>Present</span><span style="color:var(--absent)"><span class="dot"></span>Absent</span><span style="color:var(--late)"><span class="dot"></span>Late</span></div>
    <div class="card" style="padding:10px 12px;display:flex;align-items:center;gap:8px"><div class="grow" style="font-size:13px;font-weight:700"><span id="unmarkedN">0</span> not marked</div><button class="btn sm subtle" onclick="markRemaining('${e.id}','present')">All present</button><button class="btn sm ghost" onclick="markRemaining('${e.id}','absent')">All absent</button></div>
    <div class="mini" style="text-align:center;margin:0 0 8px">${canEdit()?'<b>Draft</b> keeps your marks to resume later. <b>Save</b> completes it (unmarked → Absent).':'Your marks are auto-saved as a <b>draft</b>. An admin completes it, or it completes automatically after the day ends.'}</div>

  markRefresh(e);fbAttendSubscribe(e.id);}
function markRemaining(eid,status){const e=DB.events.find(x=>x.id===eid);let n=0;const chg={};peopleForEvent(e).forEach(p=>{if(!e.records[p.id]){e.records[p.id]=status;chg[p.id]=status;n++;}});if(!n){toast('Everyone is already marked');return;}save();fbMarkBulk(eid,chg);markRefresh(e);toast(n+' marked '+status);}
function setFilter(f){markFilter=f;['all','present','absent','late'].forEach(x=>{const el=$('f'+(x==='all'?'All':x));if(el)el.classList.toggle('on',x===f);});markRefresh(DB.events.find(x=>x.id===route.id));}
function finalize(eid){if(isMarker()){toast('Attendance officers save drafts only — an admin or day-end completes it');return;}const e=DB.events.find(x=>x.id===eid);peopleForEvent(e).forEach(p=>{if(!e.records[p.id])e.records[p.id]='absent';});e.status='completed';e.markedAt=Date.now();e.markedBy=(SESSION&&SESSION.u)||'';fbMarkBulk(eid,e.records);save();maybeSnapshot(true);toast('Completed · unmarked → Absent');go('calendar',null,eid);}
function draftPause(eid){const e=DB.events.find(x=>x.id===eid);save();snack('Draft saved — resume anytime. Auto-completes after the day ends.',null,3500);go('calendar',null,eid);}

/* ================= DASHBOARD ================= */
function scopeEvents(){const s=dashScope;const base=DB.events.filter(e=>!e.archived);if(s.type==='year')return base.filter(e=>+e.date.slice(0,4)===s.year);if(s.type==='month')return base.filter(e=>{const d=new Date(e.date+'T00:00:00');return d.getFullYear()===s.year&&d.getMonth()===s.month;});if(s.type==='batch')return base.filter(e=>e.batches.includes(s.batch)||DB.students.some(st=>st.batch===s.batch&&e.students.includes(st.id)));return base;}
function attnRow(icon,color,title,sub,onclick){return `<div class="sitem" onclick="${onclick}"><div class="ic0" style="border-color:${color};color:${color}">${ico(icon)}</div><div class="grow"><div style="font-weight:700;font-size:14px">${title}</div><div class="mini">${sub}</div></div><span style="color:var(--dim)">${ico('chev')}</span></div>`;}
function ringSVG(pct){const r=40,c=2*Math.PI*r,off=c*(1-Math.max(0,Math.min(100,pct))/100);return `<svg width="94" height="94" viewBox="0 0 96 96"><circle cx="48" cy="48" r="40" fill="none" stroke="#f1d3d5" stroke-width="12"/><circle cx="48" cy="48" r="40" fill="none" stroke="var(--a1)" stroke-width="12" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 48 48)"/></svg>`;}
function greeting(){const h=new Date().getHours();return h<12?'Good morning':h<17?'Good afternoon':'Good evening';}
function stCol(c){return c==='green'?'#16a34a':c==='red'?'#D0242F':c==='orange'?'#d97706':c==='blue'?'#2563eb':'#8a90a6';}
function dashMark(){const _t=new Date().toISOString().slice(0,10);const td=DB.events.filter(e=>!e.archived&&e.date===_t);if(td.length)openMark(td[0].id);else{toast('No events today');go('calendar');}}
function resetDash(){const t=new Date();if(dashScope.type==='year')dashScope.year=t.getFullYear();else if(dashScope.type==='month'){dashScope.year=t.getFullYear();dashScope.month=t.getMonth();}else if(dashScope.type==='batch')dashScope.batch=DB.batches.filter(b=>!b.archived)[0]?.id;render();}
function bindDashScroll(){/* quick buttons scroll with the page — no sticky/stuck behavior */}
function openBatchScopePicker(){sheet(`<h3>Choose batch</h3><div class="searchbox" style="margin:8px 0 4px">${ico('search')}<input class="search" id="bspQ" placeholder="Search batch..." oninput="bspRender(this.value)"></div><div id="bspList" class="pklist" style="margin-top:8px"></div><button class="btn ghost" style="margin-top:14px" onclick="closeSheet()">Cancel</button>`);bspRender('');}
function bspRender(q){const el=$('bspList');if(!el)return;q=(q||'').toLowerCase();const items=DB.batches.filter(b=>!b.archived&&b.name.toLowerCase().includes(q));el.innerHTML=items.map(b=>`<button class="pkrow ${b.id===dashScope.batch?'on':''}" onclick="dashScope.batch='${b.id}';closeSheet();render()"><span class="pkic">${ico('cap')}</span><span class="grow">${esc(b.name)}</span>${b.id===dashScope.batch?ico('check'):''}</button>`).join('')||'<div class="mini" style="padding:8px 2px">No batches.</div>';}
function markerTodayCard(e,idx){const nowHM=String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0');const ppl=peopleForEvent(e).length;const mk=Object.keys(e.records||{}).length;const done=isCompleted(e);const started=to24(nowHM)>=to24(e.start||'00:00');const draft=!done&&mk>0;const w=ppl?Math.round(mk/ppl*100):0;
  const soon=!done&&!draft&&!started;
  const tagC=done?'#16a34a':draft?'#EA8600':soon?'#2563eb':'#D0242F';
  const tag=done?'COMPLETED':(draft?'DRAFT · IN PROGRESS':started?'IN PROGRESS':'TODAY · '+fmtTime(e.start));
  const stcls=done?'st-green':draft?'st-amber':soon?'st-white':'st-red';
  let action;
  if(done)action=`<button class="lbtn-done" disabled>${ico('check')} Attendance completed</button><div class="selrow" style="margin-top:10px"><button class="btn ghost" style="flex:1" onclick="event.stopPropagation();exportEventPDF('${e.id}')">${ico('dl')} PDF</button><button class="btn ghost" style="flex:1" onclick="event.stopPropagation();exportEventCSV('${e.id}')">${ico('sheetx')} Excel</button><button class="btn subtle" style="flex:1" onclick="event.stopPropagation();emailEventReport('${e.id}')">${ico('mail')} Email</button></div>`;
  else action=`<button class="lbtn" style="background:${tagC}" onclick="event.stopPropagation();openMark('${e.id}')">${draft?'Resume attendance marking':'Mark attendance'} →<span class="lsh"></span></button>`;
  return `<div class="livecard ${stcls}" style="box-shadow:inset 5px 0 0 0 ${cardHue(idx)}" onclick="go('calendar',null,'${e.id}')"><div class="lrow"><span class="ldot" style="background:${tagC};${started&&!done?'':'animation:none'}"></span><span class="ltag" style="color:${tagC}">${tag}</span><span class="ltm">${esc(e.start||'')}–${esc(e.end||'')}</span></div><div class="lname">${esc(e.name)}</div><div class="lsub" style="color:var(--muted)">${esc(e.batches.map(batchName).join(', ')||'—')} · ${ppl} people</div><div class="lpw" style="background:#e5e8f1"><i style="width:${done?100:Math.max(4,w)}%;background:${tagC}"></i></div><div class="lpt" style="color:var(--muted)">${done?(ppl+' marked · '+attPct(e)+'% present'):(mk+' of '+ppl+' marked')}</div>${action}</div>`;}
function markerDashboard(v){
  const _t=new Date().toISOString().slice(0,10);
  const todays=DB.events.filter(e=>!e.archived&&e.date===_t).sort((a,b)=>to24(a.start||'').localeCompare(to24(b.start||'')));

}
function dashboardView(v){

  if(!dashScope.batch)dashScope.batch=DB.batches[0]?.id;

  const scopeLbl=dashScope.type==='batch'?esc(batchName(dashScope.batch)):dashScope.type==='month'?MONTHS[dashScope.month]+' '+dashScope.year:dashScope.type==='year'?String(dashScope.year):'All time';

  const liveNow=notArch.filter(e=>{if(e.date!==_t)return false;const s=to24(e.start||'00:00'),en=to24(e.end||'23:59');return nowHM>=s&&nowHM<en;});
  const liveSet=new Set(liveNow.map(e=>e.id));

  const upcoming=notArch.filter(e=>e.status!=='completed'&&e.date>_t).sort((a,b)=>((a.date+(a.start||''))).localeCompare(b.date+(b.start||''))).slice(0,20);
  const recent=notArch.filter(e=>isCompleted(e)&&e.date<_t).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);

  const pctChip=p=>{const c=p>=85?['#e9f8ef','#16a34a']:p>=70?['#fef3e2','#d97706']:['#fdecec','#D0242F'];return `<span style="font-weight:900;font-size:12px;padding:2px 9px;border-radius:8px;background:${c[0]};color:${c[1]}">${p}%</span>`;};
  const dayLbl=d=>{if(d===_t)return'TODAY';const dt=new Date();dt.setDate(dt.getDate()+1);if(d===dt.toISOString().slice(0,10))return'TMRW';return (wday(d)+' '+dayNum(d)).toUpperCase();};

    : `<div class="dsl">UPCOMING</div><div class="tcol" style="text-align:center;color:var(--muted);font-size:12px;font-weight:600">No upcoming events.</div>`;

function eventsInMonth(y,m){return DB.events.filter(e=>{if(e.archived)return false;const d=new Date(e.date+'T00:00:00');return d.getFullYear()===y&&d.getMonth()===m;}).sort((a,b)=>a.date.localeCompare(b.date));}
function allYears(){const cy=new Date().getFullYear();let lo=cy-2,hi=cy+1;DB.events.forEach(e=>{const y=+e.date.slice(0,4);if(y<lo)lo=y;if(y>hi)hi=y;});const out=[];for(let y=lo;y<=hi;y++)out.push(y);return out;}
function monthBatchRows(evs){const done=evs.filter(isCompleted);return DB.batches.map(b=>{const bevs=done.filter(e=>e.batches.includes(b.id));const studs=DB.students.filter(s=>s.batch===b.id);let p=0,l=0,a=0,slots=0;bevs.forEach(e=>{const roster=new Set(studentsForEvent(e).map(x=>x.id));studs.forEach(s=>{if(!roster.has(s.id))return;slots++;const r=e.records[s.id];if(r==='present')p++;else if(r==='late')l++;else a++;});});const pct=slots?Math.round((p+l)/slots*100):null;return {b,events:bevs.length,students:studs.length,slots,p,l,a,pct};}).filter(x=>x.events>0);}
function monthStudentRows(evs){const done=evs.filter(isCompleted);return DB.students.map(s=>{const sevs=done.filter(e=>studentsForEvent(e).some(x=>x.id===s.id));let p=0,l=0,a=0;sevs.forEach(e=>{const r=e.records[s.id];if(r==='present')p++;else if(r==='late')l++;else a++;});const sched=sevs.length;const pct=sched?Math.round((p+l)/sched*100):null;return {s,sched,p,l,a,pct};}).filter(x=>x.sched>0).sort((a,b)=>(a.pct==null?999:a.pct)-(b.pct==null?999:b.pct));}
function pctColor(p){return p==null?'var(--dim)':p>=85?'var(--present)':p>=70?'var(--orange)':'var(--absent)';}
function repStuRefresh(){const el=$('repStuBody');if(!el)return;const evs=reportScopeEvents();const rows=monthStudentRows(evs).filter(x=>!repStuQ||(x.s.fn+' '+x.s.ln+' '+(x.s.cid||'')).toLowerCase().includes(repStuQ.toLowerCase()));
  rows.sort((A,B)=>{if(repStuSort==='az')return fullNm(A.s).localeCompare(fullNm(B.s));if(repStuSort==='za')return fullNm(B.s).localeCompare(fullNm(A.s));const pa=A.pct==null?-1:A.pct,pb=B.pct==null?-1:B.pct;return repStuSort==='hilo'?pb-pa:pa-pb;});
  el.innerHTML=rows.length?rows.map(x=>`<div class="strow" onclick="openStudentReport('${x.s.id}')"><div class="grow"><div class="stn">${esc(x.s.fn)} ${esc(x.s.ln)}</div><div class="stm">${esc(x.s.cid||'—')} · ${esc(batchName(x.s.batch))}</div></div><div><div class="stpct" style="color:${pctColor(x.pct)}">${x.pct==null?'—':x.pct+'%'}</div><div class="stpla"><span style="color:var(--present)">P:${x.p}</span> <span style="color:var(--late)">L:${x.l}</span> <span style="color:var(--absent)">A:${x.a}</span></div></div><span class="stdots">${ico('more')}</span></div>`).join(''):'<div class="empty">'+ico('users')+'<div>No completed events this month.</div></div>';}
function openStudentReport(sid){const s=DB.students.find(x=>x.id===sid);if(!s)return;const evs=reportScopeEvents();const assigned=evs.filter(e=>studentsForEvent(e).some(x=>x.id===sid)).sort((a,b)=>a.date.localeCompare(b.date));
  let p=0,l=0,a=0,done=0;const rows=assigned.map(e=>{const comp=isCompleted(e);const r=e.records[sid];let st,col,ic;if(!comp){st='Upcoming';col='var(--dim)';ic='clock';}else{done++;if(r==='present'){st='Present';col='var(--present)';ic='check';p++;}else if(r==='late'){st='Late';col='var(--late)';ic='clock';l++;}else{st='Absent';col='var(--absent)';ic='x';a++;}}return {e,st,col,ic};});
  const pct=done?Math.round((p+l)/done*100):null;
  sheet(`<div class="row" style="gap:10px;margin-bottom:2px;align-items:center"><div class="avatar ${avColor(s.fn)}">${initials(s.fn,s.ln)}</div><div class="grow"><h3 style="margin:0">${esc(s.fn)} ${esc(s.ln)}</h3><div class="mini">${esc(s.cid||'—')} · ${esc(batchName(s.batch))}</div></div><div class="stpct" style="font-size:24px;color:${pctColor(pct)}">${pct==null?'—':pct+'%'}</div></div>
    <div class="mini" style="margin:2px 0 12px">${repLabel()} · attended <b>${p+l}</b> of <b>${done}</b> completed · ${assigned.length} assigned</div>
    <div class="minigrid" style="margin-bottom:12px"><div><b style="color:var(--present)">${p}</b><span>Present</span></div><div><b style="color:var(--late)">${l}</b><span>Late</span></div><div><b style="color:var(--absent)">${a}</b><span>Absent</span></div></div>
    <div class="row" style="align-items:center;justify-content:space-between;margin:0 0 12px"><div class="mini" style="font-weight:700;color:var(--muted)">Download &amp; share</div><div class="selrow" style="margin:0;gap:8px;width:auto"><button class="iconbtn pdf" aria-label="Download PDF" title="PDF" onclick="exportStudentOnePDF('${s.id}')">${ico('doc')}</button><button class="iconbtn xls" aria-label="Download Excel" title="Excel" onclick="exportStudentOneCSV('${s.id}')">${ico('sheetx')}</button></div></div>
    <div class="sectlabel" style="margin:0 0 4px">Events</div>
    <div class="sdlist">${assigned.length?rows.map(r=>`<div class="sdrow"><div class="grow"><div class="sdn">${esc(r.e.name)}</div><div class="mini">${ico('cal')} ${toDMY(r.e.date)} · ${fmtTime(r.e.start)}</div></div><span class="sdst" style="color:${r.col}">${ico(r.ic)} ${r.st}</span></div>`).join(''):'<div class="mini" style="padding:8px 0">No assigned events in '+repLabel()+'.</div>'}</div>`);}
function reportsView(v){

        ${done?`<div class="selrow" style="margin:12px 0 0;justify-content:flex-end;gap:8px"><button class="iconbtn pdf" aria-label="PDF" onclick="exportEventPDF('${e.id}')">${ico('doc')}</button><button class="iconbtn xls" aria-label="Excel" onclick="exportEventCSV('${e.id}')">${ico('sheetx')}</button><button class="iconbtn mail" aria-label="Email" onclick="emailEventReport('${e.id}')">${ico('mail')}</button></div>`:''}</div>`;}).join(''):'<div class="empty">'+ico('doc')+'<div>No events in this month.</div></div>'}`;
  } else if(repMode==='batch'){

    body=`<div class="card"><div class="dash-head"><span class="reddot"></span>Export ${mlabel}</div><button class="rbtn xls" onclick="exportBatchCSV()">${ico('sheetx')} Batch summary (Excel)</button></div>
      <div class="sectlabel">Attendance by batch · ${mlabel}</div>

        <div class="minigrid"><div><b style="color:var(--present)">${x.p}</b><span>Present</span></div><div><b style="color:var(--late)">${x.l}</b><span>Late</span></div><div><b style="color:var(--absent)">${x.a}</b><span>Absent</span></div></div>

function exportBatchCSV(){const evs=reportScopeEvents();const rows=[['Batch','Students','Events','Present','Late','Absent','Attendance %'],...monthBatchRows(evs).map(x=>[x.b.name,x.students,x.events,x.p,x.l,x.a,x.pct+'%'])];dl('Batch_summary_'+repFileLabel()+'.csv',rows.map(r=>r.map(csvEsc).join(',')).join('\n'),'text/csv');toast('Batch summary exported');}
function exportStudentCSV(){const evs=reportScopeEvents();const rows=[['Name','Campus ID','Batch','Events','Present','Late','Absent','Attendance %'],...monthStudentRows(evs).map(x=>[x.s.fn+' '+x.s.ln,x.s.cid||'',batchName(x.s.batch),x.sched,x.p,x.l,x.a,x.pct+'%'])];dl('Student_summary_'+repFileLabel()+'.csv',rows.map(r=>r.map(csvEsc).join(',')).join('\n'),'text/csv');toast('Student summary exported');}
function studentReportRows(sid){const evs=reportScopeEvents();return evs.filter(e=>studentsForEvent(e).some(x=>x.id===sid)).sort((a,b)=>a.date.localeCompare(b.date)).map(e=>{const comp=isCompleted(e);const r=e.records[sid];const st=!comp?'Upcoming':r==='present'?'Present':r==='late'?'Late':'Absent';return {e,comp,st};});}
function studentTally(sid){let p=0,l=0,a=0,done=0;studentReportRows(sid).forEach(x=>{if(x.comp){done++;if(x.st==='Present')p++;else if(x.st==='Late')l++;else a++;}});return {p,l,a,done,pct:done?Math.round((p+l)/done*100):0};}
function stuFileBase(s){return 'Attendance_'+((s.fn||'')+'_'+(s.ln||'')).replace(/[^a-z0-9]+/gi,'_')+'_'+repFileLabel();}
function buildStudentDoc(s){const {jsPDF}=window.jspdf;const doc=new jsPDF();const rows=studentReportRows(s.id);const t=studentTally(s.id);
  doc.setFontSize(18);doc.setTextColor(208,36,47);doc.text('SPJ London — Attendance',14,18);
  doc.setFontSize(13);doc.setTextColor(30,34,51);doc.text((s.fn+' '+s.ln).slice(0,48),14,30);
  doc.setFontSize(9);doc.setTextColor(120);doc.text(((s.cid||'—')+' · '+batchName(s.batch)+'   '+repLabel()).slice(0,90),14,36);
  doc.setTextColor(30,34,51);doc.text('Attended '+(t.p+t.l)+' of '+t.done+' completed · '+t.pct+'%    Present '+t.p+' · Late '+t.l+' · Absent '+t.a,14,42);
  doc.setDrawColor(225);doc.line(14,46,196,46);let y=53;doc.setFontSize(9);
  if(!rows.length){doc.setTextColor(120);doc.text('No assigned events in '+repLabel()+'.',16,y);}
  rows.forEach(x=>{if(y>285){doc.addPage();y=18;}const col=x.st==='Present'?[26,157,91]:x.st==='Late'?[124,58,237]:x.st==='Absent'?[208,36,47]:[120,120,120];doc.setTextColor(30,34,51);doc.text(x.e.name.slice(0,40),16,y);doc.setTextColor(120);doc.text(toDMY(x.e.date),120,y);doc.setTextColor(col[0],col[1],col[2]);doc.text(x.st,176,y);y+=6;});
  doc.setTextColor(150);doc.setFontSize(8);doc.text('Generated by SPJ Attendance — on-device',14,292);return doc;}
function exportStudentOnePDF(sid){const s=DB.students.find(x=>x.id===sid);if(!s)return;if(!pdfReady())return;shareOrDownload(buildStudentDoc(s),stuFileBase(s)+'.pdf','Attendance — '+s.fn+' '+s.ln,repLabel());}
function exportStudentOneCSV(sid){const s=DB.students.find(x=>x.id===sid);if(!s)return;const rows=[['Event','Date','Start','Status']];studentReportRows(sid).forEach(x=>rows.push([x.e.name,toDMY(x.e.date),x.e.start||'',x.st]));const t=studentTally(sid);rows.push(['','','','']);rows.push(['Present',t.p,'Late',t.l]);rows.push(['Absent',t.a,'Attendance %',t.pct+'%']);dl(stuFileBase(s)+'.csv',rows.map(r=>r.map(csvEsc).join(',')).join('\n'),'text/csv');toast('Student report exported');}
function exportStudentPDF(){if(!pdfReady())return;const evs=reportScopeEvents();const rows=monthStudentRows(evs);const {jsPDF}=window.jspdf;const doc=new jsPDF();doc.setFontSize(18);doc.setTextColor(208,36,47);doc.text('SPJ London — Student Attendance',14,18);doc.setFontSize(10);doc.setTextColor(120);doc.text(repLabel()+' · lowest attendance first (completed events only)',14,26);let y=36;doc.setFontSize(9);doc.setTextColor(30,34,51);doc.text('Student',14,y);doc.text('Batch',80,y);doc.text('Ev',140,y);doc.text('P',152,y);doc.text('L',162,y);doc.text('A',172,y);doc.text('%',184,y);y+=3;doc.setDrawColor(220);doc.line(14,y,196,y);y+=6;rows.forEach(x=>{if(y>285){doc.addPage();y=18;}doc.setTextColor(30,34,51);doc.text((x.s.fn+' '+x.s.ln).slice(0,30),14,y);doc.setTextColor(120);doc.text(batchName(x.s.batch).slice(0,22),80,y);doc.setTextColor(30,34,51);doc.text(''+x.sched,140,y);doc.text(''+x.p,152,y);doc.text(''+x.l,162,y);doc.text(''+x.a,172,y);const col=x.pct>=85?[26,157,91]:x.pct>=70?[217,119,6]:[208,36,47];doc.setTextColor(...col);doc.text(x.pct+'%',184,y);y+=6;});doc.setTextColor(150);doc.setFontSize(8);doc.text('SPJ Attendance — on-device',14,292);shareOrDownload(doc,'Student_summary_'+repFileLabel()+'.pdf','Student attendance','Student summary');}
